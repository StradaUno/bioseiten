let lang='de', u=null, brands=[], offers=[]
function t(k){return STR[lang][k]??k}
function nu(u){return u?(u.startsWith('http')?u:'https://'+u):'#'}
function fm(n){if(n==null)return '-';if(n>=1000000)return (n/1000000).toFixed(1).replace(/.0$/,'')+'M';if(n>=1000)return (n/1000).toFixed(1).replace(/.0$/,'')+'k';return String(n)}
function es(s){return String(s??'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function applyLang(l){
  if(!STR[l])l='de';lang=l
  document.documentElement.lang=l
  document.querySelectorAll('[data-i18n]').forEach(el=>el.textContent=t(el.dataset.i18n))
  document.querySelectorAll('[data-i18n-suffix]').forEach(el=>el.textContent=t(el.dataset.i18nSuffix)+' ↗')

function getSlug(){const p=window.location.pathname.replace(/^[/]+|[/]+$/g,'');const parts=p.split('/');return parts.length>=2?parts[1]:null}
async function load(){
  const slug=getSlug();if(!slug){window.location.replace('https://viuno.de');return}
  const {data,error}=await sb.from('mediakit_public').select('*').ilike('display_name',slug).maybeSingle()
  if(error||!data){window.location.replace('https://viuno.de');return}
  u=data
  const [b,o]=await Promise.all([sb.from('mediakit_brands').select('*').eq('user_id',data.user_id).order('position',{ascending:true}),sb.from('mediakit_content_offers').select('*').eq('user_id',data.user_id)])
  brands=b.data??[];offers=o.data??[]
  const nl=navigator.language.slice(0,2)
  applyLang(['de','en','it'].includes(nl)?nl:'de')

  const ld=document.getElementById('page-loader');ld.classList.add('hide');setTimeout(()=>ld.remove(),250)

async function track(uid){
  try{fetch(SB_URL+'/rest/v1/mediakit_aufrufe',{method:'POST',headers:{'Content-Type':'application/json','apikey':SB_ANON,'Authorization':'Bearer '+SB_ANON,'Prefer':'return=minimal'},body:JSON.stringify({user_id:uid,referrer_source:document.referrer||'direct',hour_of_day:new Date().getHours(),language:lang})})}catch(_){}
}

  document.title=(u.display_name||'Media Kit')+' - Media Kit'
  const av=document.getElementById('mk-avatar')

}

function renderOther(u){
  const sec=document.getElementById('section-other');const list=document.getElementById('other-list');list.innerHTML=''
  const plats=[{key:'youtube',cls:'yt',label:'YouTube',url:'https://youtube.com/@',followersKey:'followers_youtube',followersLabel:'subscribers',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="#c62828"><path d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 0 0 .5 6.5C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 0 0 2.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.4a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>'},{key:'threads',cls:'th',label:'Threads',url:'https://threads.net/@',followersKey:'followers_threads',followersLabel:'followers',icon:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#388e3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>'}]
  plats.forEach(function(p){
    const handle=u[p.key+'_handle'];if(!handle)return
    const clean=handle.replace(/^@/,'')
    const followers=u[p.followersKey]
    const row=document.createElement('a');row.className='mk-small-plat';row.href=p.url+encodeURIComponent(clean);row.target='_blank';row.rel='noopener'
    row.innerHTML='<div class="mk-small-left"><div class="mk-plat-icon '+p.cls+'">'+p.icon+'</div><div><div style="font-size:13px;font-weight:600;color:#1A1A2E">'+p.label+'</div><div class="mk-small-lbl">@'+es(clean)+'</div></div></div>'+
      (followers!=null?'<div style="text-align:right"><div class="mk-small-followers">'+fm(followers)+'</div><div class="mk-small-lbl">'+t(p.followersLabel)+'</div></div>':'')
    list.appendChild(row)
  })
  sec.style.display=list.children.length?'':'none'
}
function renderAudience(u){
  const hasG=u.gender_female_pct!=null||u.gender_male_pct!=null
  const hasC=u.top_country_1||u.top_country_2
  const sec=document.getElementById('section-audience')
  if(!hasG&&!hasC){sec.style.display='none';return}
  sec.style.display=''
  const gBlock=document.getElementById('gender-block')
  if(hasG){
    gBlock.style.display=''
    const f=u.gender_female_pct??0;const m=u.gender_male_pct??0
    document.getElementById('mk-gender').innerHTML='<div class="mk-gender"><div class="mk-g-row"><span class="mk-g-lbl">'+t('female')+'</span><div class="mk-g-track"><div class="mk-g-fill" style="width:'+f+'%;background:#e91e8c"></div></div><span class="mk-g-pct">'+f+'%</span></div><div class="mk-g-row"><span class="mk-g-lbl">'+t('male')+'</span><div class="mk-g-track"><div class="mk-g-fill" style="width:'+m+'%;background:#1A1A2E"></div></div><span class="mk-g-pct">'+m+'%</span></div></div>'
  }else{gBlock.style.display='none'}
  const cBlock=document.getElementById('countries-block')
  if(hasC){
    cBlock.style.display=''
    let html='<div class="mk-countries">'
    if(u.top_country_1)html+='<div class="mk-country">'+es(u.top_country_1)+'</div>'
    if(u.top_country_2)html+='<div class="mk-country">'+es(u.top_country_2)+'</div>'
    html+='</div>'
    document.getElementById('mk-countries').innerHTML=html
  }else{cBlock.style.display='none'}
}
function renderOffers(){
  const c=document.getElementById('mk-offers');c.innerHTML=''
  const sec=document.getElementById('section-offers')
  if(!offers.length){sec.style.display='none';return}
  sec.style.display=''
  offers.forEach(function(o){
    const pill=document.createElement('div');pill.className='mk-offer';pill.textContent=t('offer_'+o.offer_type)
    c.appendChild(pill)
  })
}
function renderBrands(){
  const c=document.getElementById('mk-brands');c.innerHTML=''
  const sec=document.getElementById('section-brands')
  if(!brands.length){sec.style.display='none';return}
  sec.style.display=''
  brands.forEach(function(b){
    const el=b.url?document.createElement('a'):document.createElement('div')
    el.className='mk-brand'
    if(b.url){el.href=nu(b.url);el.target='_blank';el.rel='noopener'}
    el.textContent=b.name;c.appendChild(el)
  })
}
const impB=document.getElementById('imp-backdrop'),impS=document.getElementById('imp-sheet'),impC=document.getElementById('imp-content')
function openImp(){const txt=(u?.impressum_text||'').trim();if(txt){impC.textContent=txt;impC.classList.remove('imp-empty')}else{impC.textContent=t('imprint_empty');impC.classList.add('imp-empty')};impS.classList.add('open');impB.classList.add('open');document.body.classList.add('imp-open')}
function closeImp(){impS.classList.remove('open');impB.classList.remove('open');document.body.classList.remove('imp-open')}
document.getElementById('btn-imprint').addEventListener('click',openImp)
document.getElementById('imp-close').addEventListener('click',closeImp)
impB.addEventListener('click',closeImp)
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeImp()})
document.querySelectorAll('.mk-lang-btn').forEach(function(b){b.addEventListener('click',function(){applyLang(b.dataset.lang)})})
load()
</script></body></html>
