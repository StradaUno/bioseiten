<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mediakit · viuno</title>
<meta name="theme-color" content="#EAEAEE" />
<meta name="robots" content="index, follow" />
<style>
  :root {
    --bg: #EAEAEE;
    --surface: #FAFAF9;
    --border: #D4D4D8;
    --border-strong: #A1A1AA;
    --text: #1A1A2E;
    --text-muted: #71717A;
    --text-subtle: #9292A0;
    --text-faint: #C4C4CC;
    --primary: #1A1A2E;
    --primary-hover: #000000;
    --primary-text: #FFFFFF;
    --radius-card: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 32px 16px 0;
  }

  main {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    flex: 1;
  }

  /* Loader */
  .page-loader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 9999;
    transition: opacity .25s ease;
  }
  .page-loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Mediakit Card */
  .mk {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-card);
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    visibility: hidden;
  }

  /* Header */
  .mk-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .mk-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: var(--bg);
    border: 1px solid var(--border);
    box-shadow: 0 0 0 3px var(--surface), 0 0 0 4.5px var(--border);
    overflow: hidden;
    flex-shrink: 0;
  }
  .mk-avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .mk-avatar-fallback {
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px; font-weight: 500; color: var(--text-muted);
    background: var(--bg);
  }
  .mk-name {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .mk-name-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .mk-verified {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 2px 7px;
  }
  .mk-handle {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .mk-meta-row {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 6px;
    margin-top: 6px;
  }
  .mk-niche-tag {
    display: inline-block;
    font-size: 11px;
    color: var(--text-muted);
    background: var(--bg);
    border: 1px solid var(--border);
    padding: 3px 10px;
    border-radius: 999px;
  }
  .mk-location {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text-muted);
  }
  .mk-location svg {
    width: 11px;
    height: 11px;
    flex-shrink: 0;
  }

  /* Bio */
  .mk-bio {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.55;
    margin: 0 0 20px;
    white-space: pre-line;
  }

  /* Section label */
  .mk-section-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-subtle);
    font-weight: 600;
    margin-bottom: 8px;
  }

  /* Stats grid */
  .mk-stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
    gap: 6px;
    margin-bottom: 20px;
  }
  .mk-stat {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 10px 8px;
    text-align: center;
  }
  .mk-stat-num {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }
  .mk-stat-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 3px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Platforms */
  .mk-platform {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .mk-platform:last-child { margin-bottom: 0; }
  .mk-platform-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .mk-platform-name {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .mk-platform-name svg { width: 14px; height: 14px; }
  .mk-platform-handle {
    font-size: 11px;
    color: var(--text-muted);
    text-decoration: none;
  }
  .mk-platform-handle:hover { color: var(--text); }
  .mk-platform-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 10px;
  }
  .mk-platform-profile-btn {
    display: block;
    text-align: center;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 500;
    text-decoration: none;
    transition: background .15s ease, border-color .15s ease;
  }
  .mk-platform-profile-btn:hover {
    background: var(--bg);
    border-color: var(--border-strong);
  }

  /* Collaborations Logo Wall */
  .mk-collabs {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 14px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  .mk-collab {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
    aspect-ratio: 1.6 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-muted);
    text-decoration: none;
    text-align: center;
    line-height: 1.2;
    transition: background .15s ease, color .15s ease, border-color .15s ease;
  }
  a.mk-collab:hover {
    background: var(--bg);
    color: var(--text);
    border-color: var(--border-strong);
  }

  /* Contact Section */
  .mk-contact {
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .mk-contact-email {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text);
    text-decoration: none;
    margin-bottom: 8px;
  }
  .mk-contact-email svg {
    width: 14px; height: 14px;
    flex-shrink: 0;
    color: var(--text-muted);
  }
  .mk-cta-btn {
    width: 100%;
    background: var(--primary);
    color: var(--primary-text);
    border: 1px solid var(--primary);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    font-family: inherit;
    transition: background .15s ease, border-color .15s ease;
  }
  .mk-cta-btn:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .mk-cta-btn svg { width: 14px; height: 14px; }

  /* ============= Inquiry Overlay (1:1 BioPage in Clean Farben) ============= */
  .cf-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .cf-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }
  .cf-topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }
  .cf-close {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    font-family: inherit;
    flex-shrink: 0;
    transition: background .15s ease;
  }
  .cf-close:hover { background: var(--bg); border-color: var(--border-strong); }
  .cf-progress {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .cf-progress-fill {
    height: 100%;
    background: var(--primary);
    border-radius: 999px;
    transition: width .3s cubic-bezier(0.2, 0.8, 0.2, 1);
    width: 50%;
  }
  .cf-step-indicator {
    font-size: 12px;
    color: var(--text-muted);
    flex-shrink: 0;
    min-width: 36px;
    text-align: right;
  }
  .cf-slides {
    flex: 1;
    display: flex;
    overflow: hidden;
    transition: transform .35s cubic-bezier(0.2, 0.8, 0.2, 1);
  }
  .cf-slide {
    width: 100%;
    flex-shrink: 0;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 20px 100px;
  }
  .cf-slide-inner {
    max-width: 480px;
    margin: 0 auto;
  }
  .cf-slide h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 6px;
    letter-spacing: -0.02em;
  }
  .cf-slide p.cf-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .cf-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .cf-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all .15s ease;
    width: 100%;
    color: var(--text);
  }
  .cf-card:hover { border-color: var(--border-strong); }
  .cf-card.selected {
    border-color: var(--primary);
    background: color-mix(in srgb, var(--primary) 10%, var(--surface));
  }
  .cf-card-icon {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .cf-card.selected .cf-card-icon {
    background: color-mix(in srgb, var(--primary) 20%, var(--bg));
    border-color: var(--primary);
    color: var(--primary);
  }
  .cf-card-icon svg { width: 18px; height: 18px; }
  .cf-card-text { flex: 1; min-width: 0; }
  .cf-card-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 2px;
  }
  .cf-card-desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.4;
  }
  .cf-field {
    margin-bottom: 16px;
  }
  .cf-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }
  .cf-field label .req { color: var(--primary); margin-left: 2px; }
  .cf-field input,
  .cf-field textarea,
  .cf-field select {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px;
    font-family: inherit;
    font-size: 14px;
    color: var(--text);
    line-height: 1.5;
    transition: border-color .15s ease, background .15s ease;
  }
  .cf-field input:focus, .cf-field textarea:focus, .cf-field select:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--bg);
  }
  .cf-field textarea { resize: vertical; min-height: 120px; }
  .cf-field input::placeholder, .cf-field textarea::placeholder { color: var(--text-faint); }

  .cf-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .cf-chip {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    font-family: inherit;
    font-size: 13px;
    color: var(--text-muted);
    cursor: pointer;
    transition: all .15s ease;
  }
  .cf-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .cf-chip.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--primary-text);
  }

  .cf-bottombar {
    position: absolute;
    left: 0;
    right: 0;
    bottom: 0;
    padding: 14px 18px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .cf-btn {
    flex: 1;
    padding: 14px 18px;
    background: var(--primary);
    color: var(--primary-text);
    border: 1px solid var(--primary);
    border-radius: 12px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, border-color .15s ease;
  }
  .cf-btn:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .cf-btn:disabled { opacity: .45; cursor: not-allowed; }
  .cf-btn-back {
    background: var(--surface);
    color: var(--text);
    border-color: var(--border);
    flex: 0 0 auto;
    padding: 14px 22px;
  }
  .cf-btn-back:hover { background: var(--surface); border-color: var(--border-strong); }

  .cf-error {
    color: #DC2626;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .cf-error.show { display: block; }

  .cf-success {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 20px;
    gap: 16px;
    height: 100%;
  }
  .cf-success-icon {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--primary) 15%, transparent);
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cf-success-icon svg { width: 36px; height: 36px; }
  .cf-success h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin: 0;
  }
  .cf-success p {
    font-size: 14px;
    color: var(--text-muted);
    margin: 0;
    max-width: 320px;
  }
  .cf-success-btn {
    margin-top: 12px;
    padding: 12px 24px;
    background: var(--primary);
    color: var(--primary-text);
    border: 1px solid var(--primary);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
  }
  body.cf-open { overflow: hidden; }
  .mk-platform-stat {
    background: var(--surface);
    border-radius: 6px;
    padding: 8px;
    text-align: center;
  }
  .mk-platform-stat-num {
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
  }
  .mk-platform-stat-label {
    font-size: 9px;
    color: var(--text-muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  /* Content offers */
  .mk-offers {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .mk-offer {
    font-size: 11px;
    color: var(--primary-text);
    background: var(--primary);
    padding: 5px 11px;
    border-radius: 6px;
    font-weight: 500;
  }

  /* Audience boxes */
  .mk-audience-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .mk-audience-box {
    background: var(--bg);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
  }
  .mk-country-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 0;
    font-size: 13px;
  }
  .mk-country-row:not(:last-child) { border-bottom: 1px solid var(--border); padding-bottom: 8px; margin-bottom: 4px; }
  .mk-country-name {
    color: var(--text);
    font-weight: 500;
  }
  .mk-country-pct {
    color: var(--text);
    font-weight: 600;
  }
  .mk-gender-stats {
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 12px;
  }
  .mk-gender-cell {
    text-align: center;
    flex: 1;
  }
  .mk-gender-cell-num {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
  }
  .mk-gender-cell-label {
    font-size: 11px;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .mk-gender-divider {
    width: 1px;
    align-self: stretch;
    background: var(--border);
  }

  /* Section spacing */
  .mk-section {
    margin-bottom: 20px;
  }
  .mk-section:last-of-type { margin-bottom: 0; }

  /* Footer */
  footer {
    width: 100%;
    max-width: 480px;
    padding: 20px 16px 24px;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: 0.02em;
    text-align: center;
    visibility: hidden;
  }
  footer a { color: var(--text-subtle); text-decoration: none; transition: color .15s ease; }
  footer a:hover { color: var(--text-muted); }

  .imprint-link {
    background: none;
    border: none;
    color: var(--text-subtle);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 0.02em;
    cursor: pointer;
    padding: 4px 8px;
    transition: color .15s ease;
  }
  .imprint-link:hover { color: var(--text-muted); }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: var(--text-subtle);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s ease;
  }
  .lang-btn:hover { color: var(--text); }
  .lang-btn.active {
    background: var(--primary);
    color: var(--primary-text);
    font-weight: 600;
  }

  /* Impressum Bottom Sheet */
  .imp-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.35);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .imp-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .imp-sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 85dvh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 1000;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0s linear .3s;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -8px 24px rgba(26, 26, 46, 0.12);
    visibility: hidden;
  }
  .imp-sheet.open {
    transform: translateY(0);
    visibility: visible;
    transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0s linear 0s;
  }
  .imp-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 999px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  .imp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .imp-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .imp-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;

let currentLang = 'de'

function t(key) {
  return (STRINGS[currentLang] && STRINGS[currentLang][key]) || (STRINGS.de[key] || key)
}

// ====================================================================
// FORMATTING
// ====================================================================
function fmtNum(n) {
  if (n == null || n === '') return '–'
  const num = parseFloat(n)
  if (isNaN(num)) return '–'
  if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0', '') + 'M'
  if (num >= 1000) return (num / 1000).toFixed(1).replace('.0', '') + 'K'
  return Math.round(num).toString()
}
function fmtPct(n) {
  if (n == null || n === '') return '–'
  const num = parseFloat(n)
  if (isNaN(num)) return '–'
  return num.toFixed(1).replace('.0', '') + '%'
}
function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}
function capitalize(s) {
  if (!s) return ''
  return s.charAt(0).toUpperCase() + s.slice(1)
}

// ====================================================================
// LOAD DATA
// ====================================================================
async function loadMediakit() {
  const path = window.location.pathname
  const match = path.match(/\/kit\/([^\/]+)/)
  const slug = match ? decodeURIComponent(match[1]) : null

  if (!slug) {
    window.location.replace('https://viuno.de')
    return
  }

  const { data, error } = await supabase
    .from('mediakit_public')
    .select('*')
    .eq('slug', slug)
    .maybeSingle()

  if (error || !data) {
    window.location.replace('https://viuno.de')
    return
  }

  creatorData = data
  renderMediakit(data)

  // ─── Mediakit View Tracking ───
  try {
    fetch(SUPABASE_URL + '/functions/v1/track-mediakit-view', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_id: data.user_id })
    }).catch(() => {})
  } catch (_) {}

  // Sprache: Creator-Default oder DE-Fallback
  const lang = ['de', 'en', 'it'].includes(data.default_language) ? data.default_language : 'de'
  applyLanguage(lang)

  document.getElementById('main').firstElementChild.style.visibility = 'visible'
  document.getElementById('mk-card').style.visibility = 'visible'
  document.getElementById('footer').style.visibility = 'visible'
  const loader = document.getElementById('page-loader')
  loader.classList.add('hide')
  setTimeout(() => loader.remove(), 250)
}

// RENDER
// ====================================================================
function renderMediakit(u) {
  // Title (Browser-Tab)
  document.title = (u.display_name || 'Mediakit') + ' · viuno'

  // Avatar
  const avatarEl = document.getElementById('mk-avatar')
  if (u.profile_image_url) {
    const img = document.createElement('img')
    img.src = u.profile_image_url
    img.alt = u.display_name || ''
    img.onerror = () => {
      avatarEl.innerHTML = '<div class="mk-avatar-fallback">' + escapeHtml((u.display_name || 'C').charAt(0).toUpperCase()) + '</div>'
    }
    avatarEl.appendChild(img)
  } else {
    avatarEl.innerHTML = '<div class="mk-avatar-fallback">' + escapeHtml((u.display_name || 'C').charAt(0).toUpperCase()) + '</div>'
  }

  // Name
  document.getElementById('mk-name').textContent = u.display_name || 'Creator'

  // Verified Badge
  if (u.is_verified) {
    document.getElementById('mk-verified').style.display = 'inline-flex'
  }

  // Handle (Instagram bevorzugt, sonst TikTok, sonst nichts)
  const handleEl = document.getElementById('mk-handle')
  const primaryHandle = u.instagram_handle || u.tiktok_handle
  if (primaryHandle) {
    handleEl.textContent = '@' + primaryHandle
  } else {
    handleEl.style.display = 'none'
  }

  // Meta-Row: Niche + Stadt/Land
  const metaParts = []
  if (u.niche_category) {
    metaParts.push('<span class="mk-niche-tag">' + escapeHtml(capitalize(u.niche_category)) + '</span>')
  }
  const locationStr = [u.city, u.country].filter(Boolean).map(escapeHtml).join(', ')
  if (locationStr) {
    metaParts.push(
      '<span class="mk-location">' +
      '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>' +
      '<span>' + locationStr + '</span>' +
      '</span>'
    )
  }
  if (metaParts.length > 0) {
    document.getElementById('mk-meta-row').innerHTML = metaParts.join('')
  }

  // Bio
  const bioEl = document.getElementById('mk-bio')
  if (u.bio) {
    bioEl.textContent = u.bio
  } else {
    bioEl.style.display = 'none'
  }

  // Reichweite-Stats: Total Follower + Avg Engagement
  const ig = u.instagram_analytics || {}
  const tt = u.tiktok_analytics || {}
  const igFollowers = parseInt(ig.followers || 0) || 0
  const ttFollowers = parseInt(tt.followers || 0) || 0
  const totalFollowers = igFollowers + ttFollowers

  // Engagement: Override aus mediakit_settings hat Vorrang
  const erIg = u.engagement_rate_instagram != null ? parseFloat(u.engagement_rate_instagram) : (ig.engagement_rate ? parseFloat(ig.engagement_rate) : null)
  const erTt = u.engagement_rate_tiktok != null ? parseFloat(u.engagement_rate_tiktok) : (tt.engagement_rate ? parseFloat(tt.engagement_rate) : null)
  const ers = [erIg, erTt].filter(x => x != null && !isNaN(x))
  const avgEng = ers.length ? (ers.reduce((s, n) => s + n, 0) / ers.length) : null

  const statsHtml = []
  if (totalFollowers > 0) {
    statsHtml.push('<div class="mk-stat"><div class="mk-stat-num">' + fmtNum(totalFollowers) + '</div><div class="mk-stat-label" data-i18n="total_followers">' + t('total_followers') + '</div></div>')
  }
  if (avgEng != null) {
    statsHtml.push('<div class="mk-stat"><div class="mk-stat-num">' + fmtPct(avgEng) + '</div><div class="mk-stat-label" data-i18n="avg_engagement">' + t('avg_engagement') + '</div></div>')
  }
  if (statsHtml.length === 0) {
    document.getElementById('mk-stats-section').style.display = 'none'
  } else {
    document.getElementById('mk-stats').innerHTML = statsHtml.join('')
  }

  // Plattformen
  const platformsHtml = []
  if (u.instagram_handle && (igFollowers > 0 || ig.avg_likes || erIg != null)) {
    platformsHtml.push(buildPlatformCard('instagram', u.instagram_handle, igFollowers, ig.avg_likes, ig.avg_views, erIg))
  }
  if (u.tiktok_handle && (ttFollowers > 0 || tt.avg_views || erTt != null)) {
    platformsHtml.push(buildPlatformCard('tiktok', u.tiktok_handle, ttFollowers, tt.avg_likes, tt.avg_views, erTt))
  }
  if (platformsHtml.length === 0) {
    document.getElementById('mk-platforms-section').style.display = 'none'
  } else {
    document.getElementById('mk-platforms').innerHTML = platformsHtml.join('')
  }

  // Content-Angebote
  const offersHtml = []
  if (u.mediakit_ugc) offersHtml.push('<span class="mk-offer" data-i18n="o_ugc">' + t('o_ugc') + '</span>')
  if (u.mediakit_reel) offersHtml.push('<span class="mk-offer" data-i18n="o_reel">' + t('o_reel') + '</span>')
  if (u.mediakit_post) offersHtml.push('<span class="mk-offer" data-i18n="o_post">' + t('o_post') + '</span>')
  if (u.mediakit_story) offersHtml.push('<span class="mk-offer" data-i18n="o_story">' + t('o_story') + '</span>')
  if (offersHtml.length === 0) {
    document.getElementById('mk-offers-section').style.display = 'none'
  } else {
    document.getElementById('mk-offers').innerHTML = offersHtml.join('')
  }

  // Audience: Top-Länder + Geschlecht
  const audienceParts = []

  if (u.top_country_1 || u.top_country_2) {
    const countryRows = []
    if (u.top_country_1) {
      countryRows.push('<div class="mk-country-row"><span class="mk-country-name">' + escapeHtml(u.top_country_1) + '</span><span class="mk-country-pct">' + fmtPct(u.top_country_1_pct) + '</span></div>')
    }
    if (u.top_country_2) {
      countryRows.push('<div class="mk-country-row"><span class="mk-country-name">' + escapeHtml(u.top_country_2) + '</span><span class="mk-country-pct">' + fmtPct(u.top_country_2_pct) + '</span></div>')
    }
    audienceParts.push(
      '<div class="mk-audience-box">' +
      '<div class="mk-section-label" style="margin-bottom:8px;" data-i18n="top_country">' + t('top_country') + '</div>' +
      countryRows.join('') +
      '</div>'
    )
  }

  if (u.audience_female_pct != null || u.audience_male_pct != null) {
    audienceParts.push(
      '<div class="mk-audience-box">' +
      '<div class="mk-section-label" style="margin-bottom:8px;" data-i18n="gender">' + t('gender') + '</div>' +
      '<div class="mk-gender-stats">' +
        '<div class="mk-gender-cell">' +
          '<div class="mk-gender-cell-num">' + fmtPct(u.audience_female_pct) + '</div>' +
          '<div class="mk-gender-cell-label" data-i18n="female">' + t('female') + '</div>' +
        '</div>' +
        '<div class="mk-gender-divider"></div>' +
        '<div class="mk-gender-cell">' +
          '<div class="mk-gender-cell-num">' + fmtPct(u.audience_male_pct) + '</div>' +
          '<div class="mk-gender-cell-label" data-i18n="male">' + t('male') + '</div>' +
        '</div>' +
      '</div>' +
      '</div>'
    )
  }

  if (audienceParts.length === 0) {
    document.getElementById('mk-audience-section').style.display = 'none'
  } else {
    document.getElementById('mk-audience').innerHTML = audienceParts.join('')
  }

  // Kollaborationen
  const collabs = Array.isArray(u.collaborations) ? u.collaborations.filter(c => c && c.name) : []
  if (collabs.length > 0) {
    const collabsHtml = collabs.map(c => {
      const name = escapeHtml(c.name)
      if (c.url) {
        let url = String(c.url).trim()
        if (!/^https?:\/\//i.test(url)) url = 'https://' + url
        return '<a class="mk-collab" href="' + escapeHtml(url) + '" target="_blank" rel="noopener">' + name + '</a>'
      }
      return '<div class="mk-collab">' + name + '</div>'
    }).join('')
    document.getElementById('mk-collabs').innerHTML = collabsHtml
    document.getElementById('mk-collabs-section').style.display = ''
  }

  // Kontakt-E-Mail (Anfragen-Button bleibt immer sichtbar)
  if (u.contact_email) {
    const emailEl = document.getElementById('mk-contact-email')
    emailEl.href = 'mailto:' + u.contact_email
    document.getElementById('mk-contact-email-text').textContent = u.contact_email
    emailEl.style.display = 'flex'
  }
}

function buildPlatformCard(platform, handle, followers, avgLikes, avgViews, er) {
  const cleanHandle = String(handle).replace(/^@/, '')
  const profileUrl = platform === 'instagram'
    ? 'https://instagram.com/' + encodeURIComponent(cleanHandle)
    : 'https://tiktok.com/@' + encodeURIComponent(cleanHandle)

  const platformName = platform === 'instagram' ? 'Instagram' : 'TikTok'
  const platformIcon = platform === 'instagram'
    ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>'
    : '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>'

  const midKey = platform === 'tiktok' ? 'avg_views' : 'avg_likes'
  const midVal = platform === 'tiktok' ? avgViews : avgLikes

  return (
    '<div class="mk-platform">' +
      '<div class="mk-platform-head">' +
        '<div class="mk-platform-name">' + platformIcon + '<span>' + platformName + '</span></div>' +
        '<a class="mk-platform-handle" href="' + escapeHtml(profileUrl) + '" target="_blank" rel="noopener">@' + escapeHtml(cleanHandle) + '</a>' +
      '</div>' +
      '<div class="mk-platform-stats">' +
        '<div class="mk-platform-stat"><div class="mk-platform-stat-num">' + fmtNum(followers) + '</div><div class="mk-platform-stat-label" data-i18n="followers">' + t('followers') + '</div></div>' +
        '<div class="mk-platform-stat"><div class="mk-platform-stat-num">' + fmtNum(midVal) + '</div><div class="mk-platform-stat-label" data-i18n="' + midKey + '">' + t(midKey) + '</div></div>' +
        '<div class="mk-platform-stat"><div class="mk-platform-stat-num">' + (er != null ? fmtPct(er) : '–') + '</div><div class="mk-platform-stat-label" data-i18n="er">' + t('er') + '</div></div>' +
      '</div>' +
      '<a class="mk-platform-profile-btn" href="' + escapeHtml(profileUrl) + '" target="_blank" rel="noopener"><span data-i18n="view_profile">' + t('view_profile') + '</span> ↗</a>' +
    '</div>'
  )
}

// ====================================================================
// LANGUAGE
// ====================================================================
function applyLanguage(lang) {
  currentLang = lang
  document.documentElement.lang = lang

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang)
  })

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n')
    if (STRINGS[lang] && STRINGS[lang][key] != null) {
      el.textContent = STRINGS[lang][key]
    }
  })

  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph')
    if (STRINGS[lang] && STRINGS[lang][k] != null) {
      el.setAttribute('placeholder', STRINGS[lang][k])
    }
  })

  // Inquiry-Button-Texte aktualisieren falls Modal offen
  if (typeof currentStep !== 'undefined' && currentStep < 2) {
    const next = document.getElementById('cf-next')
    if (next) next.textContent = currentStep === 1 ? t('btn_send') : t('btn_next')
  }
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLanguage(btn.dataset.lang))
})

// ====================================================================
// IMPRESSUM BOTTOM SHEET
// ====================================================================
const impSheet = document.getElementById('imp-sheet')
const impBackdrop = document.getElementById('imp-backdrop')
const impContent = document.getElementById('imp-content')

function openImprint() {
  const text = (creatorData?.impressum_text || '').trim()
  if (text) {
    impContent.textContent = text
    impContent.classList.remove('imp-empty')
  } else {
    impContent.textContent = t('imprint_empty')
    impContent.classList.add('imp-empty')
  }
  impSheet.classList.add('open')
  impBackdrop.classList.add('open')
  document.body.classList.add('imp-open')
}

function closeImprint() {
  impSheet.classList.remove('open')
  impBackdrop.classList.remove('open')
  document.body.classList.remove('imp-open')
}

document.getElementById('btn-imprint').addEventListener('click', openImprint)
document.getElementById('imp-close').addEventListener('click', closeImprint)
impBackdrop.addEventListener('click', closeImprint)

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (impSheet.classList.contains('open')) closeImprint()
    if (overlay.classList.contains('open')) closeInquiry()
  }
})

// ====================================================================
// INQUIRY OVERLAY (1:1 BioPage Logic)
// ====================================================================
const overlay = document.getElementById('cf-overlay')
const slidesEl = document.getElementById('cf-slides')
const backBtn = document.getElementById('cf-back')
const nextBtn = document.getElementById('cf-next')
const progressFill = document.getElementById('cf-progress-fill')
const stepIndicator = document.getElementById('cf-step-indicator')
const bottomBar = document.getElementById('cf-bottombar')

const TOTAL_STEPS = 2
let currentStep = 0
const formData = {
  request_type: null,
  budget: '',
  name: '',
  email: '',
  website: '',
  message: ''
}

function applyPlaceholders() {
  document.querySelectorAll('[data-i18n-ph]').forEach(el => {
    const k = el.getAttribute('data-i18n-ph')
    if (STRINGS[currentLang] && STRINGS[currentLang][k] != null) {
      el.setAttribute('placeholder', STRINGS[currentLang][k])
    }
  })
}

function openInquiry() {
  currentStep = 0
  formData.request_type = null
  formData.budget = ''
  document.querySelectorAll('.cf-card').forEach(c => c.classList.remove('selected'))
  document.querySelectorAll('.cf-chip').forEach(c => c.classList.remove('selected'))
  document.getElementById('cf-name').value = ''
  document.getElementById('cf-email').value = ''
  document.getElementById('cf-website').value = ''
  document.getElementById('cf-message').value = ''
  document.getElementById('cf-err-1').classList.remove('show')
  document.getElementById('cf-err-2').classList.remove('show')
  applyPlaceholders()
  goToStep(0)
  overlay.classList.add('open')
  document.body.classList.add('cf-open')
}

function closeInquiry() {
  overlay.classList.remove('open')
  document.body.classList.remove('cf-open')
}

function goToStep(step) {
  currentStep = step
  slidesEl.style.transform = 'translateX(-' + (step * 100) + '%)'

  if (step >= TOTAL_STEPS) {
    bottomBar.style.display = 'none'
    progressFill.style.width = '100%'
    stepIndicator.textContent = '✓'
    return
  }

  bottomBar.style.display = 'flex'
  progressFill.style.width = ((step + 1) / TOTAL_STEPS * 100) + '%'
  stepIndicator.textContent = (step + 1) + '/' + TOTAL_STEPS
  backBtn.style.visibility = step === 0 ? 'hidden' : 'visible'
  nextBtn.textContent = step === TOTAL_STEPS - 1 ? t('btn_send') : t('btn_next')
}

function updateConditionalFields() {
  const t = formData.request_type
  document.getElementById('cf-website-field').style.display = (t === 'brand' || t === 'collab') ? '' : 'none'
  document.getElementById('cf-budget-field').style.display = (t === 'brand') ? '' : 'none'
}

function validateSlide(step) {
  if (step === 0) {
    if (!formData.request_type) {
      document.getElementById('cf-err-1').classList.add('show')
      return false
    }
    return true
  }
  if (step === 1) {
    formData.name = document.getElementById('cf-name').value.trim()
    formData.email = document.getElementById('cf-email').value.trim()
    formData.website = document.getElementById('cf-website').value.trim()
    formData.message = document.getElementById('cf-message').value.trim()
    const errEl = document.getElementById('cf-err-2')

    if (!formData.name || !formData.email || !formData.message) {
      errEl.textContent = t('err_required')
      errEl.classList.add('show')
      return false
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email)) {
      errEl.textContent = t('err_email')
      errEl.classList.add('show')
      return false
    }
    errEl.classList.remove('show')
    return true
  }
  return true
}

document.querySelectorAll('.cf-card').forEach(card => {
  card.addEventListener('click', () => {
    document.querySelectorAll('.cf-card').forEach(c => c.classList.remove('selected'))
    card.classList.add('selected')
    formData.request_type = card.dataset.value
    document.getElementById('cf-err-1').classList.remove('show')
    updateConditionalFields()
  })
})

document.querySelectorAll('.cf-chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const group = chip.closest('.cf-chips')
    group.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'))
    chip.classList.add('selected')
    if (group.dataset.field === 'budget') {
      formData.budget = chip.dataset.value
    }
  })
})

document.getElementById('btn-inquiry').addEventListener('click', openInquiry)
document.getElementById('cf-close').addEventListener('click', closeInquiry)
document.getElementById('cf-done').addEventListener('click', closeInquiry)

backBtn.addEventListener('click', () => {
  if (currentStep > 0) goToStep(currentStep - 1)
})

nextBtn.addEventListener('click', async () => {
  if (!validateSlide(currentStep)) return

  if (currentStep < TOTAL_STEPS - 1) {
    goToStep(currentStep + 1)
    return
  }

  // Submit
  nextBtn.disabled = true
  nextBtn.textContent = '...'
  try {
    const payload = {
      creator_id: creatorData.user_id,
      request_type: formData.request_type,
      sender_name: formData.name,
      sender_email: formData.email,
      sender_website: formData.website || null,
      budget: formData.budget || null,
      message: formData.message,
      source: 'mediakit'
    }
    const res = await fetch(SUPABASE_URL + '/rest/v1/collab_requests', {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Content-Type': 'application/json',
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    })
    if (!res.ok) throw new Error('submit failed')

    // Success-Slide aufbauen
    const sub = document.getElementById('cf-success-sub')
    if (sub) sub.textContent = t('s_sub').replace('{name}', creatorData.display_name || '')
    goToStep(TOTAL_STEPS)
  } catch (err) {
    document.getElementById('cf-err-2').textContent = t('err_send')
    document.getElementById('cf-err-2').classList.add('show')
    nextBtn.disabled = false
    nextBtn.textContent = t('btn_send')
  }
})

// ====================================================================
// START
// ====================================================================
loadMediakit()
</script>
