var(--border-strong)}.platform-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}.platform-icon.ig{background:#fce4ec}.platform-icon.tt{background:#e8eaf6}.platform-icon.yt{background:#ffebee}.platform-icon.th{background:#e8f5e9}.platform-info{flex:1;min-width:0}.platform-name{font-size:13px;font-weight:600;color:var(--text)}.platform-handle{font-size:12px;color:var(--text-muted)}.platform-stats{text-align:right;flex-shrink:0}.platform-stat-val{font-size:13px;font-weight:600;color:var(--text)}.platform-stat-label{font-size:11px;color:var(--text-faint)}.audience-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.audience-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 12px}.audience-label{font-size:11px;color:var(--text-subtle);font-weight:500;margin-bottom:10px}.gender-bars{display:flex;flex-direction:column;gap:8px}.gender-bar-row{display:flex;align-items:center;gap:8px;font-size:12px}.gender-bar-label{width:14px;color:var(--text-muted);font-size:11px;font-weight:600}.gender-bar-track{flex:1;height:6px;background:var(--border);border-radius:999px;overflow:hidden}.gender-bar-fill{height:100%;border-radius:999px;background:var(--accent)}.gender-bar-fill.female{background:#e91e8c}.gender-bar-pct{width:32px;text-align:right;font-weight:600;color:var(--text);font-size:12px}.countries-list{display:flex;flex-direction:column;gap:8px}.country-row{font-size:13px;color:var(--text-muted)}.offers-grid{display:flex;flex-wrap:wrap;gap:8px}.offer-pill{background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:6px}.offer-icon{font-size:14px}.brands-grid{display:flex;flex-wrap:wrap;gap:8px}.brand-pill{background:var(--bg);border:1px solid var(--border);border-radius:999px;padding:7px 14px;font-size:13px;font-weight:500;color:var(--text);text-dec kground:#F0F0F0;border:1px solid var(--border);border-radius:999px;padding:3px}.lang-btn{background:transparent;border:none;color:var(--text-subtle);font-size:10px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:5px 10px;border-radius:999px;cursor:pointer;font-family:inherit;transition:all .15s ease}.lang-btn:hover{color:var(--text)}.lang-btn.active{background:#111111;color:#FFFFFF;font-weight:600}@media (max-width:540px){.hero-inner{flex-direction:column;gap:14px}.avatar{width:68px;height:68px}.hero-name{font-size:20px}.stats-grid{grid-template-columns:1fr 1fr}.audience-grid{grid-template-columns:1fr}}</style></head><body><div class="page-loader" id="page-loader"><div class="spinner"></div></div><div id="main"><header class="header-bar"><span class="header-brand">viuno &middot; Media Kit</span><div style="display:flex;align-items:center;gap:10px"><div class="lang-switch"><button class="lang-btn" data-lang="de" type="button">DE</button><button class="lang-btn" data-lang="en" type="button">EN</button><button class="lang-btn" data-lang="it" type="button">IT</button></div><a class="cta-btn" id="mk-cta" href="#"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span data-i18n="contact">Kontakt</span></a></div></header><section class="hero"><div class="hero-inner"><div class="avatar" id="mk-avatar"></div><div class="hero-text"><h1 class="hero-name" id="mk-name"></h1><div class="hero-meta" id="mk-niche"></div><p class="hero-bio" id="mk-bio"></p></div></div></section><main class="content"><div class="section" id="section-platforms"><div class="section-title" data-i18n="platforms">Plattformen</div><div class="platforms-list" id="mk-platforms"></div></div><div class="section" id="section-stats"><div class="section-title" data-i18n="stats">Kennzahlen</div><div class="stats-grid" id="mk-stats"></div></div><div class="section" id="section-audience"><div class="section-title" data-i18n="audience">Zielgruppe</div><div class="audience-grid"><div class="audience-block" id="gender-block"><div class="audience-label" data-i18n="gender">Geschlecht</div><div id="mk-gender"></div></div><div class="audience-block" id="countries-block"><div class="audience-label" data-i18n="countries">Top Laender</div><div id="mk-countries"></div></div></div></div><div class="section" id="section-offers"><div class="section-title" data-i18n="offers">Content Angebote</div><div class="offers-grid" id="mk-offers"></div></div><div class="section" id="section-brands"><div class="section-title" data-i18n="brands">Marken Kooperationen</div><div class="brands-grid" id="mk-brands"></div></div></main><footer class="footer-bar"><a href="https://viuno.de" target="_blank" rel="noopener">viuno</a> &nbsp;&middot;&nbsp; <button type="button" id="btn-imprint" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--text-subtle);font-family:inherit" data-i18n="imprint">Impressum</button></footer></div><div class="imp-backdrop" id="imp-backdrop"></div><div class="imp-sheet" id="imp-sheet"><div class="imp-handle"></div><div class="imp-header"><span class="imp-title" data-i18n="imprint">Impressum</span><button type="button" class="imp-close" id="imp-close">&times;</button></div><div class="imp-content" id="imp-content"></div></div><script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } })
const STRINGS = {
  de: { contact:'Kontakt aufnehmen', imprint:'Impressum', imprint_empty:'Kein Impressum hinterlegt.', powered:'powered by', platforms:'Plattformen', stats:'Kennzahlen', audience:'Zielgruppe', gender:'Geschlecht', countries:'Top Laender', offers:'Content Angebote', brands:'Marken Kooperationen', female:'W', male:'M', followers:'Follower', er:'Engagement Rate', avg_likes:'Avg Likes', avg_views:'Avg Views', offer_ugc_video:'UGC Video', offer_instagram_reel:'Instagram Reel', offer_tiktok_post:'TikTok Post', offer_story_package:'Story Package' },

}
let currentLang = 'de', creatorData = null, brands = [], offers = []
function t(k){ return STRINGS[currentLang][k] ?? k }
function normalizeUrl(u){ return u ? (u.startsWith('http') ? u : 'https://' + u) : '#' }
function fmt(n){ if(n==null) return '-'; if(n>=1000000) return (n/1000000).toFixed(1).replace(/.0$/,'')+'M'; if(n>=1000) return (n/1000).toFixed(1).replace(/.0$/,'')+'k'; return String(n) }
function esc(s){ return String(s??'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])) }
function applyLanguage(lang){
  if(!STRINGS[lang]) lang='de'
  currentLang=lang
  document.documentElement.lang=lang
  document.querySelectorAll('[data-i18n]').forEach(el=>{ el.textContent=t(el.dataset.i18n) })
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang))
  if(creatorData) renderPage()
}
function getSlug(){
  const p=window.location.pathname.replace(/^[/]+|[/]+$/g,'')
  const parts=p.split('/')
  return parts.length>=2?parts[1]:null
}
async function loadPage(){
  const slug=getSlug()
  if(!slug){window.location.replace('https://viuno.de'); return}
  const {data,error}=await sb.from('mediakit_public').select('*').ilike('display_name',slug).maybeSingle()
  if(error||!data){window.location.replace('https://viuno.de'); return}
  creatorData=data
  const [b,o]=await Promise.all([
    sb.from('mediakit_brands').select('*').eq('user_id',data.user_id).order('position',{ascending:true}),
    sb.from('mediakit_content_offers').select('*').eq('user_id',data.user_id)
  ])
  brands=b.data??[]
  offers=o.data??[]
  const navLang=navigator.language.slice(0,2)
  const lang=['de','en','it'].includes(navLang)?navLang:'de'
  applyLanguage(lang)
  track(data.user_id)
  document.getElementById('main').style.visibility='visible'
  const ld=document.getElementById('page-loader')
  ld.classList.add('hide'); setTimeout(()=>ld.remove(),250)
}
async function track(uid){
  try{
    const ref=document.referrer||'direct'
    const hour=new Date().getHours()
    fetch(SUPABASE_URL+'/rest/v1/mediakit_aufrufe',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Prefer':'return=minimal'},body:JSON.stringify({user_id:uid,referrer_source:ref,hour_of_day:hour,language:currentLang})})
  }catch(_){}
}
function renderPage(){
  const u=creatorData
  document.title=(u.display_name||'Media Kit')+' - Media Kit'
  const av=document.getElementById('mk-avatar')
  if(u.profile_image_url){
    const img=document.createElement('img')
    img.src=u.profile_image_url; img.alt=''
    img.onerror=function(){ av.textContent=(u.display_name||' ')[0].toUpperCase() }
    av.innerHTML=''; av.appendChild(img)
  } else { av.textContent=(u.display_name||' ')[0].toUpperCase() }
  document.getElementById('mk-name').textContent=u.display_name||''
  const meta=document.getElementById('mk-niche'); meta.innerHTML=''
  if(u.niche_category){ const s=document.createElement('span'); s.className='niche-pill'; s.textContent=u.niche_category; meta.appendChild(s) }
  if(u.city){ const s=document.createElement('span'); s.className='city-pill'; s.textContent='📍 '+u.city; meta.appendChild(s) }
  const bioEl=document.getElementById('mk-bio')
  bioEl.textContent=u.bio||''; bioEl.style.display=u.bio?'':'none'
  document.getElementById('mk-cta').href='mailto:'+esc(u.contact_email||'')
  document.getElementById('mk-cta').querySelector('[data-i18n="contact"]').textContent=t('contact')
  renderPlatforms(u); renderStats(u); renderAudience(u); renderOffers(); renderBrands()
}
function renderPlatforms(u){
  const c=document.getElementById('mk-platforms'); c.innerHTML=''
  const defs=[
    {key:'instagram',cls:'ig',label:'Instagram',url:'https://instagram.com/',erKey:'er_instagram',statKey:'avg_likes_instagram',statLabel:'avg_likes'},
    {key:'tiktok',cls:'tt',label:'TikTok',url:'https://tiktok.com/@',erKey:'er_tiktok',statKey:'avg_views_tiktok',statLabel:'avg_views'},
    {key:'youtube',cls:'yt',label:'YouTube',url:'https://youtube.com/@',erKey:null,statKey:null,statLabel:null},
    {key:'threads',cls:'th',label:'Threads',url:'https://threads.net/@',erKey:null,statKey:null,statLabel:null}
  ]
  const icons={
    instagram:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>',
    tiktok:'<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>',
    youtube:'<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 0 0 .5 6.5C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 0 0 2.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.4a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>',
    threads:'<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>'
  }
  defs.forEach(function(d){
    const handle=u[d.key+'_handle']
    if(!handle) return
    const clean=handle.replace(/^@/,'')
    const a=document.createElement('a')

    a.href=d.url+encodeURIComponent(clean)
    a.target='_blank'; a.rel='noopener'
    const iconDiv=document.createElement('div')
    iconDiv.className='platform-icon '+d.cls
    iconDiv.innerHTML=icons[d.key]
    const infoDiv=document.createElement('div')
    infoDiv.className='platform-info'
    const nameDiv=document.createElement('div'); nameDiv.className='platform-name'; nameDiv.textContent=d.label
    const handleDiv=document.createElement('div'); handleDiv.className='platform-handle'; handleDiv.textContent='@'+clean
    infoDiv.appendChild(nameDiv); infoDiv.appendChild(handleDiv)
    a.appendChild(iconDiv); a.appendChild(infoDiv)
    const erVal=d.erKey?u[d.erKey]:null
    const statVal=d.statKey?u[d.statKey]:null
    if(erVal!=null||statVal!=null){

function renderStats(u){
  const grid=document.getElementById('mk-stats'); grid.innerHTML=''
  const items=[]
  if(u.er_instagram!=null) items.push({label:t('er')+' IG',val:u.er_instagram+'%',sub:'Instagram'})
  if(u.er_tiktok!=null) items.push({label:t('er')+' TT',val:u.er_tiktok+'%',sub:'TikTok'})
  if(u.avg_likes_instagram!=null) items.push({label:t('avg_likes'),val:fmt(u.avg_likes_instagram),sub:'Instagram'})
  if(u.avg_views_tiktok!=null) items.push({label:t('avg_views'),val:fmt(u.avg_views_tiktok),sub:'TikTok'})
  if(!items.length){document.getElementById('section-stats').style.display='none'; return}
  document.getElementById('section-stats').style.display=''
  items.forEach(function(item){
    const d=document.createElement('div'); d.className='stat-card'
    const l=document.createElement('div'); l.className='stat-label'; l.textContent=item.label
    const v=document.createElement('div'); v.className='stat-value'; v.textContent=item.val
    const s=document.createElement('div'); s.className='stat-sub'; s.textContent=item.sub
    d.appendChild(l); d.appendChild(v); d.appendChild(s)
    grid.appendChild(d)
  })
}
function renderAudience(u){
  const hasGender=u.gender_female_pct!=null||u.gender_male_pct!=null
  const hasCountry=u.top_country_1||u.top_country_2
  const sec=document.getElementById('section-audience')
  if(!hasGender&&!hasCountry){sec.style.display='none'; return}
  sec.style.display=''
  const gBlock=document.getElementById('gender-block')
  if(hasGender){
    gBlock.style.display=''
    const f=u.gender_female_pct??0; const m=u.gender_male_pct??0
    const bars=document.getElementById('mk-gender'); bars.innerHTML=''
    const makebar=function(lbl,pct,isFemale){
      const row=document.createElement('div'); row.className='gender-bar-row'
      const l=document.createElement('span'); l.className='gender-bar-label'; l.textContent=lbl
      const track=document.createElement('div'); track.className='gender-bar-track'
      const fill=document.createElement('div'); fill.className='gender-bar-fill'+(isFemale?' female':''); fill.style.width=pct+'%'
      track.appendChild(fill)
      const p=document.createElement('span'); p.className='gender-bar-pct'; p.textContent=pct+'%'
      row.appendChild(l); row.appendChild(track); row.appendChild(p)
      bars.appendChild(row)
    }
    const wrap=document.createElement('div'); wrap.className='gender-bars'; bars.appendChild(wrap)
    makebar(t('female'),f,true); makebar(t('male'),m,false)
  } else { gBlock.style.display='none' }
  const cBlock=document.getElementById('countries-block')
  if(hasCountry){
    cBlock.style.display=''
    const cc=document.getElementById('mk-countries'); cc.innerHTML=''
    const list=document.createElement('div'); list.className='countries-list'
    if(u.top_country_1){const r=document.createElement('div'); r.className='country-row'; r.textContent=u.top_country_1; list.appendChild(r)}
    if(u.top_country_2){const r=document.createElement('div'); r.className='country-row'; r.textContent=u.top_country_2; list.appendChild(r)}
    cc.appendChild(list)
  } else { cBlock.style.display='none' }
}
function renderOffers(){
  const c=document.getElementById('mk-offers'); c.innerHTML=''
  const sec=document.getElementById('section-offers')
  if(!offers.length){sec.style.display='none'; return}
  sec.style.display=''
  const icons={ugc_video:'🎬',instagram_reel:'📸',tiktok_post:'🎵',story_package:'📱'}
  offers.forEach(function(o){
    const pill=document.createElement('div'); pill.className='offer-pill'
    const icon=document.createElement('span'); icon.className='offer-icon'; icon.textContent=icons[o.offer_type]||''
    const lbl=document.createTextNode(t('offer_'+o.offer_type))
    pill.appendChild(icon); pill.appendChild(lbl)
    c.appendChild(pill)
  })
}
function renderBrands(){
  const c=document.getElementById('mk-brands'); c.innerHTML=''
  const sec=document.getElementById('section-brands')
  if(!brands.length){sec.style.display='none'; return}
  sec.style.display=''
  brands.forEach(function(b){
    const el=b.url?document.createElement('a'):document.createElement('div')
    el.className='brand-pill'
    if(b.url){el.href=normalizeUrl(b.url); el.target='_blank'; el.rel='noopener'}
    el.textContent=b.name
    c.appendChild(el)
  })
}
const impBackdrop=document.getElementById('imp-backdrop')
const impSheet=document.getElementById('imp-sheet')
const impContent=document.getElementById('imp-content')
function openImprint(){
  const text=(creatorData?.impressum_text||'').trim()
  if(text){impContent.textContent=text; impContent.classList.remove('imp-empty')}
  else{impContent.textContent=t('imprint_empty'); impContent.classList.add('imp-empty')}
  impSheet.classList.add('open'); impBackdrop.classList.add('open'); document.body.classList.add('imp-open')
}
function closeImprint(){
  impSheet.classList.remove('open'); impBackdrop.classList.remove('open'); document.body.classList.remove('imp-open')
}
document.getElementById('btn-imprint').addEventListener('click', openImprint)
document.getElementById('imp-close').addEventListener('click', closeImprint)
impBackdrop.addEventListener('click', closeImprint)
document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeImprint() })
document.querySelectorAll('.lang-btn').forEach(function(b){ b.addEventListener('click',function(){ applyLanguage(b.dataset.lang) }) })
loadPage()
</script></body></html>
