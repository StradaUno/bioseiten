<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Kit</title>
  <meta property="og:title" content="Media Kit">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'DM Sans', sans-serif; background: #F0EDE8; min-height: 100vh; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px 48px; }
    .kit { width: 100%; max-width: 400px; background: #FAFAF8; border-radius: 20px; border: 1px solid #E2DDD8; overflow: hidden; }
    .loading { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 80px 20px; gap: 16px; color: #9B9490; font-size: 14px; }
    .spinner { width: 32px; height: 32px; border: 3px solid #E2DDD8; border-top-color: #1C1A18; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error { padding: 60px 24px; text-align: center; color: #9B9490; font-size: 14px; line-height: 1.6; }
    .error strong { display: block; color: #1C1A18; font-size: 16px; margin-bottom: 8px; }
    .hero { background: #F3F1ED; padding: 24px 22px 20px; border-bottom: 1px solid #E2DDD8; }
    .hero-row { display: flex; gap: 14px; align-items: flex-start; margin-bottom: 12px; }
    .avatar { width: 56px; height: 56px; border-radius: 50%; background: #1C1A18; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 20px; color: #E8FF59; flex-shrink: 0; overflow: hidden; }
    .avatar img { width: 56px; height: 56px; object-fit: cover; }
    .name { font-family: 'DM Serif Display', serif; font-size: 21px; line-height: 1.2; color: #1C1A18; margin-bottom: 3px; }
    .loc { font-size: 11px; color: #9B9490; margin-bottom: 8px; }
    .tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .tag { font-size: 10px; background: #E8E4DF; color: #6F6A66; padding: 3px 9px; border-radius: 20px; }
    .bio { font-size: 12.5px; color: #6F6A66; line-height: 1.55; }
    .stats { display: grid; grid-template-columns: 1fr 1fr; border-bottom: 1px solid #E2DDD8; }
    .stat { text-align: center; padding: 16px 8px; }
    .stat:first-child { border-right: 1px solid #E2DDD8; }
    .sv { font-size: 26px; font-weight: 500; color: #1C1A18; line-height: 1; }
    .sl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: #9B9490; margin-top: 4px; }
    .section { padding: 16px 20px; border-bottom: 1px solid #E2DDD8; }
    .st { font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.08em; color: #9B9490; margin-bottom: 14px; }
    .pb { margin-bottom: 16px; }
    .pb:last-child { margin-bottom: 0; }
    .ph { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    .pn { font-size: 15px; font-weight: 500; color: #1C1A18; }
    .phd { font-size: 12px; color: #9B9490; }
    .pnums { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
    .pnum { background: #F3F1ED; border-radius: 10px; padding: 10px; }
    .pv { font-size: 18px; font-weight: 500; color: #1C1A18; line-height: 1; }
    .pl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.05em; color: #9B9490; margin-top: 3px; }
    .agrid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .ab { background: #F3F1ED; border-radius: 10px; padding: 12px; }
    .ab.full { grid-column: span 2; }
    .al { font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em; color: #9B9490; margin-bottom: 5px; }
    .av { font-size: 15px; font-weight: 500; color: #1C1A18; }
    .arow { display: flex; justify-content: space-between; }
    .arow span { font-size: 13px; font-weight: 500; color: #1C1A18; }
    .offers { display: flex; flex-wrap: wrap; gap: 6px; }
    .offer { font-size: 12px; padding: 7px 14px; border-radius: 20px; background: #F3F1ED; color: #1C1A18; }
    .cta { padding: 16px 20px 20px; }
    .btn { display: block; width: 100%; background: #1C1A18; color: #fff; text-align: center; padding: 14px; border-radius: 12px; font-weight: 500; font-size: 13px; font-family: 'DM Sans', sans-serif; text-decoration: none; }
    .footer { text-align: center; padding: 0 20px 18px; font-size: 10px; color: #9B9490; }
    .footer a { color: #9B9490; text-decoration: none; }
  </style>
</head>
<body>
  <div class="kit" id="kit">
    <div class="loading"><div class="spinner"></div><span>Lade Media Kit…</span></div>
  </div>
  <script>
    const SUPABASE_URL = 'https://bzejndghppuipnedasuv.supabase.co'
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM3MDI4MDcsImV4cCI6MjA1OTI3ODgwN30.fFMlBfC85yLOAVNpEhXtmR00gEoA2-S-qTFMEi8NPEY'
    const { createClient } = supabase
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)
    function fmt(n){if(!n&&n!==0)return'—';const num=parseFloat(n);if(num>=1000000)return(num/1000000).toFixed(1).replace('.0','')+'M';if(num>=1000)return(num/1000).toFixed(1).replace('.0','')+'K';return String(num)}
    function pct(n){return(!n&&n!==0)?'—':parseFloat(n).toFixed(1)+'%'}
    function esc(str){if(!str)return'';return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
    function renderKit(d){
      const name=esc(d.display_name||'Creator')
      const loc=[d.city,d.country].filter(Boolean).map(esc).join(', ')
      const niches=(d.niche||'').split(',').map(s=>s.trim()).filter(Boolean)
      const platforms=Array.isArray(d.platforms)?d.platforms:[]
      const totalFol=platforms.reduce((s,p)=>s+(parseInt(p.follower_count)||0),0)
      const rates=platforms.map(p=>parseFloat(p.engagement_rate)).filter(n=>!isNaN(n))
      const avgEng=rates.length?(rates.reduce((s,n)=>s+n,0)/rates.length).toFixed(1)+'%':'—'
      const avatarInner=d.profile_image_url?'<img src="'+esc(d.profile_image_url)+'" alt="'+name+'">':'<span>'+(d.display_name||'C')[0].toUpperCase()+'</span>'
      const contactHref=d.contact_email?'mailto:'+esc(d.contact_email)+'?subject=Kooperationsanfrage':'mailto:?subject=Kooperationsanfrage'
      let platformsHtml=''
      for(const p of platforms){
        const pname=p.platform==='instagram'?'Instagram':p.platform==='tiktok'?'TikTok':p.platform
        const handle=p.username?'@'+esc(p.username):''
        const midLabel=p.platform==='tiktok'?'Ø Views':'Ø Likes'
        const midVal=p.platform==='tiktok'?fmt(p.avg_views):fmt(p.avg_likes)
        platformsHtml+='<div class="pb"><div class="ph"><div class="pn">'+pname+'</div><div class="phd">'+handle+'</div></div><div class="pnums"><div class="pnum"><div class="pv">'+fmt(p.follower_count)+'</div><div class="pl">Follower</div></div><div class="pnum"><div class="pv">'+midVal+'</div><div class="pl">'+midLabel+'</div></div><div class="pnum"><div class="pv">'+(p.engagement_rate||'—')+'</div><div class="pl">Engagement</div></div></div></div>'
      }
      let audienceHtml=''
      if(d.top_country_1||d.audience_female_pct){
        let boxes=''
        if(d.top_country_1)boxes+='<div class="ab"><div class="al">Top Land</div><div class="av">'+esc(d.top_country_1)+(d.top_country_1_pct?' '+pct(d.top_country_1_pct):'')+'</div></div>'
        if(d.top_country_2)boxes+='<div class="ab"><div class="al">2. Land</div><div class="av">'+esc(d.top_country_2)+(d.top_country_2_pct?' '+pct(d.top_country_2_pct):'')+'</div></div>'
        if(d.audience_female_pct||d.audience_male_pct)boxes+='<div class="ab full"><div class="al">Geschlecht</div><div class="arow"><span>Weiblich '+pct(d.audience_female_pct)+'</span><span>Männlich '+pct(d.audience_male_pct)+'</span></div></div>'
        audienceHtml='<div class="section"><div class="st">Audience</div><div class="agrid">'+boxes+'</div></div>'
      }
      const offerMap=[[d.mediakit_ugc,'UGC Video'],[d.mediakit_reel,'Instagram Reel'],[d.mediakit_post,'TikTok Post'],[d.mediakit_story,'Story Package']]
      const activeOffers=offerMap.filter(([on])=>on).map(([,l])=>'<div class="offer">'+l+'</div>').join('')
      const offersHtml=activeOffers?'<div class="section"><div class="st">Leistungen</div><div class="offers">'+activeOffers+'</div></div>':''
      document.title=name+' — Media Kit'
      document.getElementById('kit').innerHTML='<div class="hero"><div class="hero-row"><div class="avatar">'+avatarInner+'</div><div><div class="name">'+name+'</div>'+(loc?'<div class="loc">'+loc+'</div>':'')+(niches.length?'<div class="tags">'+niches.map(n=>'<div class="tag">'+esc(n)+'</div>').join('')+'</div>':'')+'</div></div>'+(d.bio?'<p class="bio">'+esc(d.bio)+'</p>':'')+'</div><div class="stats"><div class="stat"><div class="sv">'+fmt(totalFol)+'</div><div class="sl">Follower gesamt</div></div><div class="stat"><div class="sv">'+avgEng+'</div><div class="sl">Ø Engagement</div></div></div>'+(platforms.length?'<div class="section"><div class="st">Plattformen</div>'+platformsHtml+'</div>':'')+audienceHtml+offersHtml+'<div class="cta"><a class="btn" href="'+contactHref+'">Kooperation anfragen</a></div><div class="footer">erstellt mit <a href="https://veuno.de">veuno</a></div>'
    }
    async function load(){
      const params=new URLSearchParams(window.location.search)
      const slug=params.get('slug')
      if(!slug){document.getElementById('kit').innerHTML='<div class="error"><strong>Kein Profil gefunden</strong>Bitte überprüfe den Link.</div>';return}
      const{data,error}=await db.from('media_kit_public').select('*').eq('slug',slug).single()
      if(error||!data){document.getElementById('kit').innerHTML='<div class="error"><strong>Media Kit nicht verfügbar</strong>Dieses Profil hat noch kein Media Kit veröffentlicht.</div>';return}
      renderKit(data)
    }
    load()
  </script>
</body>
</html>
