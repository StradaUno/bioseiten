<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>veuno · Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f5f4f2;
  --surface: #ffffff;
  --surface2: #f0efed;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.13);
  --text: #111110;
  --muted: #7a7975;
  --subtle: #b0afa9;
  --green: #1a7f4b;
  --green-bg: #edf7f1;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --orange: #b85c00;
  --orange-bg: #fdf3e7;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  background: var(--bg);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  color: var(--text);
  font-size: 14px;
}

/* ─── LOGIN ─── */
#login-screen { min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.login-card { width: 100%; max-width: 360px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 28px; }
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-logo-mark { width: 32px; height: 32px; border-radius: 8px; background: var(--text); color: white; display: grid; place-items: center; font-size: 14px; font-weight: 700; }
.login-logo-text { font-size: 17px; font-weight: 700; letter-spacing: -.03em; }
.login-title { font-size: 20px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.field input { width: 100%; padding: 11px 14px; border: 1px solid var(--border-strong); border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; color: var(--text); background: var(--bg); outline: none; transition: border-color .15s; }
.field input:focus { border-color: var(--text); }
.btn-login { width: 100%; padding: 12px; margin-top: 8px; background: var(--text); color: white; border: none; border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-login:disabled { opacity: .5; cursor: not-allowed; }
.login-error { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; min-height: 18px; }

/* ─── APP SHELL ─── */
#app { display: none; min-height: 100dvh; flex-direction: column; }
#app.visible { display: flex; }

/* top bar */
.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,244,242,0.92); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px;
  height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.topbar-mark {
  width: 26px; height: 26px; border-radius: 6px;
  background: var(--text); color: white;
  display: grid; place-items: center; font-size: 11px; font-weight: 700;
}
.topbar-name { font-size: 15px; font-weight: 700; letter-spacing: -.03em; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.topbar-avatar {
  width: 32px; height: 32px; border-radius: 50%;
  background: var(--text); color: white;
  display: grid; place-items: center; font-size: 12px; font-weight: 600;
  cursor: pointer;
}

/* page content */
.page { flex: 1; padding: 0 0 calc(80px + var(--safe-bottom)); overflow-y: auto; }

/* page header */
.page-header { padding: 20px 20px 0; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -.04em; color: var(--text); }
.page-sub { font-size: 13px; color: var(--muted); margin-top: 3px; }

/* platform toggle */
.platform-row {
  display: flex; gap: 6px; padding: 16px 20px 0;
}
.plat-btn {
  flex: 1; padding: 10px; border-radius: var(--radius-sm);
  font-size: 13px; font-weight: 500; text-align: center;
  cursor: pointer; border: 1px solid var(--border-strong);
  background: var(--surface); color: var(--muted);
  font-family: inherit; transition: all .15s;
}
.plat-btn.active { background: var(--text); color: white; border-color: var(--text); }
.plat-btn:disabled { opacity: .4; cursor: not-allowed; }

/* ─── SECTION ─── */
.section { padding: 16px 20px 0; }
.section-label {
  font-size: 10px; font-weight: 600; color: var(--subtle);
  text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px;
}

/* ─── KPI ROW ─── */
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.kpi-grid.three { grid-template-columns: 1fr 1fr 1fr; }

.kpi-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px;
}
.kpi-card.dark { background: var(--text); border-color: var(--text); grid-column: 1 / -1; padding: 16px 18px; }
.kpi-card.dark .kpi-label { color: rgba(255,255,255,.45); }
.kpi-card.dark .kpi-value { color: white; font-size: 30px; }
.kpi-card.dark .kpi-delta { color: rgba(255,255,255,.55); }

.kpi-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.kpi-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -.04em; margin-top: 4px; }
.kpi-delta { font-size: 11px; font-weight: 500; margin-top: 2px; }
.kpi-delta.up   { color: var(--green); }
.kpi-delta.down { color: var(--red); }
.kpi-delta.neu  { color: var(--muted); }

/* ─── MAIN CHART CARD ─── */
.chart-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 18px;
}
.chart-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 18px; }
.chart-main-label { font-size: 11px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.chart-main-value { font-size: 32px; font-weight: 700; color: var(--text); letter-spacing: -.04em; line-height: 1; margin-top: 4px; }
.chart-main-delta { font-size: 12px; font-weight: 500; margin-top: 4px; }
.chart-period { font-size: 11px; color: var(--subtle); background: var(--surface2); padding: 4px 10px; border-radius: 99px; }

.chart-bars {
  height: 72px; display: flex; align-items: flex-end; gap: 3px;
}
.bar {
  flex: 1; border-radius: 4px 4px 0 0;
  background: var(--surface2); transition: background .15s;
  min-height: 4px;
}
.bar.hi { background: var(--text); }
.bar.mid { background: #c8c5c0; }

.chart-dates { display: flex; justify-content: space-between; margin-top: 8px; }
.chart-date { font-size: 10px; color: var(--subtle); }

/* ─── INSIGHT ─── */
.insight-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.insight-row { display: flex; gap: 12px; align-items: flex-start; }
.insight-icon {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: var(--text); color: white;
  display: grid; place-items: center; font-size: 14px;
}
.insight-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.insight-text { font-size: 13px; color: var(--text); line-height: 1.55; }
.insight-divider { height: 1px; background: var(--border); margin: 12px 0; }
.insight-tip { font-size: 12px; color: var(--muted); line-height: 1.5; }
.insight-tag {
  display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 99px; margin-bottom: 6px;
}
.tag-good { background: var(--green-bg); color: var(--green); }
.tag-improve { background: var(--orange-bg); color: var(--orange); }
.tag-tip { background: var(--surface2); color: var(--muted); }

/* ─── SUMMARY ─── */
.summary-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.summary-text { font-size: 13px; color: var(--muted); line-height: 1.65; }

/* ─── TOP POST ─── */
.top-post-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  display: flex; gap: 0; cursor: pointer;
  text-decoration: none; transition: border-color .15s;
}
.top-post-card:hover { border-color: var(--border-strong); }
.top-post-thumb {
  width: 80px; height: 80px; flex-shrink: 0;
  background: var(--surface2); object-fit: cover;
}
.top-post-thumb-fallback {
  width: 80px; height: 80px; flex-shrink: 0;
  background: var(--surface2); display: grid; place-items: center;
  font-size: 28px; color: var(--subtle);
}
.top-post-body { padding: 12px 14px; flex: 1; min-width: 0; }
.top-post-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.top-post-insight { font-size: 12px; color: var(--text); line-height: 1.45; }
.top-post-stats { display: flex; gap: 12px; margin-top: 8px; }
.top-post-stat { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 3px; }
.top-post-stat strong { color: var(--text); font-weight: 600; }

/* ─── PATTERNS ─── */
.pattern-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
}
.pattern-row { margin-bottom: 14px; }
.pattern-row:last-child { margin-bottom: 0; }
.pattern-label { font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.pattern-text { font-size: 13px; color: var(--text); line-height: 1.5; }

/* ─── TIMING ─── */
.timing-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.timing-box {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px; text-align: center;
}
.timing-icon { font-size: 20px; margin-bottom: 6px; }
.timing-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 3px; }
.timing-value { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.02em; }

/* ─── REFRESH BUTTON ─── */
.refresh-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px 18px;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.refresh-info { flex: 1; }
.refresh-title { font-size: 13px; font-weight: 600; color: var(--text); }
.refresh-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
.btn-refresh {
  padding: 9px 16px; border-radius: var(--radius-sm);
  background: var(--text); color: white; border: none;
  font-family: inherit; font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: opacity .15s;
}
.btn-refresh:disabled { opacity: .4; cursor: not-allowed; }

/* ─── EMPTY / LOADING ─── */
.empty-state {
  text-align: center; padding: 48px 24px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius);
}
.empty-icon { font-size: 32px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
.empty-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

.skeleton {
  background: linear-gradient(90deg, var(--surface2) 25%, #e8e6e2 50%, var(--surface2) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 8px;
}
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ─── BOTTOM NAV ─── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(245,244,242,0.95); backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0 calc(14px + var(--safe-bottom));
}
.nav-item {
  display: flex; flex-direction: column; align-items: center; gap: 3px;
  cursor: pointer; padding: 4px 14px; border-radius: 12px; transition: background .12s;
  min-width: 60px; text-decoration: none;
}
.nav-item:active { background: var(--surface2); }
.nav-icon { width: 24px; height: 24px; display: grid; place-items: center; position: relative; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--subtle); }
.nav-item.active .nav-label { color: var(--text); font-weight: 600; }
.nav-badge {
  position: absolute; top: -3px; right: -6px;
  background: var(--text); color: white;
  font-size: 9px; font-weight: 700; padding: 1px 4px;
  border-radius: 99px; line-height: 1.4;
}

/* ─── TOAST ─── */
.toast-wrap { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 200; pointer-events: none; }
.toast {
  background: var(--text); color: white; font-size: 13px; font-weight: 500;
  padding: 10px 18px; border-radius: 99px;
  animation: toastIn .25s ease-out;
  white-space: nowrap;
}
@keyframes toastIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

/* ─── SPINNER ─── */
.spinner {
  width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3);
  border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite;
  display: inline-block; vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* helper */
.hidden { display: none !important; }
</style>
</head>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL  = 'https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { persistSession: true, autoRefreshToken: true }
})

// ─── state ───
const state = {
  user: null,
  analytics: { instagram: null, tiktok: null },
  settings: null,
  activePlatform: 'instagram',
  loading: false
}

// ─── utils ───
function fmt(n, digits = 1) {
  if (n == null || n === '' || isNaN(Number(n))) return '–'
  n = Number(n)
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(digits).replace(/\.0$/, '') + 'M'
  if (n >= 1_000)     return (n / 1_000).toFixed(digits).replace(/\.0$/, '') + 'k'
  return n.toFixed(0)
}
function fmtPct(n) {
  if (n == null || isNaN(Number(n))) return '–'
  return Number(n).toFixed(2) + '%'
}
function fmtDate(d) {
  if (!d) return '–'
  return new Date(d).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
}
function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}
function delta(now, prev) {
  if (now == null || prev == null || isNaN(Number(now)) || isNaN(Number(prev))) return null
  now = Number(now); prev = Number(prev)
  const diff = now - prev
  const pct  = prev !== 0 ? ((diff / prev) * 100).toFixed(1) : null
  return { diff, pct, up: diff >= 0 }
}

// ─── toast ───
window.showToast = function(msg, dur = 2800) {
  const w = document.getElementById('toast-wrap')
  const t = document.getElementById('toast-msg')
  t.textContent = msg
  w.classList.remove('hidden')
  clearTimeout(w._timer)
  w._timer = setTimeout(() => w.classList.add('hidden'), dur)
}

// ─── auth ───
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (session) { await enterApp(session); return }
  setupLogin()
}

function setupLogin() {
  document.getElementById('login-screen').style.display = 'flex'
  const btn = document.getElementById('btn-login')
  btn.addEventListener('click', doLogin)
  document.getElementById('inp-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
}

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim()
  const pw    = document.getElementById('inp-pw').value
  const errEl = document.getElementById('login-error')
  const btn   = document.getElementById('btn-login')
  errEl.textContent = ''
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw })
  btn.disabled = false; btn.textContent = 'Einloggen'
  if (error) { errEl.textContent = 'Falsche E-Mail oder Passwort.'; return }
  await enterApp(data.session)
}

async function enterApp(session) {
  state.user = session.user
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').classList.add('visible')
  const { data: profile } = await sb.from('users').select('display_name, full_name').eq('id', state.user.id).single()
  const name = profile?.display_name || profile?.full_name || state.user.email || '?'
  const av = document.getElementById('user-avatar')
  av.textContent = name[0].toUpperCase()
  av.title = `${name} · Logout`
  await loadAnalytics()
}

window.logout = async function() {
  await sb.auth.signOut()
  location.reload()
}

// ─── data ───
async function loadAnalytics() {
  // load settings
  const { data: settings } = await sb
    .from('analytics_settings')
    .select('*')
    .eq('user_id', state.user.id)
    .single()
  state.settings = settings

  // load both platforms (latest per platform)
  const { data: rows } = await sb
    .from('creator_analytics')
    .select('*')
    .eq('user_id', state.user.id)
    .order('fetched_at', { ascending: false })
    .limit(20)

  if (rows && rows.length > 0) {
    const ig = rows.filter(r => r.platform === 'instagram')[0] || null
    const tt = rows.filter(r => r.platform === 'tiktok')[0] || null
    state.analytics.instagram = ig
    state.analytics.tiktok    = tt
  }

  renderAnalytics()
}

// ─── platform switch ───
window.switchPlatform = function(p) {
  state.activePlatform = p
  document.getElementById('btn-ig').classList.toggle('active', p === 'instagram')
  document.getElementById('btn-tt').classList.toggle('active', p === 'tiktok')
  renderAnalytics()
}

// ─── main render ───
function renderAnalytics() {
  const content = document.getElementById('analytics-content')
  const data    = state.analytics[state.activePlatform]
  const s       = state.settings

  const igEnabled = s?.ig_done
  const ttEnabled = s?.tt_done
  const available = state.activePlatform === 'instagram' ? igEnabled : ttEnabled

  if (!data && !available) {
    content.innerHTML = `<div class="section">${emptyHtml(state.activePlatform)}</div>`
    updateSubLabel(null)
    return
  }

  if (!data) {
    content.innerHTML = `<div class="section"><div class="empty-state"><div class="empty-icon">⏳</div><div class="empty-title">Analyse läuft…</div><div class="empty-sub">Daten werden gerade abgerufen. Das dauert 2–5 Minuten.</div></div></div>`
    updateSubLabel(null)
    return
  }

  updateSubLabel(data.fetched_at)
  content.innerHTML = buildAnalyticsHTML(data, s)
  document.getElementById('btn-refresh-action')?.addEventListener('click', triggerRefresh)
}

function emptyHtml(platform) {
  const label = platform === 'instagram' ? 'Instagram' : 'TikTok'
  return `<div class="empty-state"><div class="empty-icon">${platform === 'instagram' ? '📸' : '🎵'}</div><div class="empty-title">${label} noch nicht verknüpft</div><div class="empty-sub">Füge deinen ${label}-Handle im Profil hinzu, um Analytics zu aktivieren.</div></div>`
}

function updateSubLabel(fetchedAt) {
  const el = document.getElementById('last-updated-label')
  el.textContent = fetchedAt ? 'Aktualisiert: ' + fmtDate(fetchedAt) : 'Noch keine Daten verfügbar'
}

function buildAnalyticsHTML(d, settings) {
  const followerDelta = delta(d.followers, d.followers_prev)
  const likeDelta     = delta(d.avg_likes, d.avg_likes_prev)
  const erNum         = Number(d.engagement_rate || 0)
  const erBenchmark   = erNum > 6 ? 'Sehr gut ↑' : erNum > 3 ? 'Gut' : 'Ausbaufähig'
  const erBenchClass  = erNum > 6 ? 'up' : erNum > 3 ? 'neu' : 'down'
  const nextAt        = settings?.next_analysis_at
  const nextLabel     = nextAt
    ? 'Nächste Aktualisierung: ' + new Date(nextAt).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
    : 'Aktualisierung jetzt möglich'
  const canRefresh    = !nextAt || Date.now() >= new Date(nextAt).getTime()
  const bars          = generateBars(d)
  const platform      = d.platform === 'instagram' ? 'Instagram' : 'TikTok'

  return `
    <div class="section">
      <div class="section-label">Follower</div>
      <div class="chart-card">
        <div class="chart-top">
          <div>
            <div class="chart-main-label">Follower gesamt</div>
            <div class="chart-main-value">${fmt(d.followers)}</div>
            ${followerDelta
              ? `<div class="chart-main-delta ${followerDelta.up ? 'up kpi-delta' : 'down kpi-delta'}">${followerDelta.up ? '↑' : '↓'} ${Math.abs(followerDelta.diff)} diese Woche</div>`
              : '<div class="chart-main-delta neu kpi-delta">Kein Vorwert</div>'}
          </div>
          <div class="chart-period">28 Tage</div>
        </div>
        <div class="chart-bars">
          ${bars.map(b => `<div class="bar ${b.cls}" style="height:${b.h}%"></div>`).join('')}
        </div>
        <div class="chart-dates">
          <span class="chart-date">vor 4W</span>
          <span class="chart-date">vor 2W</span>
          <span class="chart-date">Heute</span>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Kennzahlen</div>
      <div class="kpi-grid">
        <div class="kpi-card"><div class="kpi-label">Engagement Rate</div><div class="kpi-value">${fmtPct(d.engagement_rate)}</div><span class="kpi-delta ${erBenchClass}">${erBenchmark}</span></div>
        <div class="kpi-card"><div class="kpi-label">Ø Likes / Post</div><div class="kpi-value">${fmt(d.avg_likes)}</div>${likeDelta ? `<span class="kpi-delta ${likeDelta.up ? 'up' : 'down'}">${likeDelta.up ? '↑' : '↓'} ${Math.abs(likeDelta.diff).toFixed(0)} vs. vorher</span>` : '<span class="kpi-delta neu">Erster Wert</span>'}</div>
        <div class="kpi-card"><div class="kpi-label">Ø Views / Post</div><div class="kpi-value">${fmt(d.avg_views)}</div><span class="kpi-delta neu">${platform}</span></div>
        <div class="kpi-card"><div class="kpi-label">Ø Kommentare</div><div class="kpi-value">${fmt(d.avg_comments)}</div><span class="kpi-delta neu">Pro Post</span></div>
        <div class="kpi-card"><div class="kpi-label">Posts gesamt</div><div class="kpi-value">${fmt(d.posts_count)}</div><span class="kpi-delta neu">Analysiert</span></div>
        <div class="kpi-card"><div class="kpi-label">Following</div><div class="kpi-value">${fmt(d.following)}</div><span class="kpi-delta neu">Accounts</span></div>
      </div>
    </div>

    ${(d.best_posting_hour != null || d.best_posting_day) ? `
    <div class="section">
      <div class="section-label">Beste Posting-Zeit</div>
      <div class="timing-grid">
        ${d.best_posting_day ? `<div class="timing-box"><div class="timing-icon">📅</div><div class="timing-label">Bester Tag</div><div class="timing-value">${escHtml(d.best_posting_day)}</div></div>` : ''}
        ${d.best_posting_hour != null ? `<div class="timing-box"><div class="timing-icon">⏰</div><div class="timing-label">Beste Uhrzeit</div><div class="timing-value">${d.best_posting_hour}:00 Uhr</div></div>` : ''}
        ${d.top_format ? `<div class="timing-box" style="grid-column:1/-1"><div class="timing-icon">🎬</div><div class="timing-label">Top Format</div><div class="timing-value">${escHtml(d.top_format)}</div></div>` : ''}
      </div>
    </div>` : ''}

    ${d.top_post_url ? `
    <div class="section">
      <div class="section-label">Top Post</div>
      <a class="top-post-card" href="${escHtml(d.top_post_url)}" target="_blank" rel="noopener">
        ${d.top_post_thumbnail ? `<img class="top-post-thumb" src="${escHtml(d.top_post_thumbnail)}" alt="" onerror="this.outerHTML='<div class=&quot;top-post-thumb-fallback&quot;>📸</div>'">` : '<div class="top-post-thumb-fallback">📸</div>'}
        <div class="top-post-body">
          <div class="top-post-label">Bester Post · Öffnen ↗</div>
          <div class="top-post-insight">${escHtml(d.top_post_insight || 'Dein leistungsstärkster Post.')}</div>
          <div class="top-post-stats">
            ${d.top_post_likes ? `<div class="top-post-stat">❤️ <strong>${fmt(d.top_post_likes)}</strong></div>` : ''}
            ${d.top_post_views ? `<div class="top-post-stat">👁 <strong>${fmt(d.top_post_views)}</strong></div>` : ''}
          </div>
        </div>
      </a>
    </div>` : ''}

    ${(d.insight_good || d.insight_improve || d.insight_tip) ? `
    <div class="section">
      <div class="section-label">KI-Einblick</div>
      <div class="insight-card">
        ${d.insight_good ? `<div class="insight-tag tag-good">Was gut läuft</div><div class="insight-text">${escHtml(d.insight_good)}</div>${(d.insight_improve || d.insight_tip) ? '<div class="insight-divider"></div>' : ''}` : ''}
        ${d.insight_improve ? `<div class="insight-tag tag-improve">Verbesserungspotenzial</div><div class="insight-text">${escHtml(d.insight_improve)}</div>${d.insight_tip ? '<div class="insight-divider"></div>' : ''}` : ''}
        ${d.insight_tip ? `<div class="insight-tag tag-tip">💡 Tipp</div><div class="insight-tip">${escHtml(d.insight_tip)}</div>` : ''}
      </div>
    </div>` : ''}

    ${(d.hook_pattern || d.caption_pattern) ? `
    <div class="section">
      <div class="section-label">Content-Muster</div>
      <div class="pattern-card">
        ${d.hook_pattern ? `<div class="pattern-row"><div class="pattern-label">Hook-Muster</div><div class="pattern-text">${escHtml(d.hook_pattern)}</div></div>` : ''}
        ${(d.hook_pattern && d.caption_pattern) ? '<div class="insight-divider" style="margin:12px 0"></div>' : ''}
        ${d.caption_pattern ? `<div class="pattern-row"><div class="pattern-label">Caption-Muster</div><div class="pattern-text">${escHtml(d.caption_pattern)}</div></div>` : ''}
      </div>
    </div>` : ''}

    ${d.weekly_summary ? `
    <div class="section">
      <div class="section-label">Wochenzusammenfassung</div>
      <div class="summary-card"><div class="summary-text">${escHtml(d.weekly_summary)}</div></div>
    </div>` : ''}

    <div class="section" style="padding-bottom:8px">
      <div class="refresh-card">
        <div class="refresh-info">
          <div class="refresh-title">Analyse aktualisieren</div>
          <div class="refresh-sub">${nextLabel}</div>
        </div>
        <button class="btn-refresh" id="btn-refresh-action" ${canRefresh ? '' : 'disabled'}>
          ${canRefresh ? 'Jetzt' : 'Gesperrt'}
        </button>
      </div>
    </div>
  `
}

function generateBars(d) {
  const current = Number(d.followers || 0)
  const prev    = Number(d.followers_prev || current * 0.97)
  const bars    = []
  for (let i = 0; i < 16; i++) {
    const t = i / 15
    const base = prev + (current - prev) * t
    const jitter = (Math.random() - 0.5) * (current * 0.02)
    bars.push(Math.max(0, base + jitter))
  }
  const max = Math.max(...bars)
  return bars.map((v, i) => ({
    h: Math.max(6, Math.round((v / max) * 100)),
    cls: i >= 12 ? 'hi' : i >= 6 ? 'mid' : ''
  }))
}

// ─── refresh trigger ───
async function triggerRefresh() {
  const btn = document.getElementById('btn-refresh-action')
  if (!btn) return
  btn.disabled = true
  btn.innerHTML = '<span class="spinner"></span>'

  try {
    const { data: { session } } = await sb.auth.getSession()
    if (!session) { showToast('Session abgelaufen — bitte neu einloggen', 4000); location.reload(); return }

    const res = await fetch(`${SUPABASE_URL}/functions/v1/fetch-analytics`, {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
    })
    const body = await res.json()
    if (!res.ok || body.success === false) throw new Error(body.error || 'Fehler')
    showToast('Analyse gestartet — dauert 2–5 Min. ⏳', 4000)
  } catch (err) {
    showToast('Fehler: ' + err.message, 4000)
    if (btn) { btn.disabled = false; btn.textContent = 'Jetzt' }
  }
}

init()
</script>
