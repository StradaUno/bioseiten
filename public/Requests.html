<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
<title>veuno · Anfragen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #f5f4f2;
  --surface: #ffffff;
  --surface2: #f0efed;
  --border: rgba(0,0,0,0.08);
  --border-strong: rgba(0,0,0,0.13);
  --text: #111110;
  --muted: #7a7975;
  --subtle: #b0afa9;
  --green: #1a7f4b;
  --green-bg: #edf7f1;
  --orange: #b85c00;
  --orange-bg: #fdf3e7;
  --red: #c0392b;
  --red-bg: #fdf0ef;
  --radius: 16px;
  --radius-sm: 10px;
  --nav-h: 56px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  background: var(--bg);
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  -webkit-font-smoothing: antialiased;
  min-height: 100dvh;
  color: var(--text);
  font-size: 14px;
}

/* ─── LOGIN ─── */
#login-screen {
  min-height: 100dvh; display: flex; align-items: center; justify-content: center; padding: 24px;
}
.login-card {
  width: 100%; max-width: 360px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 20px; padding: 32px 28px;
}
.login-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
.login-logo-mark {
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--text); color: white;
  display: grid; place-items: center; font-size: 14px; font-weight: 700;
}
.login-logo-text { font-size: 17px; font-weight: 700; letter-spacing: -.03em; }
.login-title { font-size: 20px; font-weight: 700; letter-spacing: -.03em; margin-bottom: 4px; }
.login-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
.field input {
  width: 100%; padding: 11px 14px;
  border: 1px solid var(--border-strong); border-radius: var(--radius-sm);
  font-family: inherit; font-size: 14px; color: var(--text);
  background: var(--bg); outline: none; transition: border-color .15s;
}
.field input:focus { border-color: var(--text); }
.btn-login {
  width: 100%; padding: 12px; margin-top: 8px;
  background: var(--text); color: white; border: none;
  border-radius: var(--radius-sm); font-family: inherit; font-size: 14px; font-weight: 600;
  cursor: pointer;
}
.btn-login:disabled { opacity: .5; cursor: not-allowed; }
.login-error { font-size: 12px; color: var(--red); margin-top: 10px; text-align: center; min-height: 18px; }

/* ─── APP ─── */
#app { display: none; min-height: 100dvh; flex-direction: column; }
#app.visible { display: flex; }

.topbar {
  position: sticky; top: 0; z-index: 50;
  background: rgba(245,244,242,0.92); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 20px; height: var(--nav-h);
  display: flex; align-items: center; justify-content: space-between;
}
.topbar-logo { display: flex; align-items: center; gap: 8px; }
.topbar-mark { width: 26px; height: 26px; border-radius: 6px; background: var(--text); color: white; display: grid; place-items: center; font-size: 11px; font-weight: 700; }
.topbar-name { font-size: 15px; font-weight: 700; letter-spacing: -.03em; }
.topbar-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--text); color: white; display: grid; place-items: center; font-size: 12px; font-weight: 600; cursor: pointer; }

/* list view */
.list-view { flex: 1; padding-bottom: calc(80px + var(--safe-bottom)); overflow-y: auto; }

.page-header { padding: 20px 20px 0; display: flex; align-items: center; justify-content: space-between; }
.page-title { font-size: 22px; font-weight: 700; letter-spacing: -.04em; }
.new-badge { background: var(--text); color: white; font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 99px; }

/* filter */
.filter-row { display: flex; gap: 6px; padding: 14px 20px 0; overflow-x: auto; scrollbar-width: none; }
.filter-row::-webkit-scrollbar { display: none; }
.f-pill { padding: 6px 14px; border-radius: 99px; white-space: nowrap; font-size: 12px; font-weight: 500; font-family: inherit; flex-shrink: 0; border: 1px solid var(--border); background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s; }
.f-pill.active { background: var(--text); color: white; border-color: var(--text); }

/* request cards */
.req-list { padding: 12px 20px 0; }

.req-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 10px; overflow: hidden;
  cursor: pointer; transition: border-color .15s;
}
.req-card:active { background: var(--surface2); }
.req-card.is-new { border-left: 3px solid var(--text); }

.req-card-top { padding: 14px 16px; display: flex; align-items: flex-start; gap: 12px; }

.req-initial {
  width: 42px; height: 42px; border-radius: 13px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: grid; place-items: center;
  font-size: 16px; font-weight: 700; color: var(--text);
}

.req-info { flex: 1; min-width: 0; }
.req-name { font-size: 15px; font-weight: 600; color: var(--text); letter-spacing: -.01em; }
.req-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
.req-type-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; letter-spacing: .04em; }
.rb-brand   { background: #f0f4ff; color: #2d4eb0; }
.rb-collab  { background: #f0fdf4; color: #1a7f4b; }
.rb-event   { background: #fdf3e7; color: #b85c00; }
.rb-sonstiges { background: var(--surface2); color: var(--muted); }
.req-date { font-size: 11px; color: var(--subtle); }

.req-status { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.status-tag { font-size: 10px; font-weight: 600; padding: 3px 10px; border-radius: 99px; letter-spacing: .02em; }
.s-new        { background: var(--surface2); color: var(--text); border: 1px solid var(--border-strong); }
.s-replied    { background: var(--green-bg); color: var(--green); border: 1px solid rgba(26,127,75,.15); }
.s-negotiation{ background: var(--orange-bg); color: var(--orange); border: 1px solid rgba(184,92,0,.15); }
.s-closed     { background: var(--surface2); color: var(--subtle); border: 1px solid var(--border); }
.s-deleted    { background: var(--red-bg); color: var(--red); border: 1px solid rgba(192,57,43,.15); }
.new-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text); }

.req-preview-msg {
  font-size: 12px; color: var(--muted); line-height: 1.5;
  padding: 0 16px 14px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
}

/* ─── DETAIL PANEL (slide up) ─── */
.detail-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,0); pointer-events: none;
  transition: background .25s;
}
.detail-overlay.open { background: rgba(0,0,0,0.35); pointer-events: auto; }

.detail-panel {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 101;
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  max-height: 92dvh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s cubic-bezier(.32,.72,0,1);
  padding-bottom: calc(24px + var(--safe-bottom));
}
.detail-panel.open { transform: translateY(0); }

.detail-handle {
  width: 36px; height: 4px; border-radius: 2px; background: var(--border-strong);
  margin: 12px auto 0;
}

.detail-header { padding: 16px 20px 0; display: flex; align-items: flex-start; gap: 14px; }
.detail-initial {
  width: 48px; height: 48px; border-radius: 14px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: grid; place-items: center; font-size: 20px; font-weight: 700; color: var(--text);
}
.detail-name { font-size: 18px; font-weight: 700; letter-spacing: -.02em; color: var(--text); }
.detail-email { font-size: 12px; color: var(--muted); margin-top: 2px; }
.detail-close {
  margin-left: auto; width: 32px; height: 32px; border-radius: 99px;
  background: var(--surface2); border: none; cursor: pointer; flex-shrink: 0;
  display: grid; place-items: center; font-size: 16px; color: var(--muted);
}

/* detail sections */
.detail-section { padding: 16px 20px 0; }
.detail-label { font-size: 10px; font-weight: 600; color: var(--subtle); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }

.detail-pills { display: flex; gap: 8px; flex-wrap: wrap; }
.detail-pill {
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 99px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--text);
}

.detail-message {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 12px 14px; font-size: 13px; color: var(--text); line-height: 1.6;
}

/* divider */
.detail-divider { height: 1px; background: var(--border); margin: 20px 20px 0; }

/* timeline */
.timeline { padding: 0 20px; }
.timeline-item { display: flex; gap: 12px; padding: 10px 0; position: relative; }
.timeline-item::before {
  content: ''; position: absolute; left: 16px; top: 32px; bottom: -6px;
  width: 1px; background: var(--border);
}
.timeline-item:last-child::before { display: none; }
.timeline-icon {
  width: 32px; height: 32px; border-radius: 99px; flex-shrink: 0;
  background: var(--surface2); border: 1px solid var(--border);
  display: grid; place-items: center; font-size: 14px; z-index: 1;
}
.timeline-body { flex: 1; padding-top: 4px; }
.timeline-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.timeline-time { font-size: 11px; color: var(--subtle); margin-top: 2px; }

/* action buttons */
.detail-actions { display: flex; gap: 8px; padding: 20px 20px 0; }
.btn-action {
  flex: 1; padding: 12px; border-radius: var(--radius-sm);
  font-family: inherit; font-size: 13px; font-weight: 600;
  cursor: pointer; border: 1px solid var(--border-strong);
  display: flex; align-items: center; justify-content: center; gap: 6px;
  text-decoration: none; transition: background .15s;
}
.btn-action:active { opacity: .8; }
.btn-primary-action { background: var(--text); color: white; border-color: var(--text); }
.btn-secondary-action { background: var(--surface); color: var(--text); }

/* status change row */
.status-row { display: flex; gap: 6px; padding: 12px 20px 0; overflow-x: auto; scrollbar-width: none; }
.status-row::-webkit-scrollbar { display: none; }
.status-btn {
  padding: 6px 14px; border-radius: 99px; white-space: nowrap; flex-shrink: 0;
  font-size: 12px; font-weight: 500; font-family: inherit;
  border: 1px solid var(--border); background: var(--surface); color: var(--muted);
  cursor: pointer; transition: all .15s;
}
.status-btn.current { background: var(--text); color: white; border-color: var(--text); }

/* empty */
.empty-state { text-align: center; padding: 48px 24px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin: 14px 20px 0; }
.empty-icon { font-size: 32px; margin-bottom: 10px; }
.empty-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
.empty-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }

.skeleton { background: linear-gradient(90deg, var(--surface2) 25%, #e8e6e2 50%, var(--surface2) 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; border-radius: var(--radius); }
@keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* bottom nav */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(245,244,242,0.95); backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 10px 0 calc(14px + var(--safe-bottom));
}
.nav-item { display: flex; flex-direction: column; align-items: center; gap: 3px; cursor: pointer; padding: 4px 14px; border-radius: 12px; transition: background .12s; min-width: 60px; text-decoration: none; }
.nav-item:active { background: var(--surface2); }
.nav-icon { width: 24px; height: 24px; display: grid; place-items: center; position: relative; }
.nav-label { font-size: 10px; font-weight: 500; color: var(--subtle); }
.nav-item.active .nav-label { color: var(--text); font-weight: 600; }
.nav-badge { position: absolute; top: -3px; right: -6px; background: var(--text); color: white; font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 99px; line-height: 1.4; }

/* toast */
.toast-wrap { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 300; pointer-events: none; }
.toast { background: var(--text); color: white; font-size: 13px; font-weight: 500; padding: 10px 18px; border-radius: 99px; animation: toastIn .25s ease-out; white-space: nowrap; }
@keyframes toastIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

.spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; vertical-align: middle; }
@keyframes spin { to{transform:rotate(360deg)} }
.hidden { display: none !important; }
</style>
</head>
<body>

<!-- LOGIN -->

  <div class="login-card">

      <div class="login-logo-mark">v</div>

<!-- APP -->
<div id="app">

  <!-- Bottom Nav -->
  <div class="bottom-nav">

      <span class="nav-label">Home</span>

</div>

<!-- DETAIL OVERLAY -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail()"></div>
<div class="detail-panel" id="detail-panel">
  <div class="detail-handle"></div>
  <div id="detail-content"></div>
</div>

<div class="toast-wrap hidden" id="toast-wrap">
  <div class="toast" id="toast-msg"></div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL  = 'https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'

const sb = createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { persistSession: true, autoRefreshToken: true } })

const state = {
  user: null,
  requests: [],
  filter: 'alle',
  openId: null,
  activities: {}   // keyed by request id
}

// ─── utils ───
function escHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
}
function fmtDate(d) {
  if (!d) return ''
  const dt = new Date(d)
  const now = new Date()
  const diffMs = now - dt
  const diffMins = Math.floor(diffMs / 60000)
  const diffHrs  = Math.floor(diffMs / 3600000)
  const diffDays = Math.floor(diffMs / 86400000)
  if (diffMins < 60)  return `vor ${diffMins} Min.`
  if (diffHrs  < 24)  return `vor ${diffHrs} Std.`
  if (diffDays < 7)   return `vor ${diffDays} Tagen`
  return dt.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' })
}
function fmtFull(d) {
  if (!d) return ''
  return new Date(d).toLocaleString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' })
}

window.showToast = function(msg, dur = 2800) {
  const w = document.getElementById('toast-wrap')
  document.getElementById('toast-msg').textContent = msg
  w.classList.remove('hidden')
  clearTimeout(w._t)
  w._t = setTimeout(() => w.classList.add('hidden'), dur)
}

// ─── auth ───
async function init() {
  const { data: { session } } = await sb.auth.getSession()
  if (session) { await enterApp(session); return }
  setupLogin()
}

function setupLogin() {
  document.getElementById('login-screen').style.display = 'flex'
  const btn = document.getElementById('btn-login')
  btn.addEventListener('click', doLogin)
  document.getElementById('inp-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin() })
}

async function doLogin() {
  const email = document.getElementById('inp-email').value.trim()
  const pw    = document.getElementById('inp-pw').value
  const errEl = document.getElementById('login-error')
  const btn   = document.getElementById('btn-login')
  errEl.textContent = ''
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>'
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw })
  btn.disabled = false; btn.textContent = 'Einloggen'
  if (error) { errEl.textContent = 'Falsche E-Mail oder Passwort.'; return }
  await enterApp(data.session)
}

async function enterApp(session) {
  state.user = session.user
  document.getElementById('login-screen').style.display = 'none'
  document.getElementById('app').classList.add('visible')
  const { data: profile } = await sb.from('users').select('display_name, full_name').eq('id', state.user.id).single()
  const name = profile?.display_name || profile?.full_name || session.user.email || '?'
  const av = document.getElementById('user-avatar')
  av.textContent = name[0].toUpperCase()
  av.title = `${name} · Logout`
  await loadRequests()
}

window.logout = async function() { await sb.auth.signOut(); location.reload() }

// ─── load ───
async function loadRequests() {
  const { data, error } = await sb
    .from('collab_requests')
    .select('*')
    .eq('creator_id', state.user.id)
    .is('deleted_at', null)
    .neq('status', 'deleted')
    .order('created_at', { ascending: false })

  document.getElementById('skeleton-area').classList.add('hidden')

  if (error || !data?.length) {
    document.getElementById('empty-state').classList.remove('hidden')
    return
  }

  state.requests = data
  updateBadges()
  renderList()
}

function updateBadges() {
  const newCount = state.requests.filter(r => r.status === 'new').length
  const badge = document.getElementById('new-count-badge')
  const navBadge = document.getElementById('nav-badge')
  if (newCount > 0) {
    badge.textContent = `${newCount} neu`
    badge.classList.remove('hidden')
    navBadge.textContent = newCount
    navBadge.classList.remove('hidden')
  } else {
    badge.classList.add('hidden')
    navBadge.classList.add('hidden')
  }
}

// ─── filter ───
window.setFilter = function(f, btn) {
  state.filter = f
  document.querySelectorAll('.f-pill').forEach(p => p.classList.toggle('active', p.dataset.f === f))
  renderList()
}

function filtered() {
  if (state.filter === 'alle') return state.requests
  return state.requests.filter(r => r.status === state.filter)
}

// ─── render list ───
function renderList() {
  const el = document.getElementById('req-list')
  const items = filtered()
  el.classList.remove('hidden')
  document.getElementById('empty-state').classList.add('hidden')

  if (!items.length) {
    el.innerHTML = ''
    document.getElementById('empty-state').classList.remove('hidden')
    return
  }

  el.innerHTML = items.map(r => reqCardHtml(r)).join('')
  el.querySelectorAll('.req-card').forEach(card => {
    card.addEventListener('click', () => openDetail(card.dataset.id))
  })
}

function typeClass(t) {
  const m = { brand: 'rb-brand', collab: 'rb-collab', event: 'rb-event', sonstiges: 'rb-sonstiges' }
  return m[t] || 'rb-sonstiges'
}
function typeLabel(t) {
  const m = { brand: 'Brand', collab: 'Collab', event: 'Event', sonstiges: 'Sonstiges' }
  return m[t] || t
}
function statusClass(s) {
  const m = { new: 's-new', replied: 's-replied', negotiation: 's-negotiation', closed: 's-closed', deleted: 's-deleted' }
  return m[s] || 's-new'
}
function statusLabel(s) {
  const m = { new: 'Neu', replied: 'Beantwortet', negotiation: 'Verhandlung', closed: 'Abgeschlossen', deleted: 'Gelöscht' }
  return m[s] || s
}

function reqCardHtml(r) {
  return `
    <div class="req-card ${r.status === 'new' ? 'is-new' : ''}" data-id="${r.id}">
      <div class="req-card-top">
        <div class="req-initial">${escHtml(r.sender_initial || r.sender_name?.[0] || '?')}</div>
        <div class="req-info">
          <div class="req-name">${escHtml(r.sender_name)}</div>
          <div class="req-meta">
            <span class="req-type-badge ${typeClass(r.request_type)}">${typeLabel(r.request_type)}</span>
            ${r.budget ? `<span style="font-size:11px;font-weight:600;color:var(--text)">€ ${Number(r.budget).toLocaleString('de-DE')}</span>` : ''}
            <span class="req-date">${fmtDate(r.created_at)}</span>
          </div>
        </div>
        <div class="req-status">
          <span class="status-tag ${statusClass(r.status)}">${statusLabel(r.status)}</span>
          ${r.status === 'new' ? '<div class="new-dot"></div>' : ''}
        </div>
      </div>
      ${r.message ? `<div class="req-preview-msg">${escHtml(r.message)}</div>` : ''}
    </div>`
}

// ─── detail ───
async function openDetail(id) {
  const r = state.requests.find(x => x.id === id)
  if (!r) return
  state.openId = id

  // mark as read locally if new
  if (r.status === 'new') {
    await sb.from('collab_requests').update({ status: 'replied' }).eq('id', id)
    r.status = 'replied'
    updateBadges()
    renderList()
  }

  // load activities if not cached
  if (!state.activities[id]) {
    const { data } = await sb
      .from('collab_request_activities')
      .select('type, content, icon, created_at')
      .eq('request_id', id)
      .order('created_at', { ascending: true })
    state.activities[id] = data || []
  }

  renderDetail(r, state.activities[id])

  document.getElementById('detail-overlay').classList.add('open')
  document.getElementById('detail-panel').classList.add('open')
  document.body.style.overflow = 'hidden'
}

window.closeDetail = function() {
  document.getElementById('detail-overlay').classList.remove('open')
  document.getElementById('detail-panel').classList.remove('open')
  document.body.style.overflow = ''
  state.openId = null
}

function renderDetail(r, activities) {
  const mailSubject = `Re: Anfrage von ${r.sender_name}`
  const mailBody = `Hallo ${r.sender_name},\n\nVielen Dank für deine Anfrage.\n\n`
  const mailtoHref = `mailto:${r.sender_email}?subject=${encodeURIComponent(mailSubject)}&body=${encodeURIComponent(mailBody)}`

  document.getElementById('detail-content').innerHTML = `
    <div class="detail-header">
      <div class="detail-initial">${escHtml(r.sender_initial || r.sender_name?.[0] || '?')}</div>
      <div>
        <div class="detail-name">${escHtml(r.sender_name)}</div>
        <div class="detail-email">${escHtml(r.sender_email)}</div>
      </div>
      <button class="detail-close" onclick="closeDetail()">✕</button>
    </div>

    <!-- Pills: type, budget, website -->
    <div class="detail-section">
      <div class="detail-pills">
        <span class="detail-pill">
          <span class="req-type-badge ${typeClass(r.request_type)}" style="margin:0">${typeLabel(r.request_type)}</span>
        </span>
        ${r.budget ? `<span class="detail-pill">💰 € ${Number(r.budget).toLocaleString('de-DE')}</span>` : ''}
        ${r.sender_website ? `<a class="detail-pill" href="${escHtml(r.sender_website)}" target="_blank" rel="noopener" style="text-decoration:none;color:inherit">🌐 Website ↗</a>` : ''}
        <span class="detail-pill">📅 ${fmtFull(r.created_at)}</span>
      </div>
    </div>

    <!-- Message -->
    ${r.message ? `
    <div class="detail-section">
      <div class="detail-label">Nachricht</div>
      <div class="detail-message">${escHtml(r.message)}</div>
    </div>` : ''}

    <!-- Notes -->
    ${r.notes ? `
    <div class="detail-section">
      <div class="detail-label">Notizen</div>
      <div class="detail-message" style="background:var(--orange-bg)">${escHtml(r.notes)}</div>
    </div>` : ''}

    <!-- Action buttons -->
    <div class="detail-actions">
      <a class="btn-action btn-primary-action" href="${mailtoHref}">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        Per E-Mail antworten
      </a>
    </div>

    <!-- Status ändern -->
    <div class="detail-section">
      <div class="detail-label">Status</div>
    </div>
    <div class="status-row">
      ${['new','replied','negotiation','closed'].map(s => `
        <button class="status-btn ${r.status === s ? 'current' : ''}" onclick="changeStatus('${r.id}','${s}')">${statusLabel(s)}</button>
      `).join('')}
    </div>

    <div class="detail-divider"></div>

    <!-- Timeline -->
    <div class="detail-section" style="padding-bottom:4px">
      <div class="detail-label">Verlauf</div>
    </div>
    <div class="timeline" id="timeline-${r.id}">
      ${activities.map(a => `
        <div class="timeline-item">
          <div class="timeline-icon">${a.icon || '📌'}</div>
          <div class="timeline-body">
            <div class="timeline-text">${escHtml(a.content)}</div>
            <div class="timeline-time">${fmtFull(a.created_at)}</div>
          </div>
        </div>`).join('') || `<div style="font-size:13px;color:var(--subtle);padding:8px 0">Kein Verlauf vorhanden.</div>`}
    </div>

    <!-- Delete -->
    <div class="detail-section" style="padding-bottom:4px">
      <button class="btn-action btn-secondary-action" style="width:100%;color:var(--red);border-color:rgba(192,57,43,.2)" onclick="deleteRequest('${r.id}')">
        Anfrage löschen
      </button>
    </div>
  `
}

// ─── status change ───
window.changeStatus = async function(id, newStatus) {
  const r = state.requests.find(x => x.id === id)
  if (!r) return
  const old = r.status
  if (old === newStatus) return

  r.status = newStatus
  // update status buttons
  document.querySelectorAll('.status-btn').forEach(b => {
    b.classList.toggle('current', b.textContent.trim() === statusLabel(newStatus))
  })

  await sb.from('collab_requests').update({ status: newStatus }).eq('id', id)

  // log activity via Supabase
  await sb.from('collab_request_activities').insert({
    request_id: id,
    creator_id: state.user.id,
    type: 'status_changed',
    content: `Status geändert: ${statusLabel(old)} → ${statusLabel(newStatus)}`,
    icon: '🔄'
  })

  // refresh activities
  delete state.activities[id]
  updateBadges()
  renderList()
  showToast(`Status: ${statusLabel(newStatus)}`)
}

// ─── delete ───
window.deleteRequest = async function(id) {
  if (!confirm('Anfrage wirklich löschen?')) return
  await sb.from('collab_requests').update({ deleted_at: new Date().toISOString(), status: 'deleted' }).eq('id', id)
  state.requests = state.requests.filter(r => r.id !== id)
  closeDetail()
  updateBadges()
  renderList()
  showToast('Anfrage gelöscht')
}

// swipe down to close panel
let touchStartY = 0
const panel = document.getElementById('detail-panel')
panel.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY }, { passive: true })
panel.addEventListener('touchend', e => {
  const diff = e.changedTouches[0].clientY - touchStartY
  if (diff > 80) closeDetail()
}, { passive: true })

init()
</script>
</body>
</html>
