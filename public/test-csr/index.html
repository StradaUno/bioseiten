<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>{{DISPLAY_NAME}} — viuno</title>
<meta name="description" content="{{BIO}}" />
<meta name="theme-color" content="#EAEAEE" />

<!-- Open Graph / Social Preview — Platzhalter für späteren Cloudflare Worker (Stufe B) -->
<meta property="og:type" content="website" />
<meta property="og:title" content="{{DISPLAY_NAME}} — viuno" />
<meta property="og:description" content="{{BIO}}" />
<meta property="og:image" content="{{OG_IMAGE}}" />

<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3Ev%3C/text%3E%3C/svg%3E" />

<style>
  :root {
    --bg: #EAEAEE;
    --surface: #FAFAF9;
    --border: #E4E4E7;
    --border-strong: #D4D4D8;
    --text: #1A1A2E;
    --text-muted: #71717A;
    --text-subtle: #9292A0;
    --text-faint: #C4C4CC;
    --primary: #1A1A2E;
    --primary-hover: #000000;
    --primary-text: #FFFFFF;
    --radius-btn: 12px;
    --radius-img: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 64px 20px 0;
  }

  main {
    width: 100%;
    max-width: 420px;
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
  }

  .page-loader {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 9999;
    transition: opacity .25s ease;
  }
  .page-loader.hide { opacity: 0; pointer-events: none; }
  .spinner {
    width: 28px; height: 28px;
    border: 2px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    width: 100%;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: 0 0 0 3px var(--bg), 0 0 0 4.5px color-mix(in srgb, var(--primary) 35%, transparent);
  }
  .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.01em;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .verified {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 10px;
    font-weight: 600;
    color: var(--primary);
    background: color-mix(in srgb, var(--primary) 15%, var(--surface));
    border: 1px solid color-mix(in srgb, var(--primary) 30%, transparent);
    border-radius: 20px;
    padding: 2px 8px;
    letter-spacing: .02em;
  }

  .tags {
    display: flex;
    gap: 6px;
    margin: 8px 0 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .tags:empty { display: none; }
  .tag {
    font-size: 11px;
    color: var(--text-subtle);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 3px 10px;
  }

  .bio {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.55;
    margin-bottom: 28px;
    max-width: 320px;
    white-space: pre-line;
  }
  .bio:empty { display: none; }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 15px 20px;
    border-radius: var(--radius-btn);
    font-size: 15px;
    font-weight: 500;
    text-decoration: none;
    transition: transform .12s ease, background .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color: transparent;
    width: 100%;
    font-family: inherit;
    cursor: pointer;
  }

  .btn:active { transform: scale(.98); }

  .btn-primary {
    background: var(--primary);
    color: var(--primary-text);
    border: 1px solid var(--primary);
  }
  .btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover {
    background: var(--surface);
    border-color: var(--border-strong);
  }

  .btn svg { flex-shrink: 0; }
  .btn.hidden { display: none; }

  .divider {
    width: 100%;
    text-align: center;
    color: var(--text-faint);
    font-size: 16px;
    letter-spacing: 6px;
    padding: 36px 0 32px;
    user-select: none;
  }

  footer {
    width: 100%;
    padding: 0 20px 24px;
    font-size: 11px;
    color: var(--text-faint);
    letter-spacing: .02em;
    text-align: center;
  }
  footer a { color: var(--text-subtle); text-decoration: none; transition: color .15s ease; }
  footer a:hover { color: var(--text-muted); }

  .imprint-link {
    background: none;
    border: none;
    color: var(--text-subtle);
    font-family: inherit;
    font-size: 11px;
    letter-spacing: .02em;
    cursor: pointer;
    padding: 4px 8px;
    transition: color .15s ease;
  }
  .imprint-link:hover { color: var(--text-muted); }

  /* ================================================
     IMPRESSUM BOTTOM SHEET
     ================================================ */
  .imp-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.35);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .imp-backdrop.open {
    opacity: 1;
    pointer-events: auto;
  }
  .imp-sheet {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    max-height: 85dvh;
    background: var(--surface);
    border-top: 1px solid var(--border);
    border-radius: 20px 20px 0 0;
    z-index: 1000;
    transform: translateY(100%);
    transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0s linear .3s;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -8px 24px rgba(26, 26, 46, 0.12);
    visibility: hidden;
  }
  .imp-sheet.open {
    transform: translateY(0);
    visibility: visible;
    transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1), visibility 0s linear 0s;
  }
  .imp-handle {
    width: 36px;
    height: 4px;
    background: var(--border-strong);
    border-radius: 999px;
    margin: 10px auto 6px;
    flex-shrink: 0;
  }
  .imp-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 20px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .imp-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: -0.01em;
  }
  .imp-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    padding: 0;
    font-family: inherit;
    transition: background .15s ease, border-color .15s ease;
  }
  .imp-close:hover { background: var(--bg); border-color: var(--border-strong); }
  .imp-content {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 20px 32px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--text-muted);
    white-space: pre-line;
  }
  .imp-empty {
    color: var(--text-faint);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
  body.imp-open { overflow: hidden; }
  @media (min-width: 540px) {
    .imp-sheet {
      left: 50%;
      transform: translate(-50%, 100%);
      max-width: 480px;
      border-radius: 20px;
      bottom: 5dvh;
    }
    .imp-sheet.open {
      transform: translate(-50%, 0);
    }
  }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 2px;
    margin-top: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: var(--text-subtle);
    font-size: 10px;
    font-weight: 500;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s ease;
  }
  .lang-btn:hover { color: var(--text); }
  .lang-btn.active {
    background: var(--primary);
    color: var(--primary-text);
    font-weight: 600;
  }

  @media (max-width: 380px) {
    body { padding: 28px 16px 40px; }
    h1 { font-size: 17px; }
    .btn { padding: 14px 18px; font-size: 14px; }
  }

  /* Desktop: Border-Container um Content (wie clean/color themes) */
  @media (min-width: 540px) {
    body {
      justify-content: center;
      padding: 48px 20px;
    }
    main {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 56px 32px 24px;
      box-shadow: 0 4px 16px rgba(26, 26, 46, 0.06);
    }
    /* Avatar Ring Background passt sich an */
    .avatar {
      box-shadow: 0 0 0 4px var(--surface), 0 0 0 5.5px color-mix(in srgb, var(--primary) 35%, transparent);
    }
    /* Footer rückt näher an Content */
    footer {
      max-width: 420px;
      padding-top: 20px;
    }
  }
  @media (min-width: 900px) {
    body { padding: 64px 40px; }
  }

  /* ================================================
     ANFRAGE OVERLAY — 2 Slides
     ================================================ */
  .cf-overlay {
    position: fixed;
    inset: 0;
    background: var(--bg);
    z-index: 1000;
    display: flex;
    flex-direction: column;
    opacity: 0;
    pointer-events: none;
    transition: opacity .25s ease;
  }
  .cf-overlay.open {
    opacity: 1;
    pointer-events: auto;
  }

  .cf-topbar {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
  }
  .cf-close {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    font-size: 18px;
    line-height: 1;
    padding: 0;
    font-family: inherit;
    transition: background .15s ease, border-color .15s ease;
  }
  .cf-close:hover { background: var(--surface); border-color: var(--border-strong); }

  .cf-progress-wrap { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .cf-progress-label { font-size: 11px; color: var(--text-subtle); letter-spacing: .02em; }
  .cf-progress-bar { height: 4px; background: var(--surface); border-radius: 999px; overflow: hidden; }
  .cf-progress-fill { height: 100%; background: var(--primary); width: 50%; transition: width .35s ease; }

  .cf-viewport { flex: 1; overflow: hidden; position: relative; }
  .cf-track {
    display: flex;
    height: 100%;
    transition: transform .35s cubic-bezier(0.2, 0.8, 0.2, 1);
    will-change: transform;
  }
  .cf-slide {
    flex: 0 0 100%;
    height: 100%;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 28px 20px 40px;
  }
  .cf-slide-inner { max-width: 480px; margin: 0 auto; width: 100%; }
  .cf-slide h2 {
    font-size: 20px;
    font-weight: 600;
    color: var(--text);
    margin: 0 0 6px 0;
    letter-spacing: -0.01em;
  }
  .cf-slide .cf-sub {
    font-size: 13px;
    color: var(--text-muted);
    margin: 0 0 22px 0;
    line-height: 1.55;
  }

  .cf-field { margin-bottom: 14px; }
  .cf-field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .cf-field .req { color: var(--primary); margin-left: 2px; }
  .cf-field input,
  .cf-field textarea {
    width: 100%;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    line-height: 1.5;
    transition: border-color .15s ease, background .15s ease;
  }
  .cf-field input:focus, .cf-field textarea:focus {
    outline: none;
    border-color: var(--primary);
    background: var(--bg);
  }
  .cf-field textarea { resize: vertical; min-height: 120px; }
  .cf-field input::placeholder, .cf-field textarea::placeholder { color: var(--text-faint); }

  .cf-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .cf-chip {
    padding: 10px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-muted);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    transition: all .15s ease;
  }
  .cf-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .cf-chip.selected {
    background: var(--primary);
    border-color: var(--primary);
    color: var(--primary-text);
  }

  .cf-cards { display: flex; flex-direction: column; gap: 10px; }
  .cf-card {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    font-family: inherit;
    text-align: left;
    transition: all .15s ease;
    width: 100%;
    color: var(--text);
  }
  .cf-card:hover { border-color: var(--border-strong); }
  .cf-card.selected {
    border-color: var(--primary);
    background: color-mix(in srgb, var(--primary) 10%, var(--surface));
  }
  .cf-card-icon {
    flex-shrink: 0;
    width: 40px;
    height: 40px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
  }
  .cf-card.selected .cf-card-icon {
    background: color-mix(in srgb, var(--primary) 20%, var(--bg));
    border-color: var(--primary);
    color: var(--primary);
  }
  .cf-card-text { flex: 1; min-width: 0; }
  .cf-card-title { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .cf-card-desc { font-size: 12px; color: var(--text-muted); line-height: 1.45; }

  .cf-conditional { display: none; }
  .cf-conditional.show { display: block; }

  .cf-actions {
    display: flex;
    gap: 10px;
    padding: 14px 18px 18px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .cf-btn {
    flex: 1;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    font-family: inherit;
    border: 1px solid transparent;
    transition: all .15s ease;
  }
  .cf-btn-back {
    background: transparent;
    color: var(--text);
    border-color: var(--border);
    flex: 0 0 auto;
    padding: 14px 22px;
  }
  .cf-btn-back:hover { background: var(--surface); border-color: var(--border-strong); }
  .cf-btn-next {
    background: var(--primary);
    color: var(--primary-text);
    border-color: var(--primary);
  }
  .cf-btn-next:hover { background: var(--primary-hover); border-color: var(--primary-hover); }
  .cf-btn-next:disabled { opacity: .45; cursor: not-allowed; }

  .cf-error {
    color: #DC2626;
    font-size: 12px;
    margin-top: 8px;
    display: none;
  }
  .cf-error.show { display: block; }

  .cf-success {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 40px 30px;
    min-height: 100%;
  }
  .cf-success-icon {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: color-mix(in srgb, var(--primary) 20%, var(--surface));
    color: var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 20px;
  }
  .cf-success h2 {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 10px;
  }
  .cf-success p {
    font-size: 14px;
    color: var(--text-muted);
    line-height: 1.6;
    max-width: 320px;
    margin-bottom: 28px;
  }

  body.cf-open { overflow: hidden; }

  @media (max-width: 380px) {
    .cf-slide { padding: 24px 16px 32px; }
    .cf-slide h2 { font-size: 18px; }
    .cf-actions { padding: 12px 14px 14px; }
  }
</style>
</head>
<body>

<div class="page-loader" id="page-loader"><div class="spinner"></div></div>

<main id="main" style="visibility: hidden;">

  <section class="header">
    <div class="avatar" id="avatar">
      <img id="avatar-img" src="" alt="" style="display:none;" />
    </div>

    <h1>
      <span id="display-name"></span>
      <span class="verified" id="verified" style="display:none;">
        <svg width="10" height="10" viewBox="0 0 12 12" fill="none"><path d="M2 6l3 3 5-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span data-i18n="verified">Verified</span>
      </span>
    </h1>

    <div class="tags" id="tags"></div>

    <p class="bio" id="bio"></p>
  </section>

  <nav class="links" aria-label="Links">

    <a class="btn btn-secondary hidden" id="btn-instagram" href="#" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
        <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
        <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
      </svg>
      <span>Instagram</span>
    </a>

    <a class="btn btn-secondary hidden" id="btn-tiktok" href="#" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
        <path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/>
      </svg>
      <span>TikTok</span>
    </a>

    <a class="btn btn-secondary hidden" id="btn-custom" href="#" target="_blank" rel="noopener">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/>
      </svg>
      <span id="btn-custom-label"></span>
    </a>

    <button class="btn btn-primary" id="btn-inquiry" type="button">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
        <polyline points="22,6 12,13 2,6"/>
      </svg>
      <span data-i18n="inquiry_btn">Anfragen</span>
    </button>

  </nav>

  <div class="divider" aria-hidden="true">⸻</div>

</main>

<footer id="footer" style="visibility: hidden;">
  <span data-i18n="powered_by">powered by</span> <a href="https://viuno.de" target="_blank" rel="noopener">viuno</a>
  <div style="margin-top: 4px;"><button type="button" class="imprint-link" id="btn-imprint" data-i18n="imprint">Impressum</button></div>

let currentLang = 'de'
let creatorData = null

function t(key, ...args) {
  const v = STRINGS[currentLang]?.[key]
  if (typeof v === 'function') return v(...args)
  return v ?? key
}

function applyLanguage(lang) {
  if (!STRINGS[lang]) lang = 'de'
  currentLang = lang
  document.documentElement.lang = lang

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n
    const val = t(key)
    if (typeof val === 'string') el.textContent = val
  })
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
    const key = el.dataset.i18nPlaceholder
    const val = t(key)
    if (typeof val === 'string') el.placeholder = val
  })

  document.querySelectorAll('.lang-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.lang === lang)
  })

  if (creatorData?.display_name) {
    const sub = document.getElementById('cf-success-sub')
    if (sub) sub.textContent = t('s_sub', creatorData.display_name)
  }

  // Step-Name neu setzen je nach aktuellem Slide
  const stepName = document.getElementById('cf-step-name')
  if (stepName) {
    stepName.textContent = t(currentStep === 0 ? 'step1_name' : 'step2_name')
  }

  // Action-Buttons
  updateActionButtons()
}

// ====================================================================
// SLUG + DATA LOADING
// ====================================================================
function getSlugFromPath() {
  const path = window.location.pathname
  const cleaned = path.replace(/^\/+|\/+$/g, '')
  if (!cleaned) return null
  return cleaned.split('/')[0]
}

async function loadBioPage() {
  const slug = getSlugFromPath()
  if (!slug) {
    window.location.replace('https://viuno.de')
    return
  }

  const { data, error } = await supabase
    .from('biopage_public')
    .select('*')
    .eq('slug', slug)
    .maybeSingle()

  if (error || !data) {
    window.location.replace('https://viuno.de')
    return
  }

  creatorData = data
  renderBioPage(data)

  // ─── Bio Page View Tracking ───
  try {
    const referrer = document.referrer || 'direct'
    const hour = new Date().getHours()
    fetch(SUPABASE_URL + '/functions/v1/track-bio-view', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
      body: JSON.stringify({ user_id: data.user_id, referrer_source: referrer, hour_of_day: hour })
    }).catch(() => {})
  } catch (_) {}

  const lang = ['de', 'en', 'it'].includes(data.default_language) ? data.default_language : 'de'
  applyLanguage(lang)

  document.getElementById('main').style.visibility = 'visible'
  document.getElementById('footer').style.visibility = 'visible'
  const loader = document.getElementById('page-loader')
  loader.classList.add('hide')
  setTimeout(() => loader.remove(), 250)
}

function renderBioPage(u) {
  document.title = `${u.display_name} — viuno`
  updateMetaTags(u)

  const avatar = document.getElementById('avatar')
  const avatarImg = document.getElementById('avatar-img')
  if (u.profile_image_url) {
    avatarImg.src = u.profile_image_url
    avatarImg.alt = u.display_name || ''
    avatarImg.style.display = 'block'
    avatarImg.onerror = () => {
      avatarImg.style.display = 'none'
      avatar.textContent = (u.display_name || '?')[0].toUpperCase()
    }
  } else {
    avatar.textContent = (u.display_name || '?')[0].toUpperCase()
  }

  document.getElementById('display-name').textContent = u.display_name || ''

  if (u.is_verified) {
    document.getElementById('verified').style.display = 'inline-flex'
  }

  const tagsEl = document.getElementById('tags')
  tagsEl.innerHTML = ''
  if (u.niche_category) {
    const s = document.createElement('span')
    s.className = 'tag'
    s.textContent = capitalizeFirst(u.niche_category)
    tagsEl.appendChild(s)
  }
  if (u.city) {
    const s = document.createElement('span')
    s.className = 'tag'
    s.textContent = u.city
    tagsEl.appendChild(s)
  }

  if (u.bio) document.getElementById('bio').textContent = u.bio

  if (u.instagram_handle) {
    const clean = u.instagram_handle.replace(/^@/, '')
    const ig = document.getElementById('btn-instagram')
    ig.href = `https://instagram.com/${encodeURIComponent(clean)}`
    ig.classList.remove('hidden')
  }

  if (u.tiktok_handle) {
    const clean = u.tiktok_handle.replace(/^@/, '')
    const tt = document.getElementById('btn-tiktok')
    tt.href = `https://tiktok.com/@${encodeURIComponent(clean)}`
    tt.classList.remove('hidden')
  }

  if (u.custom_link_url && u.custom_link_title) {
    const custom = document.getElementById('btn-custom')
    custom.href = normalizeUrl(u.custom_link_url)
    document.getElementById('btn-custom-label').textContent = u.custom_link_title
    custom.classList.remove('hidden')
  }
}

function updateMetaTags(u) {
  const desc = u.bio || `${u.display_name} — viuno`
  document.querySelector('meta[name="description"]')?.setAttribute('content', desc)
  document.querySelector('meta[property="og:title"]')?.setAttribute('content', `${u.display_name} — viuno`)
  document.querySelector('meta[property="og:description"]')?.setAttribute('content', desc)
  if (u.profile_image_url) {
    document.querySelector('meta[property="og:image"]')?.setAttribute('content', u.profile_image_url)
  }
}

function capitalizeFirst(s) {
  if (!s) return ''
  return s.charAt(0).toUpperCase() + s.slice(1)
}

function normalizeUrl(url) {
  if (!url) return '#'
  return /^https?:\/\//.test(url) ? url : 'https://' + url
}

// ====================================================================
// ANFRAGE OVERLAY
// ====================================================================
const overlay = document.getElementById('cf-overlay')
const track = document.getElementById('cf-track')
const stepNumEl = document.getElementById('cf-step-num')
const stepNameEl = document.getElementById('cf-step-name')
const progressFill = document.getElementById('cf-progress-fill')
const actions = document.getElementById('cf-actions')
const backBtn = document.getElementById('cf-back')
const nextBtn = document.getElementById('cf-next')

const TOTAL_STEPS = 2
let currentStep = 0
const formData = {}

function openInquiry() {
  overlay.classList.add('open')
  document.body.classList.add('cf-open')
  goToStep(0)
}

function closeInquiry() {
  overlay.classList.remove('open')
  document.body.classList.remove('cf-open')
  setTimeout(resetInquiry, 300)
}

function resetInquiry() {
  currentStep = 0
  overlay.querySelectorAll('input, textarea').forEach(el => el.value = '')
  overlay.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'))
  document.getElementById('cf-row-website').classList.remove('show')
  document.getElementById('cf-row-budget').classList.remove('show')
  hideError(1); hideError(2)
  actions.style.display = 'flex'
  nextBtn.disabled = false
  for (const k in formData) delete formData[k]
  track.querySelectorAll('.cf-slide').forEach(s => s.scrollTop = 0)
  goToStep(0)
}

function goToStep(i) {
  currentStep = i
  track.style.transform = `translateX(-${i * 100}%)`

  if (i < TOTAL_STEPS) {
    stepNumEl.textContent = i + 1
    stepNameEl.textContent = t(i === 0 ? 'step1_name' : 'step2_name')
    progressFill.style.width = `${((i + 1) / TOTAL_STEPS) * 100}%`
    actions.style.display = 'flex'
    backBtn.style.visibility = i === 0 ? 'hidden' : 'visible'
    updateActionButtons()
  } else {
    actions.style.display = 'none'
    progressFill.style.width = '100%'
    stepNameEl.textContent = t('s_title')
  }
}

function updateActionButtons() {
  backBtn.textContent = t('back')
  nextBtn.textContent = currentStep === TOTAL_STEPS - 1 ? t('send') : t('next')
}

function hideError(n) {
  document.getElementById('cf-err-' + n).classList.remove('show')
}
function showError(n, msg) {
  const el = document.getElementById('cf-err-' + n)
  if (msg) el.textContent = msg
  el.classList.add('show')
}

function collectSlide(slideIndex) {
  const slide = track.children[slideIndex]
  slide.querySelectorAll('input[name], textarea[name]').forEach(el => {
    formData[el.name] = el.value.trim()
  })
  slide.querySelectorAll('[data-field][data-single="true"]').forEach(group => {
    const selected = group.querySelector('.selected')
    formData[group.dataset.field] = selected ? selected.dataset.value : null
  })
}

function validateSlide(slideIndex) {
  collectSlide(slideIndex)
  if (slideIndex === 0) {
    if (!formData.request_type) { showError(1, t('err_choose')); return false }
    hideError(1); return true
  }
  if (slideIndex === 1) {
    if (!formData.sender_name || !formData.sender_email || !formData.message) {
      showError(2, t('err_required')); return false
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.sender_email)) {
      showError(2, t('err_email')); return false
    }
    hideError(2); return true
  }
  return true
}

function updateConditionalFields() {
  const type = formData.request_type
  const showWebsite = type === 'brand' || type === 'collab'
  const showBudget = type === 'brand'
  document.getElementById('cf-row-website').classList.toggle('show', showWebsite)
  document.getElementById('cf-row-budget').classList.toggle('show', showBudget)
}

track.addEventListener('click', (e) => {
  const chip = e.target.closest('.cf-chip, .cf-card')
  if (!chip) return
  const group = chip.closest('[data-field]')
  if (!group) return
  group.querySelectorAll('.selected').forEach(el => el.classList.remove('selected'))
  chip.classList.add('selected')
  if (group.dataset.field === 'request_type') {
    formData.request_type = chip.dataset.value
    updateConditionalFields()
  }
})

document.getElementById('btn-inquiry').addEventListener('click', openInquiry)
document.getElementById('cf-close').addEventListener('click', closeInquiry)
document.getElementById('cf-done').addEventListener('click', closeInquiry)

// ====================================================================
// IMPRESSUM BOTTOM SHEET
// ====================================================================
const impSheet = document.getElementById('imp-sheet')
const impBackdrop = document.getElementById('imp-backdrop')
const impContent = document.getElementById('imp-content')

function openImprint() {
  const text = (creatorData?.impressum_text || '').trim()
  if (text) {
    impContent.textContent = text
    impContent.classList.remove('imp-empty')
  } else {
    impContent.textContent = t('imprint_empty')
    impContent.classList.add('imp-empty')
  }
  impSheet.classList.add('open')
  impBackdrop.classList.add('open')
  document.body.classList.add('imp-open')
}

function closeImprint() {
  impSheet.classList.remove('open')
  impBackdrop.classList.remove('open')
  document.body.classList.remove('imp-open')
}

document.getElementById('btn-imprint').addEventListener('click', openImprint)
document.getElementById('imp-close').addEventListener('click', closeImprint)
impBackdrop.addEventListener('click', closeImprint)

backBtn.addEventListener('click', () => {
  if (currentStep > 0) goToStep(currentStep - 1)
})

nextBtn.addEventListener('click', async () => {
  if (!validateSlide(currentStep)) return

  if (currentStep < TOTAL_STEPS - 1) {
    goToStep(currentStep + 1)
    return
  }

  // Final submit
  for (let i = 0; i < TOTAL_STEPS; i++) collectSlide(i)

  const originalText = nextBtn.textContent
  nextBtn.disabled = true
  nextBtn.textContent = t('sending')

  const payload = {
    creator_id: creatorData.user_id,
    request_type: formData.request_type,
    sender_name: formData.sender_name,
    sender_email: formData.sender_email,
    sender_website: formData.sender_website ? normalizeUrl(formData.sender_website) : null,
    budget: formData.budget ? parseFloat(formData.budget) : null,
    message: formData.message
  }

  try {
    const res = await fetch(SUPABASE_URL + '/rest/v1/collab_requests', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
        'Prefer': 'return=minimal'
      },
      body: JSON.stringify(payload)
    })

    if (!res.ok && res.status !== 201) {
      const errText = await res.text()
      throw new Error('HTTP ' + res.status + ': ' + errText)
    }

    nextBtn.disabled = false
    nextBtn.textContent = originalText
    document.getElementById('cf-success-sub').textContent = t('s_sub', creatorData.display_name)
    goToStep(TOTAL_STEPS)
  } catch (err) {
    console.error('[Anfrage Submit]', err)
    nextBtn.disabled = false
    nextBtn.textContent = originalText
    showError(2, t('err_send'))
  }
})

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (overlay.classList.contains('open')) closeInquiry()
    if (impSheet.classList.contains('open')) closeImprint()
  }
})

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => applyLanguage(btn.dataset.lang))
})

// ====================================================================
// INIT
// ====================================================================
loadBioPage()
</script>
