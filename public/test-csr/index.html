.links{width:100%;display:flex;flex-direction:column;gap:9px;margin-bottom:16px;}

.link-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.link-icon.ig{background:linear-gradient(135deg,#833AB4,#E1306C,#F77737);}
.link-icon.tt{background:#1A1A2E;}
.link-icon.custom{background:rgba(59,130,246,0.15);border:1px solid rgba(59,130,246,0.25);}
.link-icon.custom svg{stroke:#60A5FA;fill:none;}
.link-text{flex:1;min-width:0;}
.link-text .lt{font-size:0.88rem;font-weight:500;color:#F5F5F4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.link-text .ls{font-size:0.68rem;color:#5A5A5C;margin-top:1px;}
.link-arrow{color:#3A3A3F;font-size:0.9rem;flex-shrink:0;}

.collab-btn .lt{color:#34D076;font-weight:600;}
.collab-btn .link-arrow{color:#34D076;}
.social-icons{display:flex;gap:20px;justify-content:center;}
.sicon{display:flex;align-items:center;justify-content:center;opacity:0.35;transition:opacity 0.2s;text-decoration:none;}

.impressum{font-size:0.62rem;color:#3A3A3F;text-decoration:none;margin-top:auto;padding-top:20px;}
@media(min-width:540px){body{background:#070709;align-items:center;padding:48px 20px;}.page{min-height:auto;border-radius:28px;border:1px solid #1C1C1F;box-shadow:0 32px 64px rgba(0,0,0,0.6);padding:64px 32px 40px;}}

function escHtml(s){if(!s)return '';return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function normUrl(u){if(!u)return '';return /^https?:\/\//.test(u)?u:'https://'+u;}
function capFirst(s){if(!s)return '';return s.charAt(0).toUpperCase()+s.slice(1);}

function getSlug(){
  var p=window.location.pathname.replace(/^\/+|\/+$/g,'');
  if(!p)return null;
  return p.split('/')[0];
}

  if(u.niche_category)tags.push(escHtml(capFirst(u.niche_category)));
  if(u.city)tags.push(escHtml(u.city));
  if(tags.length){

function openCollab(){document.getElementById('collab-modal').style.display='flex';document.body.style.overflow='hidden';}
function closeCollab(){document.getElementById('collab-modal').style.display='none';document.body.style.overflow='';}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeCollab();});

function updateFields(){
  var type=document.getElementById('collab-type').value;
  var showWebsite=['brand','collab'].indexOf(type)>=0;
  var showBudget=type==='brand';
  document.getElementById('row-website').style.display=showWebsite?'block':'none';
  document.getElementById('row-budget').style.display=showBudget?'block':'none';
}

async function submitCollab(e){
  e.preventDefault();
  var s=_S[_lang];
  var btn=document.getElementById('collab-submit');
  btn.disabled=true;btn.textContent=s.sending;
  var type=document.getElementById('collab-type').value;
  var name=document.getElementById('collab-name').value;
  var email=document.getElementById('collab-email').value;
  var rawUrl=document.getElementById('collab-website').value.trim();
  var website=rawUrl?(/^https?:\/\//.test(rawUrl)?rawUrl:'https://'+rawUrl):null;
  var budget=document.getElementById('collab-budget').value;
  var msg=document.getElementById('collab-msg').value;
  try{
    var res=await fetch('https://bzejndghppuipnedasuv.supabase.co/rest/v1/collab_requests',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':'sb_publishable_vVbpikuwqnh5jBTdvxcm7g_R4pZsMXI','Prefer':'return=minimal'},
      body:JSON.stringify({creator_id:_creatorId,request_type:type,sender_name:name,sender_email:email,sender_website:website,budget:budget?parseFloat(budget):null,message:msg})
    });
    if(res.ok||res.status===201){
      document.getElementById('collab-form').style.display='none';
      document.getElementById('collab-success').style.display='block';
    } else {
      btn.disabled=false;btn.textContent=s.submit;alert(s.err);
    }
  }catch(err){
    btn.disabled=false;btn.textContent=s.submit;alert(s.err);
  }
}

function trackView(userId){
  if(!userId)return;
  try{
    var r=document.referrer||'direct';
    var h=new Date().getHours();
    fetch('https://bzejndghppuipnedasuv.supabase.co/functions/v1/track-bio-view',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({user_id:userId,referrer_source:r,hour_of_day:h})
    });
  }catch(e){}
}
