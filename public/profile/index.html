<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>viuno · Profil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f4f2;--surface:#fff;--surface2:#f0efed;--border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.13);--text:#111110;--muted:#7a7975;--subtle:#b0afa9;--green:#1a7f4b;--green-bg:#edf7f1;--red:#c0392b;--red-bg:#fdf0ef;--orange:#b85c00;--orange-bg:#fdf3e7;--radius:16px;--radius-sm:10px;--nav-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh;color:var(--text);font-size:14px}

/* LOGIN */
#login-screen{min-height:100dvh;display:none;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-mark{width:32px;height:32px;border-radius:8px;background:var(--text);color:white;display:grid;place-items:center;font-size:14px;font-weight:700}
.login-logo-text{font-size:17px;font-weight:700;letter-spacing:-.03em}
.login-title{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--text)}
.field textarea{resize:none;line-height:1.5}
.btn-login{width:100%;padding:12px;margin-top:8px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-login:disabled{opacity:.5}
.login-error{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
/* APP */
#app{display:none;min-height:100dvh;flex-direction:column}
#app.visible{display:flex}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,244,242,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.hamburger{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:8px;transition:background .15s;padding:0}
.hamburger:hover{background:var(--surface2)}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.03em}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--text);color:white;display:grid;place-items:center;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);overflow:hidden;flex-shrink:0}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}
/* SIDEBAR */
/* COMMON */
.page{flex:1;padding:0 0 calc(32px + var(--safe-bottom));overflow-y:auto}
.page-header{padding:20px 20px 0}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.04em}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}
.section{padding:16px 20px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.section-link{font-size:12px;font-weight:500;color:var(--muted);text-decoration:none}
.section-label{font-size:10px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.kpi-card.dark{background:var(--text);border-color:var(--text);grid-column:1/-1;padding:16px 18px}
.kpi-card.dark .kpi-label{color:rgba(255,255,255,.45)}
.kpi-card.dark .kpi-value{color:white;font-size:28px}
.kpi-card.dark .kpi-delta{color:rgba(255,255,255,.55)}
.kpi-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.04em;margin-top:4px}
.kpi-delta{font-size:11px;font-weight:500;margin-top:2px}
.kpi-delta.up{color:var(--green)}
.kpi-delta.down{color:var(--red)}
.kpi-delta.neu{color:var(--muted)}
.empty-state{text-align:center;padding:48px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.5}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,#e8e6e2 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--text);color:white;font-size:13px;font-weight:500;padding:10px 18px;border-radius:99px;animation:toastIn .25s ease-out;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}


.profile-hero{padding:24px 20px 0;display:flex;align-items:flex-start;gap:16px}
.photo-wrap{position:relative;width:72px;height:72px;flex-shrink:0;cursor:pointer}
.profile-photo{width:72px;height:72px;border-radius:50%;object-fit:cover;border:2px solid var(--border-strong);background:var(--surface2)}
.profile-photo-fallback{width:72px;height:72px;border-radius:50%;flex-shrink:0;background:var(--text);color:white;display:grid;place-items:center;font-size:26px;font-weight:700;border:2px solid var(--border-strong)}
.photo-edit-btn{position:absolute;bottom:0;right:0;width:22px;height:22px;border-radius:50%;background:var(--text);color:white;display:grid;place-items:center;font-size:11px;border:2px solid var(--surface);pointer-events:none}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:20px;font-weight:700;letter-spacing:-.03em;color:var(--text)}
.profile-handle{font-size:13px;color:var(--muted);margin-top:2px}
.profile-plan{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:600;padding:3px 10px;border-radius:99px}
.plan-free{background:var(--surface2);color:var(--muted);border:1px solid var(--border-strong)}
.plan-pro{background:#111;color:white}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:16px 20px 0}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;text-align:center}
.stat-box-value{font-size:20px;font-weight:700;color:var(--text);letter-spacing:-.03em}
.stat-box-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
.biolink-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.biolink-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.biolink-url{font-size:13px;font-weight:500;color:var(--text)}
.biolink-url a{color:var(--text);text-decoration:none}
.status-indicator{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px}
.si-active{background:var(--green-bg);color:var(--green)}
.si-inactive{background:var(--surface2);color:var(--subtle);border:1px solid var(--border-strong)}
.biolink-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.biolink-stat{text-align:center}
.biolink-stat-val{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.02em}
.biolink-stat-label{font-size:10px;color:var(--muted);margin-top:1px}
.biolink-sources{display:flex;gap:6px;flex-wrap:wrap}
.source-pill{font-size:11px;font-weight:500;padding:4px 10px;border-radius:99px;background:var(--surface2);color:var(--muted)}
.edit-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.edit-card .field{margin-bottom:10px}
.edit-card .field:last-child{margin-bottom:0}
.edit-card .field label{font-size:11px}
.handle-input-wrap{display:flex;align-items:center}
.handle-prefix{padding:11px 10px 11px 14px;border:1px solid var(--border-strong);border-right:none;border-radius:var(--radius-sm) 0 0 var(--radius-sm);font-size:14px;color:var(--muted);background:var(--surface2)}
.handle-input-wrap input{border-radius:0 var(--radius-sm) var(--radius-sm) 0!important}
.niche-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.niche-btn{padding:8px 4px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:11px;font-weight:500;font-family:inherit;cursor:pointer;text-align:center;transition:all .15s}
.niche-btn.active{background:var(--text);color:white;border-color:var(--text)}
.btn-save{width:100%;padding:13px;margin-top:14px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-save:disabled{opacity:.5;cursor:not-allowed}
.save-success{font-size:12px;color:var(--green);text-align:center;margin-top:8px;min-height:18px}
.danger-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px}
.danger-row{display:flex;align-items:center;justify-content:space-between}
.danger-title{font-size:13px;font-weight:600;color:var(--text)}
.danger-sub{font-size:11px;color:var(--muted);margin-top:2px}
.btn-danger{padding:8px 16px;border-radius:var(--radius-sm);background:var(--red-bg);color:var(--red);border:1px solid rgba(192,57,43,.2);font-family:inherit;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:flex;align-items:flex-end;padding:0}
.modal-backdrop.centered{align-items:center;padding:24px}
.modal-card{background:var(--surface);border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));width:100%;max-height:90dvh;overflow-y:auto}
.modal-backdrop.centered .modal-card{border-radius:20px;max-width:400px;margin:0 auto;padding:24px}
.modal-title{font-size:17px;font-weight:700;letter-spacing:-.02em;margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-warn{background:var(--orange-bg);border:1px solid rgba(184,92,0,.2);border-radius:var(--radius-sm);padding:12px 14px;font-size:12px;color:var(--orange);line-height:1.5;margin-bottom:16px}
.modal-actions{display:flex;gap:8px;margin-top:20px}
.modal-btn{flex:1;padding:12px;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border-strong)}
.modal-btn-cancel{background:var(--surface2);color:var(--text)}
.modal-btn-confirm{background:var(--text);color:white;border-color:var(--text)}
.username-hint{font-size:11px;color:var(--subtle);margin-top:5px}


/* iOS zoom fix */
input,textarea,select{font-size:16px!important}
</style>
<script src="/sidebar.js"></script>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-mark">v</div><div class="login-logo-text">viuno</div></div>
    <div class="login-title">Willkommen zurück.</div>
    <div class="login-sub">Melde dich mit deinem viuno-Account an.</div>
    <div class="field"><label>E-Mail</label><input type="email" id="inp-email" placeholder="du@beispiel.de" autocomplete="email"/></div>
    <div class="field"><label>Passwort</label><input type="password" id="inp-pw" placeholder="••••••••" autocomplete="current-password"/></div>
    <button class="btn-login" id="btn-login">Einloggen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>
<div id="sidebar-root"></div>
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <span class="topbar-title">Profil</span>
    </div>
    <div class="topbar-avatar" id="user-avatar">?</div>
  </div>
  <div class="page">
    <div id="skeleton-area" style="padding:20px;display:flex;flex-direction:column;gap:12px">
      <div style="display:flex;gap:16px;align-items:center"><div class="skeleton" style="width:72px;height:72px;border-radius:50%;flex-shrink:0"></div><div style="flex:1"><div class="skeleton" style="height:22px;margin-bottom:8px"></div><div class="skeleton" style="height:16px;width:60%"></div></div></div>
      <div class="skeleton" style="height:80px"></div><div class="skeleton" style="height:200px"></div>
    </div>
    <div id="profile-content" class="hidden"></div>
  </div>
  <input type="file" id="photo-input" accept="image/jpeg,image/png,image/webp" class="hidden"/>
</div>
<div class="toast-wrap hidden" id="toast-wrap"><div class="toast" id="toast-msg"></div></div>
<script type="module">
import {createClient} from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL='https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'
const sb=createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true}})

function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(n,d=1){if(n==null||isNaN(+n))return'–';n=+n;if(n>=1e6)return(n/1e6).toFixed(d).replace(/\.0$/,'')+'M';if(n>=1e3)return(n/1e3).toFixed(d).replace(/\.0$/,'')+'k';return n.toFixed(0)}

window.showToast=function(msg,dur=2800){
  const w=document.getElementById('toast-wrap'),t=document.getElementById('toast-msg')
  t.textContent=msg;w.classList.remove('hidden')
  clearTimeout(w._t);w._t=setTimeout(()=>w.classList.add('hidden'),dur)
}
window.openSidebar=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');document.body.style.overflow='hidden'}
window.closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');document.body.style.overflow=''}

async function setupAvatar(session){
  const{data:p}=await sb.from('users').select('display_name,full_name,profile_image_url').eq('id',session.user.id).single()
  const name=p?.display_name||p?.full_name||session.user.email||'?'
  const av=document.getElementById('user-avatar')
  if(p?.profile_image_url){av.innerHTML=`<img src="${escHtml(p.profile_image_url)}" alt="">`}else{av.textContent=name[0].toUpperCase()}
  document.getElementById('sidebar-user-email').textContent=session.user.email
}

async function baseInit(onSession){
  const{data:{session}}=await sb.auth.getSession()
  if(session){await onSession(session);return}
  location.replace('/login')
  document.getElementById('btn-login').addEventListener('click',doLogin)
  document.getElementById('inp-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
}

async function doLogin(){
  const email=document.getElementById('inp-email').value.trim(),pw=document.getElementById('inp-pw').value
  const errEl=document.getElementById('login-error'),btn=document.getElementById('btn-login')
  errEl.textContent='';btn.disabled=true;btn.innerHTML='<span class="spinner"></span>'
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw})
  btn.disabled=false;btn.textContent='Einloggen'
  if(error){errEl.textContent='Falsche E-Mail oder Passwort.';return}
  await enterApp(data.session)
}
window.logout=window.sidebarLogout||(async()=>{try{const c=window.sb||window.supabase;if(c)await c.auth.signOut();}catch(_){}location.replace('https://viuno.de')})


const NICHES=[{key:'lifestyle',label:'Lifestyle'},{key:'fashion',label:'Fashion'},{key:'beauty',label:'Beauty'},{key:'food',label:'Food'},{key:'fitness',label:'Fitness'},{key:'travel',label:'Travel'},{key:'gaming',label:'Gaming'},{key:'music',label:'Music'},{key:'comedy',label:'Comedy'},{key:'education',label:'Bildung & Wissen'},{key:'business',label:'Business'},{key:'tech',label:'Tech'},{key:'art',label:'Art'},{key:'family',label:'Family'},{key:'mental_health',label:'Mental Health'},{key:'general',label:'Allgemein'}]
const state={user:null,profile:null,niche:'general'}
async function enterApp(session){state.user=session.user;document.getElementById('login-screen').style.display='none';document.getElementById('app').classList.add('visible');await setupAvatar(session);await loadProfile()}
async function loadProfile(){
  const uid=state.user.id
  const[profileRes]=await Promise.all([sb.from('users').select('*').eq('id',uid).single()])
  state.profile=profileRes.data;state.niche=profileRes.data?.niche_category||'general'
  document.getElementById('skeleton-area').classList.add('hidden');document.getElementById('profile-content').classList.remove('hidden');renderProfile()
}
function renderProfile(){
  const p=state.profile
  const initial=(p.display_name||p.full_name||'?')[0].toUpperCase()
  const photoInner=p.profile_image_url?`<img class="profile-photo" src="${escHtml(p.profile_image_url)}" alt="" onerror="this.outerHTML='<div class=&quot;profile-photo-fallback&quot;>${initial}</div>'">`:`<div class="profile-photo-fallback">${initial}</div>`
  document.getElementById('profile-content').innerHTML=`
    <div class="profile-hero">
      <div class="photo-wrap" onclick="document.getElementById('photo-input').click()" title="Foto ändern">${photoInner}<div class="photo-edit-btn">✎</div></div>
      <div class="profile-info">
        <div class="profile-name">${escHtml(p.display_name||p.full_name||'–')}</div>
        <div class="profile-handle">${p.email?escHtml(p.email):''}</div>
        <div class="profile-plan ${p.subscription_type==='pro'?'plan-pro':'plan-free'}">${p.subscription_type==='pro'?'⭐ Pro':'Free Plan'}</div>
      </div>
    </div>
    <div class="section"><div class="section-label">Profil bearbeiten</div>
      <div class="edit-card">
        <div class="field"><label>Username</label>
          <div style="display:flex;gap:8px;align-items:center">
            <input type="text" id="edit-username" value="${escHtml(p.display_name||'')}" style="flex:1"/>
            <button onclick="openUsernameModal()" style="padding:11px 14px;border-radius:var(--radius-sm);background:var(--text);color:white;border:none;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap">Ändern</button>
          </div>
          <div class="username-hint">Dein öffentlicher Name auf viuno.de</div>
        </div>
        <div class="field"><label>Name</label><input type="text" id="edit-fullname" value="${escHtml(p.full_name||'')}"/></div>
        <div class="field"><label>Bio</label><textarea id="edit-bio" rows="3">${escHtml(p.bio||'')}</textarea></div>
        <div class="field"><label>Instagram</label><div class="handle-input-wrap"><span class="handle-prefix">@</span><input type="text" id="edit-ig" value="${escHtml((p.instagram_handle||'').replace(/^@/,''))}"/></div></div>
        <div class="field"><label>TikTok</label><div class="handle-input-wrap"><span class="handle-prefix">@</span><input type="text" id="edit-tt" value="${escHtml((p.tiktok_handle||'').replace(/^@/,''))}"/></div></div>
        <div class="field"><label>Stadt</label><input type="text" id="edit-city" value="${escHtml(p.city||'')}"/></div>
        <div class="field"><label>Nische</label><div class="niche-grid">${NICHES.map(n=>`<button class="niche-btn ${state.niche===n.key?'active':''}" data-niche="${n.key}" onclick="selectNiche('${n.key}')">${n.label}</button>`).join('')}</div></div>
        <button class="btn-save" id="btn-save" onclick="saveProfile()">Speichern</button>
        <div class="save-success hidden" id="save-success">✓ Gespeichert</div>
      </div>
    </div>
    <div class="section" style="padding-bottom:8px"><div class="section-label">Account</div>
      <div class="danger-card">
        <div class="danger-row" style="margin-bottom:12px">
          <div><div class="danger-title">Login-E-Mail</div><div class="danger-sub">${escHtml(state.user.email||'–')}</div></div>
        </div>
        <div class="danger-row">
          <div><div class="danger-title">Account löschen</div><div class="danger-sub">Alle Daten werden unwiderruflich gelöscht.</div></div>
          <button class="btn-danger" onclick="showToast('Bitte wende dich an support@viuno.de')">Löschen</button>
        </div>
      </div>
    </div>`
}
window.selectNiche=function(key){state.niche=key;document.querySelectorAll('.niche-btn').forEach(b=>b.classList.toggle('active',b.dataset.niche===key))}

// ── Username Modal ──
window.openUsernameModal=function(){
  const newName=document.getElementById('edit-username').value.trim()
  if(!newName){showToast('Bitte gib einen Username ein.');return}
  if(newName===state.profile.display_name){showToast('Das ist bereits dein Username.');return}
  // Step 1: confirm new username
  showModal(`Username ändern zu "${newName}"?`,
    `Dein neuer Username wird: <b>${newName}</b><br><br>Klicke Weiter um die Auswirkungen zu sehen.`,
    'Weiter',()=>showUsernameWarning(newName))
}
function showUsernameWarning(newName){
  showModal('Wichtiger Hinweis',
    null,
    'Ja, Username ändern',
    ()=>commitUsername(newName),
    `Dein BioLink und Media Kit werden automatisch auf den neuen Username aktualisiert. Alte Links funktionieren danach nicht mehr. Bist du sicher?`)
}
async function commitUsername(newName){
  closeModal()
  showToast('Username wird geändert…',5000)
  const{data:{session}}=await sb.auth.getSession()
  if(!session){showToast('Session abgelaufen');location.reload();return}
  const res=await fetch(`${SUPABASE_URL}/functions/v1/cleanup-user-pages`,{method:'POST',headers:{'Authorization':`Bearer ${session.access_token}`,'Content-Type':'application/json'},body:JSON.stringify({new_display_name:newName})})
  const body=await res.json().catch(()=>({}))
  if(!res.ok&&body.success!==true){showToast('Fehler: '+(body.error||'Unbekannt'),4000);return}
  state.profile.display_name=newName
  showToast('Username geändert ✓')
  await loadProfile()
}

// ── Modal Helper ──
function showModal(title,body,confirmLabel,onConfirm,warnText){
  let el=document.getElementById('profile-modal')
  if(!el){el=document.createElement('div');el.id='profile-modal';document.body.appendChild(el)}
  el.className='modal-backdrop centered'
  el.innerHTML=`<div class="modal-card">
    <div class="modal-title">${escHtml(title)}</div>
    ${body?`<div class="modal-sub">${body}</div>`:''}
    ${warnText?`<div class="modal-warn">⚠️ ${escHtml(warnText)}</div>`:''}
    <div class="modal-actions">
      <button class="modal-btn modal-btn-cancel" onclick="closeModal()">Abbrechen</button>
      <button class="modal-btn modal-btn-confirm" id="modal-confirm-btn">${escHtml(confirmLabel)}</button>
    </div>
  </div>`
  document.getElementById('modal-confirm-btn').addEventListener('click',onConfirm)
  document.body.style.overflow='hidden'
}
window.closeModal=function(){const el=document.getElementById('profile-modal');if(el)el.remove();document.body.style.overflow=''}

window.saveProfile=async function(){
  const btn=document.getElementById('btn-save'),successEl=document.getElementById('save-success')
  btn.disabled=true;btn.innerHTML='<span class="spinner"></span> Speichern…';successEl.classList.add('hidden')
  const ig=document.getElementById('edit-ig').value.trim().replace(/^@/,''),tt=document.getElementById('edit-tt').value.trim().replace(/^@/,'')
  const patch={full_name:document.getElementById('edit-fullname').value.trim()||null,bio:document.getElementById('edit-bio').value.trim()||null,instagram_handle:ig||null,tiktok_handle:tt||null,city:document.getElementById('edit-city').value.trim()||null,niche_category:state.niche,updated_at:new Date().toISOString()}
  const{error}=await sb.from('users').update(patch).eq('id',state.user.id)
  btn.disabled=false;btn.textContent='Speichern'
  if(error){showToast('Fehler: '+error.message,4000);return}
  Object.assign(state.profile,patch);successEl.classList.remove('hidden');setTimeout(()=>successEl.classList.add('hidden'),3000);showToast('Profil gespeichert ✓')
}
document.getElementById('photo-input').addEventListener('change',async(e)=>{
  const file=e.target.files?.[0];if(!file)return
  if(file.size>5*1024*1024){showToast('Bild zu groß. Max. 5 MB.');return}
  const reader=new FileReader()
  reader.onload=(ev)=>{const wrap=document.querySelector('.photo-wrap');if(!wrap)return;const ex=wrap.querySelector('img,.profile-photo-fallback');if(ex)ex.remove();const img=document.createElement('img');img.className='profile-photo';img.src=ev.target.result;wrap.insertBefore(img,wrap.querySelector('.photo-edit-btn'))}
  reader.readAsDataURL(file);showToast('Wird hochgeladen…',8000)
  const path=`${state.user.id}/${Date.now()}.${file.name.split('.').pop()}`
  const{error}=await sb.storage.from('profile-images').upload(path,file,{upsert:true})
  if(error){showToast('Upload fehlgeschlagen: '+error.message,4000);return}
  const{data:{publicUrl}}=sb.storage.from('profile-images').getPublicUrl(path)
  await sb.from('users').update({profile_image_url:publicUrl}).eq('id',state.user.id)
  state.profile.profile_image_url=publicUrl;showToast('Profilbild gespeichert ✓');e.target.value=''
})
baseInit(enterApp)

</script>
