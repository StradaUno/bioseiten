let currentLang='de', creatorData=null, customLinks=[]
function t(key,...args){const v=STRINGS[currentLang]?.[key]; if(typeof v==='function') return v(...args); return v ?? key}
function applyLanguage(lang){
  if(!STRINGS[lang]) lang='de'
  currentLang=lang
  document.documentElement.lang=lang
  document.querySelectorAll('[data-i18n]').forEach(el=>{const v=t(el.dataset.i18n); if(typeof v==='string') el.textContent=v})
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el=>{const v=t(el.dataset.i18nPlaceholder); if(typeof v==='string') el.placeholder=v})
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active', b.dataset.lang===lang))
  if(creatorData?.display_name){const sub=document.getElementById('cf-success-sub'); if(sub) sub.textContent=t('s_sub', creatorData.display_name)}
  renderLinks()
  const sn=document.getElementById('cf-step-name'); if(sn) sn.textContent=t(currentStep===0?'step1_name':'step2_name')
  updateActionButtons()
}
function getSlugFromPath(){const p=window.location.pathname.replace(/^\/+|\/+$/g,''); return p?p.split('/')[0]:null}
async function loadBioPage(){
  const slug=getSlugFromPath()
  if(!slug){window.location.replace('https://viuno.de'); return}
  const {data,error}=await supabase.from('biopage_v2').select('*').ilike('display_name',slug).maybeSingle()
  if(error||!data){window.location.replace('https://viuno.de'); return}
  creatorData=data
  const {data:links}=await supabase.from('biolink_links_public').select('*').eq('user_id',data.user_id).order('position',{ascending:true})
  customLinks=links??[]
  renderHeader(data); renderLinks()
  try{const referrer=document.referrer||'direct'; const hour=new Date().getHours()
    fetch(SUPABASE_URL+'/functions/v1/track-biolink-view',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_id:data.user_id,referrer_source:referrer,hour_of_day:hour,language:currentLang})}).catch(()=>{})}catch(_){}
  const lang=['de','en','it'].includes(data.default_language)?data.default_language:'de'
  applyLanguage(lang)
  document.getElementById('main').style.visibility='visible'
  document.getElementById('footer').style.visibility='visible'
  const ld=document.getElementById('page-loader'); ld.classList.add('hide'); setTimeout(()=>ld.remove(),250)
}
function renderHeader(u){
  document.title=u.display_name+' - viuno'
  const desc=u.bio||(u.display_name+' - viuno')
  document.querySelector('meta[name="description"]')?.setAttribute('content',desc)
  document.querySelector('meta[property="og:title"]')?.setAttribute('content',u.display_name+' - viuno')
  document.querySelector('meta[property="og:description"]')?.setAttribute('content',desc)
  if(u.profile_image_url) document.querySelector('meta[property="og:image"]')?.setAttribute('content',u.profile_image_url)
  const av=document.getElementById('avatar'), avi=document.getElementById('avatar-img')
  if(u.profile_image_url){avi.src=u.profile_image_url; avi.alt=u.display_name||''; avi.style.display='block'; avi.onerror=()=>{avi.style.display='none'; av.textContent=(u.display_name||'?')[0].toUpperCase()}}
  else{av.textContent=(u.display_name||'?')[0].toUpperCase()}
  document.getElementById('display-name').textContent=u.display_name||''
  if(u.is_verified) document.getElementById('verified').style.display='inline-flex'
  const tg=document.getElementById('tags'); tg.innerHTML=''
  if(u.niche_category){const s=document.createElement('span'); s.className='tag'; s.textContent=u.niche_category.charAt(0).toUpperCase()+u.niche_category.slice(1); tg.appendChild(s)}
  if(u.city){const s=document.createElement('span'); s.className='tag'; s.textContent=u.city; tg.appendChild(s)}
  if(u.bio) document.getElementById('bio').textContent=u.bio
}
function renderLinks(){
  const c=document.getElementById('links'); c.innerHTML=''
  const u=creatorData; if(!u) return
  const ig='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>'
  const tt='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5.8 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>'
  const yt='<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M23.5 6.5a3 3 0 0 0-2.1-2.1C19.5 4 12 4 12 4s-7.5 0-9.4.4A3 3 0 0 0 .5 6.5C0 8.4 0 12 0 12s0 3.6.5 5.5a3 3 0 0 0 2.1 2.1C4.5 20 12 20 12 20s7.5 0 9.4-.4a3 3 0 0 0 2.1-2.1c.5-1.9.5-5.5.5-5.5s0-3.6-.5-5.5zM9.6 15.6V8.4l6.2 3.6-6.2 3.6z"/></svg>'
  const th='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/></svg>'
  const lk='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg>'
  if(u.instagram_handle) c.appendChild(makeBtn({href:'https://instagram.com/'+encodeURIComponent(u.instagram_handle.replace(/^@/,'')), label:'Instagram', icon:ig}))
  if(u.tiktok_handle) c.appendChild(makeBtn({href:'https://tiktok.com/@'+encodeURIComponent(u.tiktok_handle.replace(/^@/,'')), label:'TikTok', icon:tt}))
  if(u.youtube_handle) c.appendChild(makeBtn({href:'https://youtube.com/@'+encodeURIComponent(u.youtube_handle.replace(/^@/,'')), label:'YouTube', icon:yt}))
  if(u.threads_handle) c.appendChild(makeBtn({href:'https://threads.net/@'+encodeURIComponent(u.threads_handle.replace(/^@/,'')), label:'Threads', icon:th}))
  for(const link of customLinks) c.appendChild(makeBtn({href:normalizeUrl(link.url), label:link.title, icon:lk, adLabel:link.is_paid?t('ad_label'):null}))
  const inq=document.createElement('button')
  inq.className='btn btn-primary'; inq.id='btn-inquiry'; inq.type='button'
  inq.innerHTML='<div class="btn-row"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg><span>'+t('inquiry_btn')+'</span></div>'
  inq.addEventListener('click', openInquiry)
  c.appendChild(inq)
}
function makeBtn(o){const a=document.createElement('a'); a.className='btn btn-secondary'; a.href=o.href; a.target='_blank'; a.rel='noopener'; let h='<div class="btn-row">'+o.icon+'<span>'+escapeHtml(o.label)+'</span></div>'; if(o.adLabel) h+='<span class="btn-ad-label">'+escapeHtml(o.adLabel)+'</span>'; a.innerHTML=h; return a}
function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function normalizeUrl(u){return u?(/^https?:///.test(u)?u:'https://'+u):'#'}
const overlay=document.getElementById('cf-overlay'), trk=document.getElementById('cf-track'), stepNumEl=document.getElementById('cf-step-num'), stepNameEl=document.getElementById('cf-step-name'), progressFill=document.getElementById('cf-progress-fill'), actions=document.getElementById('cf-actions'), backBtn=document.getElementById('cf-back'), nextBtn=document.getElementById('cf-next')
const TOTAL_STEPS=2; let currentStep=0; const formData={}
function openInquiry(){overlay.classList.add('open'); document.body.classList.add('cf-open'); goToStep(0)}
function closeInquiry(){overlay.classList.remove('open'); document.body.classList.remove('cf-open'); setTimeout(resetInquiry,300)}
function resetInquiry(){currentStep=0; overlay.querySelectorAll('input,textarea').forEach(el=>el.value=''); overlay.querySelectorAll('.selected').forEach(el=>el.classList.remove('selected')); document.getElementById('cf-row-website').classList.remove('show'); document.getElementById('cf-row-budget').classList.remove('show'); hideError(1); hideError(2); actions.style.display='flex'; nextBtn.disabled=false; for(const k in formData) delete formData[k]; trk.querySelectorAll('.cf-slide').forEach(s=>s.scrollTop=0); goToStep(0)}
function goToStep(i){currentStep=i; trk.style.transform='translateX(-'+(i*100)+'%)'; if(i<TOTAL_STEPS){stepNumEl.textContent=i+1; stepNameEl.textContent=t(i===0?'step1_name':'step2_name'); progressFill.style.width=(((i+1)/TOTAL_STEPS)*100)+'%'; actions.style.display='flex'; backBtn.style.visibility=i===0?'hidden':'visible'; updateActionButtons()}else{actions.style.display='none'; progressFill.style.width='100%'; stepNameEl.textContent=t('s_title')}}
function updateActionButtons(){backBtn.textContent=t('back'); nextBtn.textContent=currentStep===TOTAL_STEPS-1?t('send'):t('next')}
function hideError(n){document.getElementById('cf-err-'+n).classList.remove('show')}
function showError(n,msg){const el=document.getElementById('cf-err-'+n); if(msg) el.textContent=msg; el.classList.add('show')}
function collectSlide(i){const s=trk.children[i]; s.querySelectorAll('input[name],textarea[name]').forEach(el=>{formData[el.name]=el.value.trim()}); s.querySelectorAll('[data-field][data-single="true"]').forEach(g=>{const sel=g.querySelector('.selected'); formData[g.dataset.field]=sel?sel.dataset.value:null})}
function validateSlide(i){collectSlide(i); if(i===0){if(!formData.request_type){showError(1,t('err_choose')); return false} hideError(1); return true} if(i===1){if(!formData.sender_name||!formData.sender_email||!formData.message){showError(2,t('err_required')); return false} if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.sender_email)){showError(2,t('err_email')); return false} hideError(2); return true} return true}
function updateConditional(){const ty=formData.request_type; document.getElementById('cf-row-website').classList.toggle('show', ty==='brand'||ty==='collab'); document.getElementById('cf-row-budget').classList.toggle('show', ty==='brand')}
trk.addEventListener('click',(e)=>{const ch=e.target.closest('.cf-chip,.cf-card'); if(!ch) return; const g=ch.closest('[data-field]'); if(!g) return; g.querySelectorAll('.selected').forEach(el=>el.classList.remove('selected')); ch.classList.add('selected'); if(g.dataset.field==='request_type'){formData.request_type=ch.dataset.value; updateConditional()}})
document.getElementById('cf-close').addEventListener('click', closeInquiry)
document.getElementById('cf-done').addEventListener('click', closeInquiry)
const impSheet=document.getElementById('imp-sheet'), impBackdrop=document.getElementById('imp-backdrop'), impContent=document.getElementById('imp-content')
function openImprint(){const text=(creatorData?.impressum_text||'').trim(); if(text){impContent.textContent=text; impContent.classList.remove('imp-empty')}else{impContent.textContent=t('imprint_empty'); impContent.classList.add('imp-empty')} impSheet.classList.add('open'); impBackdrop.classList.add('open'); document.body.classList.add('imp-open')}
function closeImprint(){impSheet.classList.remove('open'); impBackdrop.classList.remove('open'); document.body.classList.remove('imp-open')}
document.getElementById('btn-imprint').addEventListener('click', openImprint)
document.getElementById('imp-close').addEventListener('click', closeImprint)
impBackdrop.addEventListener('click', closeImprint)
backBtn.addEventListener('click',()=>{if(currentStep>0) goToStep(currentStep-1)})
nextBtn.addEventListener('click', async()=>{
  if(!validateSlide(currentStep)) return
  if(currentStep<TOTAL_STEPS-1){goToStep(currentStep+1); return}
  for(let i=0;i<TOTAL_STEPS;i++) collectSlide(i)
  const orig=nextBtn.textContent; nextBtn.disabled=true; nextBtn.textContent=t('sending')
  const payload={creator_id:creatorData.user_id, request_type:formData.request_type, sender_name:formData.sender_name, sender_email:formData.sender_email, sender_website:formData.sender_website?normalizeUrl(formData.sender_website):null, budget:formData.budget?parseFloat(formData.budget):null, message:formData.message}
  try{
    const res=await fetch(SUPABASE_URL+'/rest/v1/collab_requests',{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_ANON_KEY,'Authorization':'Bearer '+SUPABASE_ANON_KEY,'Prefer':'return=minimal'},body:JSON.stringify(payload)})
    if(!res.ok && res.status!==201) throw new Error('HTTP '+res.status)
    nextBtn.disabled=false; nextBtn.textContent=orig
    document.getElementById('cf-success-sub').textContent=t('s_sub', creatorData.display_name)
    goToStep(TOTAL_STEPS)
  }catch(err){nextBtn.disabled=false; nextBtn.textContent=orig; showError(2,t('err_send'))}
})
document.addEventListener('keydown',(e)=>{if(e.key==='Escape'){if(overlay.classList.contains('open')) closeInquiry(); if(impSheet.classList.contains('open')) closeImprint()}})
document.querySelectorAll('.lang-btn').forEach(b=>b.addEventListener('click',()=>applyLanguage(b.dataset.lang)))
loadBioPage()
</script></body></html>
