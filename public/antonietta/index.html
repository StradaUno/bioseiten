<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Antonietta</title>
<meta name="description" content="Outfit, consigli di stile e momenti di vita da una mamma italiana in Germania." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --rose: #e8a598;
    --blush: #f2cfc6;
    --cream: #fdf6f0;
    --terracotta: #c9705a;
    --brown: #6b3a2a;
    --text: #3a1f15;
    --text-soft: #8a6055;
    --white: #fff;
    --radius: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--cream);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 48px;
    overflow-x: hidden;
  }

  /* Background deco */
  body::before {
    content: '';
    position: fixed;
    top: -120px;
    right: -120px;
    width: 420px;
    height: 420px;
    background: radial-gradient(circle, var(--blush) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -80px;
    left: -80px;
    width: 320px;
    height: 320px;
    background: radial-gradient(circle, #f7ddd6 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Loading skeleton */
  #loader {
    position: fixed;
    inset: 0;
    background: var(--cream);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    transition: opacity .4s ease;
  }
  .loader-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--rose);
    margin: 0 4px;
    animation: bounce .9s ease-in-out infinite;
  }
  .loader-dot:nth-child(2) { animation-delay: .15s; }
  .loader-dot:nth-child(3) { animation-delay: .3s; }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); opacity: .4; }
    50% { transform: translateY(-10px); opacity: 1; }
  }

  /* Main layout */
  .page {
    width: 100%;
    max-width: 420px;
    padding: 0 20px;
    position: relative;
    z-index: 1;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity .5s ease, transform .5s ease;
  }
  .page.visible { opacity: 1; transform: translateY(0); }

  /* Header strip */
  .header-strip {
    width: calc(100% + 40px);
    margin-left: -20px;
    height: 180px;
    background: linear-gradient(160deg, var(--terracotta) 0%, var(--rose) 60%, var(--blush) 100%);
    position: relative;
    overflow: hidden;
    flex-shrink: 0;
  }
  .header-strip::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.06'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }
  .header-strip-text {
    position: absolute;
    bottom: 20px;
    left: 24px;
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    letter-spacing: .5px;
  }

  /* Profile section */
  .profile-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-top: -56px;
    padding-bottom: 8px;
  }
  .avatar-ring {
    width: 108px;
    height: 108px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, var(--terracotta), var(--rose), var(--blush));
    box-shadow: 0 8px 24px rgba(201,112,90,.25);
    flex-shrink: 0;
  }
  .avatar-ring img, .avatar-fallback {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid var(--cream);
    display: block;
    background: var(--blush);
  }
  .avatar-fallback {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 38px;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-size: 26px;
    font-weight: 600;
    color: var(--text);
    margin-top: 14px;
    text-align: center;
    letter-spacing: -.3px;
  }
  .bio {
    font-size: 14px;
    line-height: 1.65;
    color: var(--text-soft);
    text-align: center;
    margin-top: 8px;
    font-weight: 300;
    max-width: 300px;
  }

  /* Social handles */
  .handles {
    display: flex;
    gap: 10px;
    margin-top: 14px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .handle-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--white);
    border: 1px solid var(--blush);
    border-radius: 999px;
    padding: 6px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-soft);
    text-decoration: none;
    transition: all .2s;
    box-shadow: 0 2px 8px rgba(201,112,90,.08);
  }
  .handle-pill:hover {
    background: var(--blush);
    border-color: var(--rose);
    color: var(--brown);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(201,112,90,.15);
  }
  .handle-pill svg { flex-shrink: 0; }

  /* Links */
  .links-section {
    width: 100%;
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .link-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--white);
    border: 1px solid rgba(232,165,152,.3);
    border-radius: var(--radius);
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text);
    transition: all .22s;
    box-shadow: 0 2px 12px rgba(201,112,90,.06);
    position: relative;
    overflow: hidden;
  }
  .link-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 4px;
    background: linear-gradient(to bottom, var(--terracotta), var(--rose));
    border-radius: 4px 0 0 4px;
    opacity: 0;
    transition: opacity .22s;
  }
  .link-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(201,112,90,.14);
    border-color: var(--rose);
  }
  .link-card:hover::before { opacity: 1; }
  .link-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 20px;
  }
  .link-icon.ig { background: linear-gradient(135deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
  .link-icon.tt { background: #000; }
  .link-icon.amazon { background: linear-gradient(135deg, #ff9900, #ffb347); }
  .link-icon.custom { background: linear-gradient(135deg, var(--terracotta), var(--rose)); }
  .link-icon.email { background: linear-gradient(135deg, #667eea, #764ba2); }
  .link-label {
    flex: 1;
    min-width: 0;
  }
  .link-title {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
  }
  .link-sub {
    font-size: 12px;
    color: var(--text-soft);
    margin-top: 2px;
  }
  .link-arrow {
    color: var(--rose);
    font-size: 18px;
    flex-shrink: 0;
    transition: transform .2s;
  }
  .link-card:hover .link-arrow { transform: translateX(3px); }

  /* Footer */
  .footer {
    margin-top: 40px;
    text-align: center;
  }
  .footer-brand {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    color: var(--text-soft);
    opacity: .6;
    text-decoration: none;
    letter-spacing: .3px;
  }
  .footer-brand:hover { opacity: 1; }
  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--rose);
  }

  /* Error state */
  .error-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-soft);
  }

  /* Staggered animation for links */
  .link-card {
    opacity: 0;
    animation: fadeUp .4s ease forwards;
  }
  .link-card:nth-child(1) { animation-delay: .1s; }
  .link-card:nth-child(2) { animation-delay: .18s; }
  .link-card:nth-child(3) { animation-delay: .26s; }
  .link-card:nth-child(4) { animation-delay: .34s; }
  .link-card:nth-child(5) { animation-delay: .42s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div id="loader">
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
  <div class="loader-dot"></div>
</div>

<div class="page" id="page">
  <div class="header-strip">
    <div class="header-strip-text">moda · vita · famiglia</div>
  </div>

  <div class="profile-section" id="profile-section">
    <!-- filled by JS -->
  </div>

  <div class="links-section" id="links-section">
    <!-- filled by JS -->
  </div>

  <div class="footer">
    <a href="https://viuno.de" target="_blank" rel="noopener" class="footer-brand">
      <div class="footer-dot"></div>
      viuno
      <div class="footer-dot"></div>
    </a>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL = 'https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'
const SLUG = 'antonietta'

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

function hideLoader() {
  const loader = document.getElementById('loader')
  loader.style.opacity = '0'
  setTimeout(() => loader.remove(), 400)
  setTimeout(() => document.getElementById('page').classList.add('visible'), 100)
}

function formatNum(n) {
  if (!n) return null
  if (n >= 1_000_000) return (n / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M'
  if (n >= 1_000) return (n / 1_000).toFixed(1).replace(/\.0$/, '') + 'k'
  return n.toLocaleString('it-IT')
}

function igIcon() {
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zm0-2.163c-3.259 0-3.667.014-4.947.072-4.358.2-6.78 2.618-6.98 6.98-.059 1.281-.073 1.689-.073 4.948 0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98 1.281.058 1.689.072 4.948.072 3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98-1.281-.059-1.69-.073-4.949-.073zm0 5.838c-3.403 0-6.162 2.759-6.162 6.162s2.759 6.163 6.162 6.163 6.162-2.759 6.162-6.163c0-3.403-2.759-6.162-6.162-6.162zm0 10.162c-2.209 0-4-1.79-4-4 0-2.209 1.791-4 4-4s4 1.791 4 4c0 2.21-1.791 4-4 4zm6.406-11.845c-.796 0-1.441.645-1.441 1.44s.645 1.44 1.441 1.44c.795 0 1.439-.645 1.439-1.44s-.644-1.44-1.439-1.44z"/></svg>`
}

function ttIcon() {
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.24 8.24 0 004.83 1.56V6.79a4.85 4.85 0 01-1.06-.1z"/></svg>`
}

function amazonIcon() {
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M.045 18.02c.072-.116.187-.124.348-.022 3.636 2.11 7.594 3.166 11.87 3.166 2.852 0 5.668-.533 8.447-1.595l.315-.14c.138-.06.234-.1.293-.13.226-.088.39-.046.525.13.12.174.09.336-.1.48-.256.19-.6.41-1.006.654-1.244.743-2.64 1.316-4.185 1.726a17.93 17.93 0 01-4.47.575c-2.017 0-3.985-.316-5.907-.947-1.924-.63-3.7-1.576-5.332-2.83-.132-.1-.196-.204-.196-.315 0-.075.027-.14.082-.196l.316-.555zm10.12-6.674c0 .672.17 1.198.508 1.578.34.38.8.57 1.39.57.58 0 1.04-.19 1.37-.57.33-.37.5-.9.5-1.577V6.37h1.69v4.976c0 1.014-.275 1.804-.83 2.37-.55.564-1.3.847-2.25.847-.96 0-1.72-.283-2.29-.847-.57-.565-.857-1.355-.857-2.37V6.37h1.76v4.976zm-6.09 1.81c.237 0 .436-.03.597-.09.16-.06.285-.143.374-.252.088-.108.133-.225.133-.35 0-.136-.05-.25-.15-.34-.1-.09-.255-.135-.465-.135h-1.08v1.167h.59zm.13-2.466c.2 0 .356-.048.47-.143.114-.095.17-.22.17-.376 0-.15-.053-.27-.16-.36-.107-.09-.27-.136-.49-.136H4.15v1.015h.055zm1.74 1.455c0 .462-.15.826-.45 1.09-.302.265-.727.397-1.277.397H2.46V6.37h1.89c.537 0 .944.123 1.22.368.276.246.414.582.414 1.007 0 .243-.058.455-.175.635-.116.18-.277.316-.484.407.278.093.49.244.638.452.148.208.222.456.222.745z"/></svg>`
}

function emailIcon() {
  return `<svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>`
}

async function load() {
  try {
    // Load user + biolink data
    const { data: bioData, error: bioErr } = await supabase
      .from('biolink_settings')
      .select(`
        slug, theme, is_active, custom_link_url, custom_link_title,
        users!inner(
          id, display_name, full_name, bio, profile_image_url,
          instagram_handle, tiktok_handle, contact_email, city, country,
          total_followers, amazon_storefront_url
        )
      `)
      .eq('slug', SLUG)
      .single()

    if (bioErr || !bioData) throw new Error('Profilo non trovato')

    const user = bioData.users
    const name = user.display_name || user.full_name || 'Antonietta'

    // Load platform analytics
    const { data: platforms } = await supabase
      .from('platform_accounts')
      .select('platform, follower_count, engagement_rate, avg_views')
      .eq('user_id', user.id)

    // Render profile
    const igFollowers = platforms?.find(p => p.platform === 'instagram')?.follower_count
    const ttFollowers = platforms?.find(p => p.platform === 'tiktok')?.follower_count

    const profileEl = document.getElementById('profile-section')
    profileEl.innerHTML = `
      <div class="avatar-ring">
        ${user.profile_image_url
          ? `<img src="${user.profile_image_url}" alt="${name}" onerror="this.outerHTML='<div class=\\'avatar-fallback\\'>👩‍💼</div>'" />`
          : `<div class="avatar-fallback">👩‍💼</div>`
        }
      </div>
      <div class="name">${name}</div>
      ${user.bio ? `<div class="bio">${user.bio.replace(/\n/g, '<br>')}</div>` : ''}
      <div class="handles">
        ${user.instagram_handle ? `
          <a class="handle-pill" href="https://instagram.com/${user.instagram_handle}" target="_blank" rel="noopener">
            ${igIcon()}
            @${user.instagram_handle}${igFollowers ? ` · ${formatNum(igFollowers)}` : ''}
          </a>` : ''}
        ${user.tiktok_handle ? `
          <a class="handle-pill" href="https://tiktok.com/@${user.tiktok_handle}" target="_blank" rel="noopener">
            ${ttIcon()}
            @${user.tiktok_handle}${ttFollowers ? ` · ${formatNum(ttFollowers)}` : ''}
          </a>` : ''}
      </div>
    `

    // Render links
    const linksEl = document.getElementById('links-section')
    const links = []

    if (user.instagram_handle) {
      links.push({
        href: `https://instagram.com/${user.instagram_handle}`,
        iconClass: 'ig',
        icon: igIcon(),
        title: 'Instagram',
        sub: `@${user.instagram_handle}`
      })
    }
    if (user.tiktok_handle) {
      links.push({
        href: `https://tiktok.com/@${user.tiktok_handle}`,
        iconClass: 'tt',
        icon: ttIcon(),
        title: 'TikTok',
        sub: `@${user.tiktok_handle}`
      })
    }
    if (user.amazon_storefront_url) {
      links.push({
        href: user.amazon_storefront_url.startsWith('http') ? user.amazon_storefront_url : `https://${user.amazon_storefront_url}`,
        iconClass: 'amazon',
        icon: amazonIcon(),
        title: 'La mia lista Amazon',
        sub: 'I miei prodotti preferiti'
      })
    }
    if (bioData.custom_link_url && bioData.custom_link_title) {
      const url = bioData.custom_link_url.startsWith('http') ? bioData.custom_link_url : `https://${bioData.custom_link_url}`
      links.push({
        href: url,
        iconClass: 'custom',
        icon: '✨',
        title: bioData.custom_link_title,
        sub: null,
        isEmoji: true
      })
    }
    if (user.contact_email) {
      links.push({
        href: `mailto:${user.contact_email}`,
        iconClass: 'email',
        icon: emailIcon(),
        title: 'Contattami',
        sub: user.contact_email
      })
    }

    linksEl.innerHTML = links.map(l => `
      <a class="link-card" href="${l.href}" target="_blank" rel="noopener">
        <div class="link-icon ${l.iconClass}">
          ${l.isEmoji ? `<span style="font-size:20px">${l.icon}</span>` : l.icon}
        </div>
        <div class="link-label">
          <div class="link-title">${l.title}</div>
          ${l.sub ? `<div class="link-sub">${l.sub}</div>` : ''}
        </div>
        <span class="link-arrow">→</span>
      </a>
    `).join('')

    // Update page title
    document.title = name

    // Track view (fire & forget)
    supabase.rpc('increment_bio_views', { p_user_id: user.id }).catch(() => {})

  } catch (err) {
    document.getElementById('profile-section').innerHTML = `
      <div class="error-state">
        <div style="font-size:32px;margin-bottom:12px">🌸</div>
        <div>Profilo temporaneamente non disponibile.</div>
      </div>`
    console.error(err)
  } finally {
    hideLoader()
  }
}

load()
</script>
</body>
</html>
