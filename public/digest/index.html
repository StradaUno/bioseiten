<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>veuno · Daily Digest</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#f5f4f2;--surface:#fff;--surface2:#f0efed;--border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.13);--text:#111110;--muted:#7a7975;--subtle:#b0afa9;--green:#1a7f4b;--green-bg:#edf7f1;--red:#c0392b;--red-bg:#fdf0ef;--orange:#b85c00;--orange-bg:#fdf3e7;--radius:16px;--radius-sm:10px;--nav-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px)}
html,body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh;color:var(--text);font-size:14px}

/* LOGIN */
#login-screen{min-height:100dvh;display:none;align-items:center;justify-content:center;padding:24px}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-mark{width:32px;height:32px;border-radius:8px;background:var(--text);color:white;display:grid;place-items:center;font-size:14px;font-weight:700}
.login-logo-text{font-size:17px;font-weight:700;letter-spacing:-.03em}
.login-title{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.field input,.field textarea,.field select{width:100%;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:inherit;font-size:14px;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.field input:focus,.field textarea:focus{border-color:var(--text)}
.field textarea{resize:none;line-height:1.5}
.btn-login{width:100%;padding:12px;margin-top:8px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-login:disabled{opacity:.5}
.login-error{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}
/* APP */
#app{display:none;min-height:100dvh;flex-direction:column}
#app.visible{display:flex}
/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,244,242,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between}
.topbar-left{display:flex;align-items:center;gap:10px}
.hamburger{width:36px;height:36px;border:none;background:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:8px;transition:background .15s;padding:0}
.hamburger:hover{background:var(--surface2)}
.hamburger span{display:block;width:20px;height:2px;background:var(--text);border-radius:2px}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.03em}
.topbar-avatar{width:32px;height:32px;border-radius:50%;background:var(--text);color:white;display:grid;place-items:center;font-size:12px;font-weight:600;cursor:pointer;border:2px solid var(--border);overflow:hidden;flex-shrink:0}
.topbar-avatar img{width:100%;height:100%;object-fit:cover}
/* SIDEBAR */
.sidebar-overlay{position:fixed;inset:0;background:rgba(0,0,0,0);z-index:80;pointer-events:none;transition:background .25s}
.sidebar-overlay.open{background:rgba(0,0,0,.35);pointer-events:auto}
.sidebar{position:fixed;top:0;left:0;bottom:0;width:272px;background:var(--surface);z-index:90;transform:translateX(-100%);transition:transform .28s cubic-bezier(.32,.72,0,1);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.08)}
.sidebar.open{transform:translateX(0)}
.sidebar-header{padding:20px 20px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.sidebar-logo{display:flex;align-items:center;gap:8px}
.sidebar-logo-mark{width:28px;height:28px;border-radius:7px;background:var(--text);color:white;display:grid;place-items:center;font-size:12px;font-weight:700}
.sidebar-logo-text{font-size:16px;font-weight:700;letter-spacing:-.03em}
.sidebar-close{width:32px;height:32px;border-radius:99px;background:var(--surface2);border:none;cursor:pointer;display:grid;place-items:center;font-size:18px;color:var(--muted);line-height:1}
.sidebar-nav{flex:1;padding:10px;overflow-y:auto}
.sidebar-section{font-size:10px;font-weight:700;color:var(--subtle);text-transform:uppercase;letter-spacing:.08em;padding:12px 10px 4px}
.sidebar-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;text-decoration:none;color:var(--muted);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px}
.sidebar-item:hover{background:var(--surface2);color:var(--text)}
.sidebar-item.active{background:var(--text);color:white}
.sidebar-item svg{flex-shrink:0}
.sidebar-footer{padding:16px;border-top:1px solid var(--border)}
.sidebar-user{font-size:12px;color:var(--muted);margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.btn-sidebar-logout{width:100%;padding:10px;border-radius:var(--radius-sm);background:var(--surface2);border:1px solid var(--border-strong);font-family:inherit;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:background .15s}
.btn-sidebar-logout:hover{background:var(--border)}
/* COMMON */
.page{flex:1;padding:0 0 calc(32px + var(--safe-bottom));overflow-y:auto}
.page-header{padding:20px 20px 0}
.page-title{font-size:22px;font-weight:700;letter-spacing:-.04em}
.page-sub{font-size:13px;color:var(--muted);margin-top:3px}
.section{padding:16px 20px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.section-title{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em}
.section-link{font-size:12px;font-weight:500;color:var(--muted);text-decoration:none}
.section-label{font-size:10px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.kpi-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.kpi-card.dark{background:var(--text);border-color:var(--text);grid-column:1/-1;padding:16px 18px}
.kpi-card.dark .kpi-label{color:rgba(255,255,255,.45)}
.kpi-card.dark .kpi-value{color:white;font-size:28px}
.kpi-card.dark .kpi-delta{color:rgba(255,255,255,.55)}
.kpi-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.kpi-value{font-size:22px;font-weight:700;color:var(--text);letter-spacing:-.04em;margin-top:4px}
.kpi-delta{font-size:11px;font-weight:500;margin-top:2px}
.kpi-delta.up{color:var(--green)}
.kpi-delta.down{color:var(--red)}
.kpi-delta.neu{color:var(--muted)}
.empty-state{text-align:center;padding:48px 24px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
.empty-icon{font-size:32px;margin-bottom:10px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:4px}
.empty-sub{font-size:13px;color:var(--muted);line-height:1.5}
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,#e8e6e2 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast{background:var(--text);color:white;font-size:13px;font-weight:500;padding:10px 18px;border-radius:99px;animation:toastIn .25s ease-out;white-space:nowrap}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:white;border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none!important}


.date-scroll{display:flex;gap:8px;padding:16px 20px 0;overflow-x:auto;scrollbar-width:none}
.date-scroll::-webkit-scrollbar{display:none}
.date-pill{display:flex;flex-direction:column;align-items:center;padding:8px 14px;border-radius:12px;cursor:pointer;flex-shrink:0;border:1px solid var(--border);background:var(--surface);transition:all .15s}
.date-pill.active{background:var(--text);border-color:var(--text)}
.date-pill-day{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.date-pill.active .date-pill-day{color:rgba(255,255,255,.6)}
.date-pill-num{font-size:17px;font-weight:700;color:var(--text);letter-spacing:-.02em;margin-top:1px}
.date-pill.active .date-pill-num{color:white}
.date-pill-dot{width:4px;height:4px;border-radius:50%;background:var(--green);margin-top:4px}
.teaser-strip{margin:12px 20px 0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.teaser-label{font-size:10px;font-weight:600;color:var(--subtle);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.teaser-line{font-size:13px;color:var(--muted);line-height:1.4;padding:3px 0}
.legend{display:flex;gap:14px;padding:0 20px;margin-top:12px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted)}
.legend-dot{width:7px;height:7px;border-radius:50%}
.filter-row{display:flex;gap:6px;padding:12px 20px 0;overflow-x:auto;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.f-pill{padding:6px 14px;border-radius:99px;white-space:nowrap;font-size:12px;font-weight:500;font-family:inherit;flex-shrink:0;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .15s}
.f-pill.active{background:var(--text);color:white;border-color:var(--text)}
.cards-list{padding:12px 20px 0}
.digest-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden;cursor:pointer}
.digest-card.expanded .card-body-full{display:block}
.digest-card.expanded .card-chevron{transform:rotate(180deg)}
.card-image{width:100%;height:130px;object-fit:cover;background:var(--surface2);display:block}
.card-image-fallback{width:100%;height:130px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:32px}
.card-inner{padding:14px 16px}
.card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.platform-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
.pb-tiktok{background:#f0f0f0;color:#111}.pb-instagram{background:#fce4ec;color:#880e4f}.pb-youtube{background:#ffebee;color:#b71c1c}.pb-meta{background:#e3f2fd;color:#0d47a1}.pb-allgemein{background:var(--surface2);color:var(--muted)}
.level-dot{display:none}
.legend{display:none}
.card-source{font-size:11px;color:var(--subtle);margin-left:auto}
.card-chevron{font-size:12px;color:var(--subtle);transition:transform .2s;margin-left:4px}
.card-headline{font-size:15px;font-weight:600;color:var(--text);letter-spacing:-.02em;line-height:1.35;margin-bottom:6px}
.card-summary{font-size:13px;color:var(--muted);line-height:1.55}
.card-body-full{display:none;border-top:1px solid var(--border);padding-top:12px;margin-top:12px}
.card-full-text{font-size:13px;color:var(--muted);line-height:1.7;white-space:pre-line}
.card-impact{background:var(--surface2);border-radius:var(--radius-sm);padding:10px 12px;margin-top:12px}
.card-impact-label{font-size:10px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.card-impact-text{font-size:12px;color:var(--text);line-height:1.5;font-weight:500}
.card-actions{display:flex;align-items:center;gap:8px;margin-top:12px}
.card-link{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--text);text-decoration:none;padding:7px 14px;border-radius:99px;border:1px solid var(--border-strong);background:var(--surface)}
.card-share{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--muted);padding:7px 14px;border-radius:99px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:inherit;transition:all .15s}
.card-share:hover{color:var(--text);border-color:var(--border-strong)}

</style>
</head>
<body>
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><div class="login-logo-mark">v</div><div class="login-logo-text">veuno</div></div>

    <div class="login-sub">Melde dich mit deinem veuno-Account an.</div>
    <div class="field"><label>E-Mail</label><input type="email" id="inp-email" placeholder="du@beispiel.de" autocomplete="email"/></div>

<div id="app">

  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo"><div class="sidebar-logo-mark">v</div><div class="sidebar-logo-text">veuno</div></div>

    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-email"></div>

  </div>
  <div class="topbar">
    <div class="topbar-left">
      <button class="hamburger" onclick="openSidebar()"><span></span><span></span><span></span></button>
      <span class="topbar-title">Daily Digest</span>
    </div>
    <div class="topbar-avatar" id="user-avatar">?</div>
  </div>
  <div class="page">
    <div class="page-header"><div class="page-title">Daily Digest</div><div class="page-sub" id="digest-sub">Was heute in der Creator-Welt passiert.</div></div>

    <div class="filter-row" id="filter-row"><button class="f-pill active" data-filter="alle">Alle</button></div>
    <div id="skeleton-area" style="padding:12px 20px 0;display:flex;flex-direction:column;gap:10px"><div class="skeleton" style="height:180px;border-radius:16px"></div><div class="skeleton" style="height:140px;border-radius:16px"></div></div>

  </div>
</div>
<div class="toast-wrap hidden" id="toast-wrap"><div class="toast" id="toast-msg"></div></div>
<script type="module">
import {createClient} from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL='https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'
const sb=createClient(SUPABASE_URL,SUPABASE_ANON,{auth:{persistSession:true,autoRefreshToken:true}})

function escHtml(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
function fmt(n,d=1){if(n==null||isNaN(+n))return'–';n=+n;if(n>=1e6)return(n/1e6).toFixed(d).replace(/\.0$/,'')+'M';if(n>=1e3)return(n/1e3).toFixed(d).replace(/\.0$/,'')+'k';return n.toFixed(0)}

window.showToast=function(msg,dur=2800){
  const w=document.getElementById('toast-wrap'),t=document.getElementById('toast-msg')
  t.textContent=msg;w.classList.remove('hidden')
  clearTimeout(w._t);w._t=setTimeout(()=>w.classList.add('hidden'),dur)
}
window.openSidebar=()=>{document.getElementById('sidebar').classList.add('open');document.getElementById('sidebar-overlay').classList.add('open');document.body.style.overflow='hidden'}
window.closeSidebar=()=>{document.getElementById('sidebar').classList.remove('open');document.getElementById('sidebar-overlay').classList.remove('open');document.body.style.overflow=''}

async function setupAvatar(session){
  const{data:p}=await sb.from('users').select('display_name,full_name,profile_image_url').eq('id',session.user.id).single()
  const name=p?.display_name||p?.full_name||session.user.email||'?'
  const av=document.getElementById('user-avatar')
  if(p?.profile_image_url){av.innerHTML=`<img src="${escHtml(p.profile_image_url)}" alt="">`}else{av.textContent=name[0].toUpperCase()}
  document.getElementById('sidebar-user-email').textContent=session.user.email
}

async function baseInit(onSession){
  const{data:{session}}=await sb.auth.getSession()
  if(session){await onSession(session);return}
  document.getElementById('login-screen').style.display='flex'
  document.getElementById('btn-login').addEventListener('click',doLogin)
  document.getElementById('inp-pw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()})
}

async function doLogin(){
  const email=document.getElementById('inp-email').value.trim(),pw=document.getElementById('inp-pw').value
  const errEl=document.getElementById('login-error'),btn=document.getElementById('btn-login')
  errEl.textContent='';btn.disabled=true;btn.innerHTML='<span class="spinner"></span>'
  const{data,error}=await sb.auth.signInWithPassword({email,password:pw})
  btn.disabled=false;btn.textContent='Einloggen'
  if(error){errEl.textContent='Falsche E-Mail oder Passwort.';return}
  await enterApp(data.session)
}
window.logout=async()=>{await sb.auth.signOut();location.reload()}


const state={digests:[],activeDate:null,activeFilter:'alle'}
function fmtDate(d){if(!d)return'';return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'})}
function fmtDayNum(d){return new Date(d+'T12:00:00').toLocaleDateString('de-DE',{day:'2-digit'})}
function fmtDayName(d){return['So','Mo','Di','Mi','Do','Fr','Sa'][new Date(d+'T12:00:00').getDay()]}
async function enterApp(session){document.getElementById('login-screen').style.display='none';document.getElementById('app').classList.add('visible');await setupAvatar(session);await loadDigests()}
async function loadDigests(){
  const{data}=await sb.from('daily_digest').select('date,teaser,cards,generated_at').order('date',{ascending:false}).limit(14)
  document.getElementById('skeleton-area').classList.add('hidden')
  if(!data?.length){document.getElementById('empty-state').classList.remove('hidden');return}
  state.digests=data;state.activeDate=data[0].date;renderDatePicker();renderDigest()
}
function renderDatePicker(){
  document.getElementById('date-scroll').innerHTML=state.digests.map(d=>`<div class="date-pill ${d.date===state.activeDate?'active':''}" onclick="selectDate('${d.date}')"><div class="date-pill-day">${fmtDayName(d.date)}</div><div class="date-pill-num">${fmtDayNum(d.date)}</div><div class="date-pill-dot"></div></div>`).join('')
}
window.selectDate=function(date){state.activeDate=date;state.activeFilter='alle';renderDatePicker();renderDigest();setTimeout(()=>document.querySelector('.date-pill.active')?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'}),50)}
function buildFilters(cards){
  const platforms=[...new Set(cards.map(c=>c.platform).filter(Boolean))]
  const el=document.getElementById('filter-row')
  el.innerHTML=`<button class="f-pill ${state.activeFilter==='alle'?'active':''}" data-filter="alle" onclick="setFilter('alle')">Alle</button>`+platforms.map(p=>`<button class="f-pill ${state.activeFilter===p?'active':''}" data-filter="${p}" onclick="setFilter('${p}')">${platformLabel(p)}</button>`).join('')
}
window.setFilter=function(f){state.activeFilter=f;document.querySelectorAll('.f-pill').forEach(p=>p.classList.toggle('active',p.dataset.filter===f));renderCards(currentCards())}
function currentCards(){const digest=state.digests.find(d=>d.date===state.activeDate);if(!digest)return[];let cards=digest.cards||[];if(state.activeFilter!=='alle')cards=cards.filter(c=>c.platform===state.activeFilter);return cards}
function renderDigest(){
  const digest=state.digests.find(d=>d.date===state.activeDate);if(!digest){document.getElementById('cards-list').classList.add('hidden');document.getElementById('empty-state').classList.remove('hidden');return}
  document.getElementById('digest-sub').textContent=fmtDate(digest.date)
  buildFilters(digest.cards||[]);document.getElementById('empty-state').classList.add('hidden');document.getElementById('cards-list').classList.remove('hidden');renderCards(currentCards())
}
function renderCards(cards){
  const el=document.getElementById('cards-list')
  if(!cards.length){el.innerHTML=`<div class="empty-state" style="margin:0 0 10px"><div class="empty-icon">🔍</div><div class="empty-title">Keine Karten</div><div class="empty-sub">Für diesen Filter gibt es nichts.</div></div>`;return}
  el.innerHTML=cards.map(c=>cardHtml(c)).join('')
  el.querySelectorAll('.digest-card').forEach(card=>card.addEventListener('click',()=>card.classList.toggle('expanded')))
  el.querySelectorAll('.card-share').forEach(btn=>btn.addEventListener('click',e=>{e.stopPropagation();shareCard(btn.dataset.headline,btn.dataset.summary,btn.dataset.url)}))
}
function platformLabel(p){return{tiktok:'TikTok',instagram:'Instagram',youtube:'YouTube',meta:'Meta',allgemein:'Allgemein'}[p]||p}
function platformClass(p){return{tiktok:'pb-tiktok',instagram:'pb-instagram',youtube:'pb-youtube',meta:'pb-meta',allgemein:'pb-allgemein'}[p]||'pb-allgemein'}
function platformEmoji(p){return{tiktok:'🎵',instagram:'📸',youtube:'📺',meta:'🔵',allgemein:'🌐'}[p]||'📰'}
async function shareCard(headline,summary,url){
  const text=`📰 ${headline}\n\n${summary?summary.slice(0,120)+'…':''}\n\nMehr Creator-News auf veuno.de`
  if(navigator.share){try{await navigator.share({title:headline,text,url:url||'https://veuno.de'});return}catch(_){}}
  try{await navigator.clipboard.writeText(text+'\n\n'+(url||'https://veuno.de'));showToast('In Zwischenablage kopiert ✓')}catch(_){showToast('Teilen nicht verfügbar')}
}
function cardHtml(c){
  const hasImg=c.image_url?.trim(),hasFull=c.full_content?.trim()
  const shareBtn=`<button class="card-share" data-headline="${escHtml(c.headline||'')}" data-summary="${escHtml(c.summary||'')}" data-url="${escHtml(c.source_url||'')}">↗ Teilen</button>`
  return`<div class="digest-card"><${hasImg?`img class="card-image" src="${escHtml(c.image_url)}" alt="" loading="lazy" onerror="this.outerHTML='<div class=&quot;card-image-fallback&quot;>${platformEmoji(c.platform)}</div>'"`:`div class="card-image-fallback"`}>${hasImg?'</img>':platformEmoji(c.platform)+'</div>'}
    <div class="card-inner"><div class="card-meta"><span class="platform-badge ${platformClass(c.platform)}">${platformLabel(c.platform)}</span><span class="card-source">${escHtml(c.source||'')}</span>${(hasFull||c.impact)?'<span class="card-chevron">▼</span>':''}</div>
      <div class="card-headline">${escHtml(c.headline||'')}</div><div class="card-summary">${escHtml(c.summary||'')}</div>
      ${(hasFull||c.impact||c.source_url)?`<div class="card-body-full">${hasFull?`<div class="card-full-text">${escHtml(c.full_content)}</div>`:''}${c.impact?`<div class="card-impact"><div class="card-impact-label">⚡ Was das für dich bedeutet</div><div class="card-impact-text">${escHtml(c.impact)}</div></div>`:''}
        <div class="card-actions">${c.source_url?`<a class="card-link" href="${escHtml(c.source_url)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Quelle lesen ↗</a>`:''}${shareBtn}</div>
      </div>`:''}
    </div></div>`
}
baseInit(enterApp)

</script>
</body>
</html>
