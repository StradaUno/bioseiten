<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>viuno · Admin</title>
<link rel="icon" href="data:," />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#f5f4f2;--surface:#fff;--surface2:#f0efed;
  --border:rgba(0,0,0,.08);--border-strong:rgba(0,0,0,.13);
  --text:#111110;--muted:#7a7975;--subtle:#b0afa9;
  --green:#1a7f4b;--red:#c0392b;--orange:#b85c00;--blue:#1d4ed8;
  --radius:16px;--radius-sm:10px;
  --nav-h:56px;--safe-bottom:env(safe-area-inset-bottom,0px)
}
html,body{background:var(--bg);font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;-webkit-font-smoothing:antialiased;min-height:100dvh;color:var(--text);font-size:14px}
input,textarea,select{font-size:16px!important}

/* LOGIN */
#login-screen{min-height:100dvh;display:none;align-items:center;justify-content:center;padding:24px;flex-direction:column}
#login-screen.visible{display:flex}
.login-card{width:100%;max-width:360px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:32px 28px}
.login-logo{display:flex;align-items:center;gap:10px;margin-bottom:28px}
.login-logo-mark{width:32px;height:32px;border-radius:8px;background:var(--text);color:white;display:grid;place-items:center;font-size:14px;font-weight:700}
.login-logo-text{font-size:17px;font-weight:700;letter-spacing:-.03em}
.login-badge{margin-left:auto;background:var(--text);color:white;font-size:9px;font-weight:700;padding:3px 8px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
.login-title{font-size:20px;font-weight:700;letter-spacing:-.03em;margin-bottom:4px}
.login-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.field{margin-bottom:12px}
.field label{display:block;font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.field input{width:100%;padding:11px 14px;border:1px solid var(--border-strong);border-radius:var(--radius-sm);font-family:inherit;color:var(--text);background:var(--bg);outline:none;transition:border-color .15s}
.field input:focus{border-color:var(--text)}
.btn-login{width:100%;padding:12px;margin-top:8px;background:var(--text);color:white;border:none;border-radius:var(--radius-sm);font-family:inherit;font-size:14px;font-weight:600;cursor:pointer}
.btn-login:disabled{opacity:.5;cursor:not-allowed}
.login-error{font-size:12px;color:var(--red);margin-top:10px;text-align:center;min-height:18px}

/* APP */
#app{display:none;min-height:100dvh;flex-direction:column}
#app.visible{display:flex}
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,244,242,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 20px;height:var(--nav-h);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-mark{width:28px;height:28px;border-radius:7px;background:var(--text);color:white;display:grid;place-items:center;font-size:12px;font-weight:700}
.topbar-title{font-size:15px;font-weight:700;letter-spacing:-.03em;display:flex;align-items:center;gap:8px}
.topbar-title .badge{background:var(--text);color:white;font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.06em}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn-icon{width:36px;height:36px;border-radius:10px;background:var(--surface);border:1px solid var(--border);display:grid;place-items:center;cursor:pointer;color:var(--muted);font-size:14px}
.btn-icon:hover{background:var(--surface2);color:var(--text)}
.btn-icon.spinning{animation:spin 1s linear infinite}

.page{flex:1;padding:0 0 calc(40px + var(--safe-bottom))}
.section{padding:14px 20px 0}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.section-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:-.01em;text-transform:uppercase;letter-spacing:.04em}
.section-sub{font-size:11px;color:var(--muted)}

/* GREETING */
.greeting{padding:18px 20px 0}
.greeting-hi{font-size:22px;font-weight:700;letter-spacing:-.04em}
.greeting-date{font-size:13px;color:var(--muted);margin-top:3px}

/* HERO KPI ROW */
.hero-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:10px}
.hero-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px 16px;display:flex;flex-direction:column;gap:4px;text-decoration:none}
.hero-card.dark{background:var(--text);border-color:var(--text);color:white}
.hero-card.dark .hero-label{color:rgba(255,255,255,.5)}
.hero-card.dark .hero-value{color:white}
.hero-card.dark .hero-sub{color:rgba(255,255,255,.45)}
.hero-label{font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
.hero-value{font-size:30px;font-weight:700;letter-spacing:-.04em;line-height:1.05;margin-top:4px;color:var(--text)}
.hero-sub{font-size:11px;color:var(--subtle);margin-top:3px}
.hero-icon{font-size:18px;margin-bottom:4px}
@media(max-width:640px){
  .hero-grid{grid-template-columns:1fr 1fr;gap:8px}
  .hero-card.dark{grid-column:span 2}
  .hero-value{font-size:26px}
}

/* MINI STAT SCROLL */
.mini-scroll{display:flex;gap:8px;padding:14px 20px 0;overflow-x:auto;scrollbar-width:none}
.mini-scroll::-webkit-scrollbar{display:none}
.mini-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 14px;min-width:120px;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.mini-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.mini-value{font-size:18px;font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1.1}
.mini-sub{font-size:10px;color:var(--subtle)}

/* TABS */
.tabs{display:flex;gap:4px;padding:18px 20px 0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:99px;font-size:13px;font-weight:500;color:var(--muted);background:var(--surface);border:1px solid var(--border);cursor:pointer;white-space:nowrap;font-family:inherit}
.tab.active{background:var(--text);color:white;border-color:var(--text)}
.tab-count{display:inline-block;background:var(--surface2);color:var(--muted);font-size:10px;font-weight:600;padding:1px 6px;border-radius:99px;margin-left:5px}
.tab.active .tab-count{background:rgba(255,255,255,.18);color:white}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.card-header{padding:14px 16px 8px}
.card-title{font-size:14px;font-weight:600;letter-spacing:-.01em}
.card-sub{font-size:11px;color:var(--muted);margin-top:2px}
.card-body{padding:0}

/* LIST ROW */
.list-row{display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border);min-width:0}
.list-row:last-child{border-bottom:none}
.row-rank{font-size:11px;font-weight:700;color:var(--subtle);width:18px;text-align:right;flex-shrink:0}
.row-avatar{width:34px;height:34px;border-radius:10px;flex-shrink:0;background:var(--surface2);border:1px solid var(--border);display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--muted)}
.row-main{flex:1;min-width:0}
.row-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-sub{font-size:11px;color:var(--muted);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.row-end{text-align:right;flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:1px}
.row-end-value{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap}
.row-end-sub{font-size:11px;color:var(--muted)}
.row-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.row-pill{font-size:9px;font-weight:700;padding:2px 7px;border-radius:99px;text-transform:uppercase;letter-spacing:.04em}
.pill-pro{background:var(--text);color:white}
.pill-free{background:var(--surface2);color:var(--muted)}
.pill-new{background:#fdf2f8;color:#9d174d}
.pill-active{background:#f0fdf4;color:var(--green)}
.pill-error{background:#fef2f2;color:var(--red)}
.pill-warn{background:#fffbeb;color:var(--orange)}
.pill-info{background:#eff6ff;color:var(--blue)}
.pill-muted{background:var(--surface2);color:var(--muted)}
.pill-admin{background:#fff7ed;color:#c2410c}

/* ICON BUTTONS in rows */
.icon-btn{width:28px;height:28px;border-radius:7px;background:transparent;border:1px solid transparent;cursor:pointer;display:grid;place-items:center;color:var(--subtle);font-size:13px;font-family:inherit}
.icon-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.icon-btn.danger:hover{color:var(--red);border-color:rgba(192,57,43,.2);background:#fef2f2}

/* TABLE LIKE */
.bar-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)}
.bar-row:last-child{border-bottom:none}
.bar-label{font-size:12px;font-weight:600;color:var(--text);min-width:120px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;height:6px;background:var(--surface2);border-radius:99px;overflow:hidden}
.bar-fill{height:100%;background:var(--text);border-radius:99px;transition:width .3s}
.bar-value{font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right;white-space:nowrap}

/* MESSAGE BLOCK */
.msg-block{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:6px}
.msg-block:last-child{border-bottom:none}
.msg-head{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.msg-name{font-size:13px;font-weight:600}
.msg-meta{font-size:11px;color:var(--muted)}
.msg-body{font-size:13px;color:var(--text);line-height:1.5;white-space:pre-line}
.msg-actions{display:flex;gap:6px;margin-top:4px}
.msg-action{font-size:11px;font-weight:600;padding:5px 10px;border-radius:99px;background:var(--surface);border:1px solid var(--border-strong);cursor:pointer;color:var(--text);font-family:inherit;text-decoration:none;display:inline-flex;align-items:center;gap:4px}
.msg-action:hover{background:var(--surface2)}
.msg-action.danger{color:var(--red);border-color:rgba(192,57,43,.2)}
.msg-action.danger:hover{background:#fef2f2}

/* EMPTY */
.empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.empty-icon{font-size:32px;margin-bottom:8px;opacity:.5}

/* LOADING */
.skeleton{background:linear-gradient(90deg,var(--surface2) 25%,#e8e6e2 50%,var(--surface2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.spinner{width:14px;height:14px;border:2px solid rgba(0,0,0,.1);border-top-color:var(--text);border-radius:50%;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* TOAST */
.toast-wrap{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:200;pointer-events:none}
.toast-wrap.hidden{display:none}
.toast{background:var(--text);color:white;font-size:13px;font-weight:500;padding:10px 18px;border-radius:99px;animation:toastIn .25s ease-out;white-space:nowrap;max-width:90vw;overflow:hidden;text-overflow:ellipsis}
@keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg.hidden{display:none}
.modal{background:var(--surface);border-radius:18px;max-width:380px;width:100%;padding:24px;text-align:center}
.modal-title{font-size:16px;font-weight:700;margin-bottom:6px;letter-spacing:-.02em}
.modal-msg{font-size:13px;color:var(--muted);margin-bottom:20px;line-height:1.5}
.modal-actions{display:flex;gap:8px}
.modal-btn{flex:1;padding:11px;border-radius:var(--radius-sm);font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--border-strong);background:var(--surface)}
.modal-btn.primary{background:var(--text);color:white;border-color:var(--text)}
.modal-btn.danger{background:var(--red);color:white;border-color:var(--red)}

/* FOOTER GENERATED */
.footer{padding:18px 20px 0;text-align:center;font-size:11px;color:var(--subtle)}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-mark">v</div>
      <div class="login-logo-text">viuno</div>
      <span class="login-badge">Admin</span>
    </div>
    <div class="login-title">Admin Login</div>
    <div class="login-sub">Nur für Admin-Accounts.</div>
    <div class="field"><label>E-Mail</label><input type="email" id="inp-email" autocomplete="email" /></div>
    <div class="field"><label>Passwort</label><input type="password" id="inp-pw" autocomplete="current-password" /></div>
    <button class="btn-login" id="btn-login">Einloggen</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo-mark">v</div>
      <span class="topbar-title">Admin <span class="badge">viuno</span></span>
    </div>
    <div class="topbar-right">
      <button class="btn-icon" id="btn-refresh" title="Aktualisieren">↻</button>
      <button class="btn-icon" id="btn-logout" title="Logout">⏻</button>
    </div>
  </div>

  <div class="page" id="page">
    <div id="skeleton" style="padding:18px 20px;display:flex;flex-direction:column;gap:10px">
      <div class="skeleton" style="height:60px;width:240px"></div>
      <div style="display:flex;gap:8px"><div class="skeleton" style="height:88px;flex:1.5"></div><div class="skeleton" style="height:88px;flex:1"></div><div class="skeleton" style="height:88px;flex:1"></div></div>
      <div class="skeleton" style="height:60px;margin-top:8px"></div>
      <div class="skeleton" style="height:200px;margin-top:8px"></div>
    </div>
    <div id="content" style="display:none"></div>
  </div>
</div>

<div class="toast-wrap hidden" id="toast-wrap"><div class="toast" id="toast-msg"></div></div>
<div class="modal-bg hidden" id="modal">
  <div class="modal">
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-msg" id="modal-msg"></div>
    <div class="modal-actions">
      <button class="modal-btn" id="modal-cancel">Abbrechen</button>
      <button class="modal-btn primary" id="modal-ok">OK</button>
    </div>
  </div>
</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const SUPABASE_URL  = 'https://bzejndghppuipnedasuv.supabase.co'
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ6ZWpuZGdocHB1aXBuZWRhc3V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NTMxOTcsImV4cCI6MjA4OTIyOTE5N30.TShH1cIABQCtKgLkhCS9ymUJ36ZUYnlvCnGTok6EKTo'
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { persistSession: true, autoRefreshToken: true } })

const state = { activeTab: 'overview', data: null, session: null }

// ── Helpers ──────────────────────────────────────────────────────────────────
const $  = (s)=>document.querySelector(s)
const escHtml = (s)=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))
const fmt = (n,d=1)=>{ if(n==null||isNaN(+n))return'–'; n=+n; if(n>=1e6)return(n/1e6).toFixed(d).replace(/\.0$/,'')+'M'; if(n>=1e3)return(n/1e3).toFixed(d).replace(/\.0$/,'')+'k'; return n.toFixed(0) }
const fmtUsd = (n)=>{ if(n==null||isNaN(+n))return'$0.00'; return '$'+(+n).toFixed(2) }
const fmtUsdSmall = (n)=>{ if(n==null||isNaN(+n))return'$0'; const v=+n; if(v<0.01)return'<$0.01'; return '$'+v.toFixed(v<1?3:2) }
const fmtDateShort = (d)=>{ if(!d)return''; return new Date(d).toLocaleDateString('de-DE',{day:'2-digit',month:'short'}) }
const fmtDateTime = (d)=>{ if(!d)return''; return new Date(d).toLocaleString('de-DE',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}) }
const fmtAgo = (d)=>{
  if(!d)return''
  const ms=Date.now()-new Date(d).getTime()
  const m=Math.floor(ms/60000)
  if(m<1)return'gerade eben'
  if(m<60)return `vor ${m} Min`
  const h=Math.floor(m/60)
  if(h<24)return `vor ${h} Std`
  const dy=Math.floor(h/24)
  if(dy<7)return `vor ${dy} Tag${dy===1?'':'en'}`
  return fmtDateShort(d)
}
const initial = (s)=>String(s||'?').trim().charAt(0).toUpperCase() || '?'

function toast(msg, ms=2800){
  const w=$('#toast-wrap'), t=$('#toast-msg')
  t.textContent=msg; w.classList.remove('hidden')
  clearTimeout(w._t); w._t=setTimeout(()=>w.classList.add('hidden'),ms)
}
function confirmDialog(title,msg,okLabel='OK',danger=false){
  return new Promise(res=>{
    $('#modal-title').textContent=title
    $('#modal-msg').textContent=msg
    const ok=$('#modal-ok'); ok.textContent=okLabel
    ok.classList.toggle('danger', danger)
    ok.classList.toggle('primary', !danger)
    $('#modal').classList.remove('hidden')
    const cleanup=()=>{ $('#modal').classList.add('hidden'); ok.onclick=null; $('#modal-cancel').onclick=null }
    ok.onclick=()=>{ cleanup(); res(true) }
    $('#modal-cancel').onclick=()=>{ cleanup(); res(false) }
  })
}

// ── Auth ─────────────────────────────────────────────────────────────────────
async function tryRestore(){
  const { data:{ session } } = await sb.auth.getSession()
  if(session){ await enterApp(session); return }
  showLogin()
}
function showLogin(){
  $('#login-screen').classList.add('visible')
  $('#btn-login').addEventListener('click', doLogin)
  $('#inp-pw').addEventListener('keydown', e=>{ if(e.key==='Enter') doLogin() })
}
async function doLogin(){
  const email=$('#inp-email').value.trim(), pw=$('#inp-pw').value
  const errEl=$('#login-error'), btn=$('#btn-login')
  errEl.textContent=''; btn.disabled=true; btn.innerHTML='<span class="spinner"></span>'
  const { data, error } = await sb.auth.signInWithPassword({ email, password: pw })
  btn.disabled=false; btn.textContent='Einloggen'
  if(error){ errEl.textContent='Falsche E-Mail oder Passwort.'; return }
  // Verify admin
  const { data: me } = await sb.from('users').select('is_admin').eq('id', data.session.user.id).maybeSingle()
  if(!me?.is_admin){
    await sb.auth.signOut()
    errEl.textContent='Kein Admin-Zugriff.'
    return
  }
  await enterApp(data.session)
}
async function enterApp(session){
  state.session = session
  $('#login-screen').classList.remove('visible')
  $('#login-screen').style.display='none'
  $('#app').classList.add('visible')
  await loadAll()
}
$('#btn-logout')?.addEventListener('click', async ()=>{
  await sb.auth.signOut(); location.reload()
})
$('#btn-refresh')?.addEventListener('click', ()=> loadAll(true))

// ── API ──────────────────────────────────────────────────────────────────────
async function callApi(action, extraQuery=''){
  const { data:{ session }, error: sessErr } = await sb.auth.getSession()
  if(sessErr || !session){
    toast('Session abgelaufen – bitte neu einloggen')
    setTimeout(()=>location.reload(),1500)
    throw new Error('no_session')
  }
  state.session = session
  const url = `${SUPABASE_URL}/functions/v1/admin-dashboard?action=${action}${extraQuery}`
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Authorization': `Bearer ${session.access_token}`, 'Content-Type': 'application/json' }
  })
  const body = await res.json().catch(()=>({}))
  if(res.status === 403 && (body.error||'').includes('invalid_token')){
    toast('Login abgelaufen')
    setTimeout(()=>location.reload(),1500)
    throw new Error('token_expired')
  }
  if(!res.ok || body.success === false) throw new Error(body.error || `HTTP ${res.status}`)
  return body
}

async function loadAll(showSpin=false){
  if(showSpin) $('#btn-refresh').classList.add('spinning')
  try{
    const data = await callApi('overview')
    state.data = data
    render()
  }catch(err){
    console.error(err)
    if(err.message !== 'no_session' && err.message !== 'token_expired'){
      toast('Fehler: ' + err.message, 5000)
    }
  }finally{
    $('#btn-refresh').classList.remove('spinning')
  }
}

// ── Render: Frame ────────────────────────────────────────────────────────────
function render(){
  $('#skeleton').style.display='none'
  $('#content').style.display='block'
  const k = state.data.kpis
  const greet = (()=>{

    })

function miniCard(label,val,sub,warn=false){
  return `<div class="mini-card" ${warn?'style="border-color:rgba(192,57,43,.3);background:#fef2f2"':''}>
    <div class="mini-label">${label}</div>
    <div class="mini-value" ${warn?'style="color:var(--red)"':''}>${val}</div>
    <div class="mini-sub">${sub}</div>
  </div>`
}
function tabBtn(key,label,count){
  const active = state.activeTab===key
  const c = (count!=null && count>0) ? ` <span class="tab-count">${count}</span>` : ''
  return `<button class="tab ${active?'active':''}" data-tab="${key}">${label}${c}</button>`
}

// ── Render: Tabs ─────────────────────────────────────────────────────────────
function renderTab(){
  const el = $('#tab-content')
  const t = state.activeTab
  if(t==='overview') el.innerHTML = renderOverview()
  else if(t==='users') el.innerHTML = renderUsers()
  else if(t==='ai') el.innerHTML = renderAi()
  else if(t==='inbox') el.innerHTML = renderInbox()
  else if(t==='content') el.innerHTML = renderContent()
  else if(t==='errors') el.innerHTML = renderErrors()
  bindTabEvents()
}

  return `<div class="card"><div class="card-body">${users.map(u=>userFullRow(u)).join('')}</div></div>`

    </div>
  </div>`
}
function contactBlock(c){
  const statusPill = c.status==='new' ? 'pill-new' : 'pill-muted'
  return `<div class="msg-block">
    <div class="msg-head">
      <span class="row-pill ${statusPill}">${escHtml(c.status||'')}</span>
      <span class="msg-name">${escHtml(c.name||'—')}</span>
      <span class="msg-meta">${escHtml(c.email||'')}</span>

function renderErrors(){

  const recent = (state.data.analysis?.recent || [])
  return `
    <div class="card" style="margin-bottom:14px">
      <div class="card-header">
        <div class="card-title">Admin-Errors</div>
        <div class="card-sub">${errs.filter(e=>!e.resolved).length} unresolved von ${errs.length}</div>

      <div class="card-body">

          ? `<div class="empty"><div class="empty-icon">✅</div>Keine Fehler</div>`
          : errs.map(e=>errorBlock(e)).join('')
        }
      </div>
    </div>

    <div class="card">
      <div class="card-header">
        <div class="card-title">Letzte Analyse-Runs</div>
        <div class="card-sub">letzte 30 Tage</div>
      </div>
      <div class="card-body">
        ${recent.length===0
          ? `<div class="empty">Keine Runs</div>`
          : recent.map(a=>analysisRow(a)).join('')
        }

function errorBlock(e){
  const pill = e.resolved ? 'pill-active' : 'pill-error'
  const pillTxt = e.resolved ? 'Resolved' : 'Open'
  return `<div class="msg-block">
    <div class="msg-head">
      <span class="row-pill ${pill}">${pillTxt}</span>
      <span class="msg-name">${escHtml(e.function_name||'?')}</span>
      <span class="msg-meta" style="margin-left:auto">${fmtAgo(e.created_at)}</span>
    </div>
    <div class="msg-body" style="font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;color:var(--muted)">${escHtml(e.error_message||'(no message)')}</div>
    ${!e.resolved?`<div class="msg-actions">
      <button class="msg-action" data-act="resolve-error" data-id="${escHtml(e.id)}">✓ Als erledigt markieren</button>
    </div>`:''}
  </div>`
}
function analysisRow(a){
  const pill = a.status==='done' ? 'pill-active' : (a.status==='failed' ? 'pill-error' : 'pill-warn')
  return `<div class="list-row">
    <div class="row-main">
      <div class="row-title"><span class="row-pill ${pill}">${escHtml(a.status)}</span> ${escHtml(a.user_email||'?')}</div>
      <div class="row-sub">${a.error?escHtml(a.error.slice(0,80)):'gestartet '+fmtAgo(a.started_at)}</div>
    </div>
    <div class="row-end">
      <div class="row-end-sub">${fmtDateShort(a.started_at)}</div>
    </div>
  </div>`
}

// ── Tab events (delete buttons etc.) ─────────────────────────────────────────
function bindTabEvents(){
  document.querySelectorAll('[data-act]').forEach(el=>{
    el.addEventListener('click', async (e)=>{
      const act = el.dataset.act, id = el.dataset.id
      if(act==='del-collab'){
        if(!await confirmDialog('Collab-Anfrage löschen?', 'Wird auf "deleted" gesetzt (soft-delete, in DB noch da).', 'Ja, löschen', true)) return
        await callAndReload('delete_collab_request', `&id=${encodeURIComponent(id)}`, 'Anfrage gelöscht')
      } else if(act==='del-contact'){
        if(!await confirmDialog('Submission löschen?', 'Wird auf "deleted" gesetzt (soft-delete).', 'Ja, löschen', true)) return
        await callAndReload('delete_contact_submission', `&id=${encodeURIComponent(id)}`, 'Submission gelöscht')
      } else if(act==='resolve-error'){
        if(!await confirmDialog('Als erledigt markieren?', 'Der Error wird als resolved markiert.', 'Ja')) return
        await callAndReload('mark_error_resolved', `&id=${encodeURIComponent(id)}`, 'Markiert')
      }
    })
  })
}
async function callAndReload(action, query, successMsg){
  try{
    await callApi(action, query)
    toast(successMsg)
    await loadAll()
  }catch(err){
    toast('Fehler: ' + err.message, 5000)
  }
}

// ── Boot ─────────────────────────────────────────────────────────────────────
tryRestore()
</script>
</body>
</html>
